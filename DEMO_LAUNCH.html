<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMTinel - Cinematic Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at top, #0B1220, #050A0F);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #E8F0FF;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #00D2FF;
            text-shadow: 0 0 20px #00D2FF;
            letter-spacing: 2px;
        }
        p {
            font-size: 14px;
            color: #A8B8D8;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
        }
        .btn-demo {
            background: linear-gradient(135deg, #00D2FF, #147CFF);
            color: #050A0F;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
        }
        .btn-demo:hover {
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.8);
            transform: translateY(-2px);
        }
        .btn-main {
            background: transparent;
            color: #00D2FF;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }
        .btn-main:hover {
            border-color: #00D2FF;
            background: rgba(0, 210, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMTINEL IO</h1>
        <h2 style="font-size: 16px; color: #00E5A8; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;">Cinematic Dashboard Demo</h2>
        <p>
            Experiencia visual premium de inteligencia operativa.<br>
            Boot sequence cinematográfica • Dashboard SaaS enterprise • Interacciones fluidas
        </p>
        <div class="button-group">
            <a href="demo.html" class="btn-demo">▶ ABRIR DEMO</a>
            <a href="index.html" class="btn-main">← VOLVER</a>
        </div>
    </div>
</body>
</html>
