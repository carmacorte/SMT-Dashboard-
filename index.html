<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMTintel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F0EEE9;--w:#FFFFFF;
--g50:#F7F5F1;--g100:#EDE9E3;--g200:#DDD8D0;--g300:#BDB6AC;
--g500:#857E75;--g700:#46403A;--g900:#1A1713;
--teal:#2C7566;--teal2:#1A4F3E;--teal3:#38907A;--tealSoft:#E8F2EF;
--lime:#C8D896;--lime2:#7A9448;--lime3:#F2ECC8;--limeSoft:#F0F4E4;
--re:#C42020;--rel:#FDF0F0;--reB:#FCCFCF;
--bl:#1D55D4;--bll:#EAF0FE;--blB:#BCCFF9;
--gr:#148A3C;--grl:#EDFAF3;--grB:#A8E8C4;
--ye:#D4860A;--yel:#FEF8E8;--yeB:#F9DFA0;
--pu:#6A28D4;--pul:#F3EEFE;--puB:#CEB8F4;
--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
--shadow-md:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06);
}

body{font-family:‘Inter’,system-ui,-apple-system,sans-serif;background:var(–bg);color:var(–g900);min-height:100vh;-webkit-font-smoothing:antialiased}
#root{max-width:900px;margin:0 auto;padding:20px 14px 60px}

/* ── HEADER ── */
.hdr{
background:linear-gradient(135deg,var(–teal2) 0%,#0F3328 100%);
border-radius:20px;padding:24px 28px;margin-bottom:18px;
display:flex;align-items:center;gap:20px;
position:relative;overflow:hidden;
box-shadow:var(–shadow-md)
}
.hdr::before{
content:’’;position:absolute;top:-60px;right:-60px;
width:220px;height:220px;
background:radial-gradient(circle,rgba(200,216,150,.18),transparent 65%);
border-radius:50%
}
.hdr::after{
content:’’;position:absolute;bottom:-30px;left:120px;
width:160px;height:160px;
background:radial-gradient(circle,rgba(56,144,122,.2),transparent 65%);
border-radius:50%
}
.hdr-logo{flex-shrink:0;position:relative;z-index:1}
.hdr-info{position:relative;z-index:1}
.hdr-badge{
display:inline-flex;align-items:center;gap:5px;
background:rgba(200,216,150,.14);border:1px solid rgba(200,216,150,.28);
color:var(–lime);font-size:8.5px;font-weight:700;letter-spacing:.14em;
text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:8px
}
.hdr-info h1{font-size:13.5px;font-weight:400;color:rgba(242,236,200,.9);margin-bottom:3px;letter-spacing:.1px}
.hdr-info h2{font-size:10.5px;color:rgba(242,236,200,.35);font-weight:300;letter-spacing:.5px}

/* ── API BAR ── */
.api-bar{
background:var(–w);border:1px solid var(–g200);border-radius:14px;
padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
box-shadow:var(–shadow)
}
.api-bar label{font-size:12px;font-weight:600;color:var(–g700);white-space:nowrap}
.api-input{
flex:1;min-width:180px;border:1.5px solid var(–g200);border-radius:8px;
padding:7px 12px;font-size:12px;color:var(–g900);font-family:‘Courier New’,monospace;
background:var(–g50);outline:none;transition:border-color .15s
}
.api-input:focus{border-color:var(–teal);background:var(–w)}
.api-note{font-size:10px;color:var(–g500);width:100%;margin-top:2px}
.api-note a{color:var(–teal);text-decoration:none;font-weight:500}
.api-note a:hover{text-decoration:underline}

/* ── UPLOAD ── */
.up{
background:var(–w);border:2px dashed var(–g200);border-radius:16px;
margin-bottom:14px;cursor:pointer;transition:all .2s;box-shadow:var(–shadow)
}
.up:hover,.up.drag{border-color:var(–teal);background:var(–tealSoft)}
.up-body{padding:36px 24px;text-align:center}
.up-icon{
width:52px;height:52px;background:var(–tealSoft);border:1.5px solid #B8D8D2;
border-radius:14px;display:flex;align-items:center;justify-content:center;
margin:0 auto 14px;color:var(–teal)
}
.up h3{font-size:17px;font-weight:700;margin-bottom:5px;color:var(–g900)}
.up p{font-size:13px;color:var(–g500);margin-bottom:14px}
.chip{
display:inline-block;background:var(–g100);border:1px solid var(–g200);
border-radius:6px;padding:3px 9px;font-size:10px;color:var(–g700);font-weight:500;margin:3px
}
.up-btn{
display:inline-flex;align-items:center;gap:7px;background:var(–teal);
color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:13px;
font-weight:600;cursor:pointer;margin-top:12px;
box-shadow:0 2px 8px rgba(44,117,102,.3);transition:all .2s
}
.up-btn:hover{background:var(–teal3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(44,117,102,.35)}
.filter-bar{
background:var(–g50);border-top:1.5px solid var(–g100);
padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.filter-bar label{font-size:11.5px;font-weight:600;color:var(–g700)}
.day-btns{display:flex;gap:5px;flex-wrap:wrap}
.day-btn{
border:1.5px solid var(–g200);background:var(–w);border-radius:8px;
padding:5px 13px;font-size:11.5px;font-weight:500;color:var(–g700);cursor:pointer;
transition:all .15s
}
.day-btn:hover{border-color:var(–teal);color:var(–teal)}
.day-btn.active{background:var(–teal);border-color:var(–teal);color:#fff;font-weight:700}

/* ── PROGRESS ── */
.prog{
background:var(–w);border:1px solid var(–g200);border-radius:16px;
padding:32px;text-align:center;margin-bottom:14px;box-shadow:var(–shadow)
}
.prog h3{font-size:17px;font-weight:700;margin-bottom:5px}
.prog p{font-size:12px;color:var(–g500);margin-bottom:20px}
.pbar{background:var(–g100);border-radius:99px;height:7px;overflow:hidden;margin-bottom:16px}
.pfill{height:7px;border-radius:99px;background:linear-gradient(90deg,var(–teal2),var(–teal3));transition:width .5s ease}
.psteps{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.pstep{font-size:10px;color:var(–g300);font-weight:500;text-align:center;flex:1}
.pstep.on{color:var(–teal);font-weight:700}
.pstep.ok{color:var(–gr);font-weight:600}

/* ── STATS CARDS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.scard{
background:var(–w);border:1px solid var(–g200);border-radius:14px;
padding:16px;box-shadow:var(–shadow);position:relative;overflow:hidden
}
.scard::after{
content:’’;position:absolute;bottom:-10px;right:-10px;
width:60px;height:60px;border-radius:50%;opacity:.06
}
.scard:nth-child(1)::after{background:var(–teal)}
.scard:nth-child(2)::after{background:var(–re)}
.scard:nth-child(3)::after{background:var(–bl)}
.scard:nth-child(4)::after{background:var(–gr)}
.sval{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.sval.te{color:var(–teal)}.sval.re{color:var(–re)}.sval.bl{color:var(–bl)}.sval.gr{color:var(–gr)}
.slb{font-size:10.5px;color:var(–g500);font-weight:500}

/* ── DOWNLOAD BAR ── */
.dlc{
background:linear-gradient(135deg,var(–teal2),#0F3328);
border-radius:14px;padding:20px 26px;display:flex;align-items:center;
justify-content:space-between;gap:16px;margin-bottom:14px;
box-shadow:var(–shadow-md)
}
.dlc-txt h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px}
.dlc-txt p{font-size:11px;color:rgba(242,236,200,.6)}
.dlc-sheets{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.dlc-sh{
background:rgba(200,216,150,.12);border:1px solid rgba(200,216,150,.2);
border-radius:4px;padding:2px 8px;font-size:9px;color:var(–lime3)
}
.dlbtn{
background:var(–lime2);color:#fff;border:none;border-radius:10px;
padding:12px 22px;font-size:13px;font-weight:700;cursor:pointer;
white-space:nowrap;flex-shrink:0;
box-shadow:0 2px 8px rgba(122,148,72,.35);transition:all .2s
}
.dlbtn:hover{background:#8EA852;transform:translateY(-1px)}

/* ── TABLE CARDS ── */
.tcard{
background:var(–w);border:1px solid var(–g200);border-radius:14px;
overflow:hidden;margin-bottom:14px;box-shadow:var(–shadow)
}
.tcard-hdr{
padding:13px 18px;border-bottom:1px solid var(–g100);
display:flex;align-items:center;justify-content:space-between;
background:var(–g50)
}
.tcard-hdr h3{font-size:13px;font-weight:700;color:var(–g900)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{
background:var(–g50);padding:9px 12px;text-align:left;
font-weight:600;color:var(–g700);font-size:9.5px;
text-transform:uppercase;letter-spacing:.05em;
border-bottom:1.5px solid var(–g200);white-space:nowrap
}
td{
padding:9px 12px;border-bottom:1px solid var(–g100);
color:var(–g700);vertical-align:top;line-height:1.5
}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(–g50)}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 7px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.02em}
.bc{background:var(–reB);color:#7A1010}
.ba{background:var(–yeB);color:#7A4800}
.bm{background:var(–blB);color:#0F2D80}
.bb{background:var(–grB);color:#0A5020}
.bo{background:var(–yel);color:#8A5500;border:1px solid var(–yeB)}
.be{background:var(–bll);color:#103A90;border:1px solid var(–blB)}
.bce{background:var(–grl);color:#0A4A24;border:1px solid var(–grB)}
.bt{background:var(–pul);color:#3A0890;border:1px solid var(–puB)}

/* ── PENDING ITEMS ── */
.plist{display:flex;flex-direction:column;gap:8px;padding:12px 14px}
.pitem{
background:var(–g50);border:1px solid var(–g200);
border-left:3px solid var(–teal);border-radius:0 10px 10px 0;
padding:10px 14px;transition:all .15s
}
.pitem:hover{background:var(–w);box-shadow:var(–shadow)}
.pitem.cr{border-left-color:var(–re)}
.pitem.al{border-left-color:var(–ye)}
.pitem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.pitem-id{font-size:9px;font-weight:700;color:var(–g500);letter-spacing:.04em}
.pitem h4{font-size:12px;font-weight:700;color:var(–g900);margin-bottom:3px;line-height:1.3}
.pitem p{font-size:10.5px;color:var(–g500);line-height:1.45}
.pmeta{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.ptag{
font-size:9px;background:var(–w);border:1px solid var(–g200);
border-radius:4px;padding:2px 7px;color:var(–g700);font-weight:500
}

/* ── CHARTS ── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.crt{
background:var(–w);border:1px solid var(–g200);border-radius:14px;
padding:16px 18px;box-shadow:var(–shadow)
}
.crt h4{font-size:12px;font-weight:700;margin-bottom:12px;color:var(–g900)}
.brow{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.blbl{font-size:10px;color:var(–g500);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrk{flex:1;background:var(–g100);border-radius:99px;height:7px}
.bfil{height:7px;border-radius:99px;background:var(–teal);transition:width .4s ease}
.bfil.bl{background:var(–bl)}.bfil.re{background:var(–re)}.bfil.gr{background:var(–gr)}.bfil.ye{background:var(–ye)}.bfil.lm{background:var(–lime2)}.bfil.pu{background:var(–pu)}
.bnum{font-size:10.5px;font-weight:700;color:var(–g700);width:20px;text-align:right}

/* ── KPI ROWS ── */
.krow{
display:flex;align-items:center;gap:12px;
background:linear-gradient(90deg,var(–tealSoft),var(–w));
border:1px solid #C8DDD8;border-radius:10px;padding:10px 14px;margin-bottom:7px
}
.kval{font-size:20px;font-weight:800;color:var(–teal);width:68px;flex-shrink:0;line-height:1}
.kin{flex:1}
.kin .nm{font-size:11.5px;font-weight:600;color:var(–g900)}
.kin .ts{font-size:9.5px;color:var(–g500);margin-top:1px}
.kbar{width:80px;height:5px;background:var(–g200);border-radius:99px;flex-shrink:0}
.kbf{height:5px;border-radius:99px;background:var(–teal)}

/* ── PERSONA FILTER ── */
.pf-card{
background:var(–w);border:1px solid var(–g200);border-radius:14px;
overflow:hidden;margin-bottom:14px;box-shadow:var(–shadow)
}
.pf-hdr{
padding:13px 18px;border-bottom:1px solid var(–g100);
display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(–g50)
}
.pf-hdr h3{font-size:13px;font-weight:700;flex:1}
.pf-select{
border:1.5px solid var(–g200);border-radius:8px;padding:7px 12px;
font-size:11.5px;color:var(–g900);background:var(–w);outline:none;cursor:pointer;
min-width:170px;transition:border-color .15s
}
.pf-select:focus{border-color:var(–teal)}
.pf-clear{
background:var(–g100);border:1px solid var(–g200);border-radius:7px;
padding:6px 12px;font-size:11px;color:var(–g700);cursor:pointer;font-weight:500;
transition:background .15s
}
.pf-clear:hover{background:var(–g200)}
.pf-body{padding:16px 18px}
.pf-profile{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap}
.pf-avatar{
width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(–teal),var(–teal3));
display:flex;align-items:center;justify-content:center;color:#fff;
font-size:17px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(44,117,102,.3)
}
.pf-info{flex:1}
.pf-name{font-size:16px;font-weight:800;color:var(–g900);margin-bottom:3px}
.pf-dept{font-size:11px;color:var(–g500);margin-bottom:8px}
.pf-stats{display:flex;gap:8px;flex-wrap:wrap}
.pf-stat{
background:var(–g50);border:1.5px solid var(–g200);border-radius:9px;
padding:8px 14px;text-align:center;min-width:64px
}
.pf-stat-val{font-size:20px;font-weight:800;color:var(–teal);line-height:1}
.pf-stat-lbl{font-size:9px;color:var(–g500);margin-top:2px;font-weight:500}
.pf-stat.bl .pf-stat-val{color:var(–bl)}
.pf-stat.gr .pf-stat-val{color:var(–gr)}
.pf-stat.re .pf-stat-val{color:var(–re)}
.pf-section-title{
font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.1em;color:var(–teal);margin-bottom:8px;margin-top:6px
}
.pf-empty{font-size:13px;color:var(–g300);text-align:center;padding:24px 0}

/* ── BEFORE/AFTER ── */
.cmp{
display:grid;grid-template-columns:1fr 1fr;
border:1px solid var(–g200);border-radius:14px;overflow:hidden;
margin-bottom:14px;box-shadow:var(–shadow)
}
.cmpc{padding:20px 22px;background:var(–w)}
.cmpc.aft{background:var(–g50);border-left:1px solid var(–g200)}
.cmplbl{display:flex;align-items:center;gap:7px;margin-bottom:13px}
.cmpdot{width:8px;height:8px;border-radius:50%;background:var(–re)}
.cmpdot.g{background:var(–gr)}
.cmplbl span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(–g500)}
.cmrow{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.cmic{
width:20px;height:20px;border-radius:5px;background:var(–rel);
display:flex;align-items:center;justify-content:center;
flex-shrink:0;color:var(–re);font-size:10px;font-weight:700
}
.cmic.g{background:var(–grl);color:var(–gr)}
.cmrow p{font-size:12px;color:var(–g700);line-height:1.4;padding-top:1px}

/* ── MISC ── */
.resetbtn{
display:inline-flex;align-items:center;gap:5px;background:var(–g100);
border:1.5px solid var(–g200);border-radius:8px;padding:7px 14px;
font-size:11.5px;font-weight:500;color:var(–g700);cursor:pointer;
margin-bottom:14px;transition:all .15s
}
.resetbtn:hover{background:var(–g200)}
.errc{
background:var(–rel);border:1.5px solid var(–reB);border-radius:12px;
padding:14px 18px;margin-bottom:14px;color:var(–re);font-size:12.5px
}
.foot{
background:var(–w);border:1px solid var(–g200);border-radius:14px;
padding:16px 22px;display:flex;align-items:center;justify-content:space-between;
margin-top:14px;flex-wrap:wrap;gap:10px;box-shadow:var(–shadow)
}
.foot p{font-size:11px;color:var(–g500)}

/* ── SECTION DIVIDER ── */
.sec-div{
display:flex;align-items:center;gap:10px;margin:18px 0 12px;
}
.sec-div span{
font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.12em;color:var(–teal);white-space:nowrap
}
.sec-div::before,.sec-div::after{
content:’’;flex:1;height:1px;background:var(–g200)
}

@media(max-width:600px){
.stats{grid-template-columns:repeat(2,1fr)}
.charts{grid-template-columns:1fr}
.cmp{grid-template-columns:1fr}
.cmpc.aft{border-left:none;border-top:1px solid var(–g200)}
.hdr{padding:18px 16px;flex-direction:column;gap:12px}
.dlc{flex-direction:column}
#root{padding:12px 10px 40px}
.sval{font-size:22px}
}
</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
var _useState = React.useState;
var _useRef = React.useRef;
var _useCallback = React.useCallback;

// ── HELPERS ──────────────────────────────────────────────────────────────────

function to24h(h, min, sec, mer) {
  var hour = parseInt(h);
  var m = (mer || "").toLowerCase().replace(/[\s.]/g, "");
  if (m.indexOf("p") === 0 && hour !== 12) hour += 12;
  if (m.indexOf("a") === 0 && hour === 12) hour = 0;
  return {
    hour: hour,
    timeStr: String(hour).padStart(2,"0") + ":" + min + ":" + (sec || "00")
  };
}

function parseTurno(h) {
  if (h >= 6 && h < 14) return "1T";
  if (h >= 14 && h < 22) return "2T";
  return "3T";
}

function parseWhatsApp(txt) {
  var lines = txt.split(/\r?\n/);
  var msgs = [];
  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
  var cur = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].replace(/[\u200e\u200f\u202a\u202b\u202c\u202d\u202e\u202f]/g, "").trim();
    var m = line.match(reA) || line.match(reB);
    if (m) {
      if (cur) msgs.push(cur);
      var d, mo, yr, h2, min, sec, mer, sender, text;
      if (line.match(reA)) {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec=m[6]||"00"; mer=m[7]||""; sender=m[8]; text=m[9];
      } else {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec="00"; mer=""; sender=m[6]; text=m[7];
      }
      var year = parseInt(yr);
      if (year < 100) year += 2000;
      var t = to24h(h2, min, sec, mer);
      cur = {
        dateIso: year + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0"),
        dateDisp: String(d).padStart(2,"0") + "/" + String(mo).padStart(2,"0") + "/" + year,
        timeStr: t.timeStr,
        hour: t.hour,
        turno: parseTurno(t.hour),
        sender: sender.replace(/^~/,"").trim(),
        text: text.trim()
      };
    } else if (cur && line && !line.startsWith("[")) {
      cur.text += " " + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function cleanMsgs(msgs) {
  var skip = /imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|cifrados de extremo|ahora es admin/i;
  var noise = /^(buenos d|buenas t|buen d|gracias|de nada|enterado|recibido|entendido)/i;
  return msgs.filter(function(m){
    return m.text && m.text.trim().length > 8 && !m.text.match(skip) && !m.text.trim().match(noise);
  });
}

async function readZip(file) {
  var zip = await JSZip.loadAsync(file);
  var names = Object.keys(zip.files);
  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    if (name.endsWith(".txt") && !name.startsWith("__MACOSX")) {
      return await zip.files[name].async("string");
    }
  }
  throw new Error("No se encontro .txt en el ZIP");
}

    '"directorio":[{"nombre":"nombre","departamento":"area","rol":"rol","mensajes":0,"eventos":0,"area_owner":"area"}]}';

  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 6000,
      system: system,
      messages: [
        { role: "user", content: "Analiza " + msgs.length + " mensajes. Solo JSON:\n\n" + sample },
        { role: "assistant", content: "{" }
      ]
    })
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    if (resp.status === 401) throw new Error("API Key invalida. Verifica en console.anthropic.com");
    if (resp.status === 429) throw new Error("Limite de uso alcanzado. Espera e intenta de nuevo.");
    throw new Error((err.error && err.error.message) || ("Error API " + resp.status));
  }

  var data = await resp.json();
  if (!data.content || !data.content.length) throw new Error("Respuesta vacia. Intenta de nuevo.");

  var raw = "{" + data.content.map(function(b){ return b.text || ""; }).join("");

  ev.forEach(function(e){
    if(e.reporta && e.reporta !== "N/D") personaSet[e.reporta] = true;
    if(e.responsable_sugerido && e.responsable_sugerido !== "N/D") personaSet[e.responsable_sugerido] = true;
  });
  var personas = Object.keys(personaSet).sort();

  var evRep = personaFiltro ? ev.filter(function(e){ return e.reporta && e.reporta.toLowerCase().indexOf(personaFiltro.toLowerCase()) >= 0; }) : [];
  var evRes = personaFiltro ? ev.filter(function(e){ return e.responsable_sugerido && e.responsable_sugerido.toLowerCase().indexOf(personaFiltro.toLowerCase()) >= 0 && evRep.indexOf(e) === -1; }) : [];
  var dirInfo = result && result.directorio ? result.directorio.find(function(d){ return d.nombre && d.nombre.toLowerCase().indexOf(personaFiltro.toLowerCase()) >= 0; }) : null;

  function bprio(p) { return ({Critica:"badge bc",Alta:"badge ba",Media:"badge bm",Baja:"badge bb"})[p] || "badge"; }
  function best(s) { return ({Abierto:"badge bo","En proceso":"badge be",Cerrado:"badge bce"})[s] || "badge"; }

  function PendItem(props) {
    var e = props.e;
    return (
      <div className={"pitem" + (e.prioridad==="Critica"?" cr":e.prioridad==="Alta"?" al":"")}>
        <div className="pitem-top">
          <span className="pitem-id">{e.id} - {e.fecha} - {e.turno}</span>
          <span className={bprio(e.prioridad)}>{e.prioridad}</span>
        </div>
        <h4>{e.evento_detectado}</h4>
        <p>{e.accion_requerida}</p>
        <div className="pmeta">
          <span className="ptag">{e.linea_estacion}</span>
          <span className="ptag">{e.responsable_sugerido}</span>
          {e.modelo !== "N/D" && <span className="ptag">{e.modelo}</span>}
          {e.defecto_smt && e.defecto_smt !== "N/A" && <span className="badge bt">{e.defecto_smt}</span>}
          <span className={best(e.estatus)}>{e.estatus}</span>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-logo"><LogoSVG/></div>
        <div className="hdr-info">
          <div className="hdr-badge">Herramienta Operativa</div>
          <h1>Chat de manufactura a Dashboard SMT</h1>
          <h2>ZIP - Analisis IA - Excel - by ALDA</h2>
        </div>
      </div>

      {/* API KEY */}
      <div className="api-bar">
        <label>API Key:</label>
        <input className="api-input" type="password" placeholder="sk-ant-api03-..."
          value={apiKey} onChange={function(e){ saveKey(e.target.value); }}/>
        <div className="api-note">
          Guardada en este navegador.{" "}
          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer">
            console.anthropic.com
          </a>
        </div>
      </div>

      {/* IDLE */}
      {state === "idle" && (
        <div
          className={"up" + (drag ? " drag" : "")}
          onDragOver={function(e){ e.preventDefault(); setDrag(true); }}
          onDragLeave={function(){ setDrag(false); }}
          onDrop={function(e){ e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); }}
          onClick={function(){ fileRef.current.click(); }}
        >
          <div className="up-body">
            <input ref={fileRef} type="file" accept=".zip" style={{display:"none"}}
              onChange={function(e){ handle(e.target.files[0]); }}/>
            <div className="up-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
            </div>
            <h3>Sube el .zip de WhatsApp</h3>
            <p>Arrastra aqui o haz clic</p>
            <div>
              {["CALIDAD SMT/PTH","SMT Output","ERBU CRBU","Cualquier grupo"].map(function(t){
                return <span key={t} className="chip">{t}</span>;
              })}
            </div>
            <button className="up-btn" onClick={function(e){ e.stopPropagation(); fileRef.current.click(); }}>
              Seleccionar .zip
            </button>
          </div>
          <div className="filter-bar" onClick={function(e){ e.stopPropagation(); }}>
            <label>Ultimos:</label>
            <div className="day-btns">
              {[1,3,7,14,30].map(function(d){
                return (
                  <button key={d} className={"day-btn" + (days===d?" active":"")}
                    onClick={function(){ setDays(d); }}>
                    {d}d
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* LOADING */}
      {state === "loading" && (
        <div className="prog">
          <h3>Procesando chat...</h3>
          <p>{msgStats
            ? (msgStats.clean + " mensajes relevantes de " + msgStats.total + " totales")
            : "Leyendo ZIP..."}</p>
          <div className="pbar">
            <div className="pfill" style={{width: prog + "%"}}/>
          </div>
          <div className="psteps">
            {STEPS.map(function(s, i){
              return (
                <div key={i} className={"pstep" + (i===progStep?" on":i<progStep?" ok":"")}>
                  {i < progStep ? "ok " : ""}{s}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ERROR */}
      {state === "error" && (
        <div>
          <div className="errc">Error: {errMsg}</div>
          <button className="resetbtn" onClick={reset}>Intentar de nuevo</button>
        </div>
      )}

      {/* DONE */}
      {state === "done" && result && (
        <div>
          <button className="resetbtn" onClick={reset}>Analizar otro chat</button>

          {/* Download bar */}
          <div className="dlc">
            <div className="dlc-txt">
              <h3>Excel listo para junta</h3>
              <p>{(res.periodo || "") + " - " + ev.length + " eventos - " + ((msgStats && msgStats.clean) || 0) + " msgs"}</p>
              <div className="dlc-sheets">
                {["Resumen_Junta","Bitacora","Pendientes","KPIs_chat","Dashboard_Base","Directorio_Equipo","Catalogos_Reglas"].map(function(s){
                  return <span key={s} className="dlc-sh">{s}</span>;
                })}
              </div>
            </div>
            <button className="dlbtn" onClick={download}>Descargar .xlsx</button>
          </div>

          {/* Stats cards */}
          <div className="stats">
            <div className="scard"><div className="sval te">{ev.length}</div><div className="slb">Total eventos</div></div>
            <div className="scard"><div className="sval re">{crit.length}</div><div className="slb">Criticos</div></div>
            <div className="scard"><div className="sval bl">{pend.length}</div><div className="slb">Pendientes</div></div>
            <div className="scard"><div className="sval gr">{cerr.length}</div><div className="slb">Cerrados</div></div>
          </div>

          {/* KPIs */}
          {kpis.length > 0 && (
            <div className="tcard">
              <div className="tcard-hdr"><h3>KPIs en chat</h3></div>
              <div style={{padding:"10px 14px"}}>
                {kpis.map(function(k, i){
                  return (
                    <div key={i} className="krow">
                      <div className="kval">{k.valor}<span style={{fontSize:9}}>{k.unidad}</span></div>
                      <div className="kin">
                        <div className="nm">{k.indicador}</div>
                        <div className="ts">{k.fechahora} - {k.fuente}</div>
                      </div>
                      <div className="kbar">
                        <div className="kbf" style={{width: Math.min(100, k.valor < 2 ? k.valor*100 : k.valor) + "%"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Charts row 1 */}
          <div className="charts">
            <div className="crt">
              <h4>Por modelo</h4>
              {byMod.map(function(x,i){
                return (
                  <div key={i} className="brow">
                    <div className="blbl" title={x.l}>{x.l}</div>
                    <div className="btrk"><div className="bfil" style={{width:(x.n/mxM*100)+"%"}}/></div>
                    <div className="bnum">{x.n}</div>
                  </div>
                );
              })}
            </div>
            <div className="crt">
              <h4>Por linea</h4>
              {byLin.map(function(x,i){
                return (
                  <div key={i} className="brow">
                    <div className="blbl" title={x.l}>{x.l}</div>
                    <div className="btrk"><div className="bfil bl" style={{width:(x.n/mxL*100)+"%"}}/></div>
                    <div className="bnum">{x.n}</div>
                  </div>
                );
              })}
            </div>
            <div className="crt">
              <h4>Por prioridad</h4>
              {byPrio.map(function(x,i){
                return (
                  <div key={i} className="brow">
                    <div className="blbl">{x.l}</div>
                    <div className="btrk"><div className={"bfil " + x.c} style={{width:(x.n/mxP*100)+"%"}}/></div>
                    <div className="bnum">{x.n}</div>
                  </div>
                );
              })}
            </div>
            <div className="crt">
              <h4>Por estatus</h4>
              {[
                {l:"Abiertos",n:ev.filter(function(e){return e.estatus==="Abierto";}).length,c:"re"},
                {l:"En proceso",n:ev.filter(function(e){return e.estatus==="En proceso";}).length,c:"ye"},
                {l:"Cerrados",n:cerr.length,c:"gr"}
              ].map(function(x,i){
                return (
                  <div key={i} className="brow">
                    <div className="blbl">{x.l}</div>
                    <div className="btrk"><div className={"bfil " + x.c} style={{width:(x.n/Math.max(ev.length,1)*100)+"%"}}/></div>
                    <div className="bnum">{x.n}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Charts row 2 - SMT Pareto + Tipo */}
          {(byDef.length > 0 || byTipo.length > 0) && (
            <div className="charts">
              {byDef.length > 0 && (
                <div className="crt">
                  <h4>Pareto defectos SMT</h4>
                  {byDef.map(function(x,i){
                    return (
                      <div key={i} className="brow">
                        <div className="blbl" title={x.l}>{x.l}</div>
                        <div className="btrk"><div className="bfil pu" style={{width:(x.n/mxD*100)+"%"}}/></div>
                        <div className="bnum">{x.n}</div>
                      </div>
                    );
                  })}
                </div>
              )}
              {byTipo.length > 0 && (
                <div className="crt">
                  <h4>Por tipo de evento</h4>
                  {byTipo.map(function(x,i){
                    return (
                      <div key={i} className="brow">
                        <div className="blbl">{x.l}</div>
                        <div className="btrk"><div className="bfil lm" style={{width:(x.n/mxT*100)+"%"}}/></div>
                        <div className="bnum">{x.n}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Persona filter */}
          <div className="pf-card">
            <div className="pf-hdr">
              <h3>Filtro por persona</h3>
              <select className="pf-select" value={personaFiltro}
                onChange={function(e){ setPersonaFiltro(e.target.value); }}>
                <option value="">Todos los participantes</option>
                {personas.map(function(p,i){ return <option key={i} value={p}>{p}</option>; })}
              </select>
              {personaFiltro && (
                <button className="pf-clear" onClick={function(){ setPersonaFiltro(""); }}>Limpiar</button>
              )}
            </div>
            {personaFiltro ? (
              <div className="pf-body">
                <div className="pf-profile">
                  <div className="pf-avatar">{personaFiltro.charAt(0).toUpperCase()}</div>
                  <div className="pf-info">
                    <div className="pf-name">{personaFiltro}</div>
                    <div className="pf-dept">
                      {dirInfo ? (dirInfo.departamento + " - " + dirInfo.rol) : "Participante del chat"}
                    </div>
                    <div className="pf-stats">
                      <div className="pf-stat"><div className="pf-stat-val">{evRep.length}</div><div className="pf-stat-lbl">Reporto</div></div>
                      <div className="pf-stat bl"><div className="pf-stat-val">{evRes.length}</div><div className="pf-stat-lbl">Responsable</div></div>
                      <div className="pf-stat re"><div className="pf-stat-val">{evRep.filter(function(e){return e.prioridad==="Critica";}).length}</div><div className="pf-stat-lbl">Criticos</div></div>
                      <div className="pf-stat gr"><div className="pf-stat-val">{evRep.concat(evRes).filter(function(e){return e.estatus!=="Cerrado";}).length}</div><div className="pf-stat-lbl">Abiertos</div></div>
                    </div>
                  </div>
                </div>
                {evRep.length > 0 && (
                  <div>
                    <div className="pf-section-title">Eventos reportados ({evRep.length})</div>
                    <div className="plist" style={{padding:0,marginBottom:12}}>
                      {evRep.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
                    </div>
                  </div>
                )}
                {evRes.length > 0 && (
                  <div>
                    <div className="pf-section-title">Donde es responsable ({evRes.length})</div>
                    <div className="plist" style={{padding:0}}>
                      {evRes.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
                    </div>
                  </div>
                )}
                {evRep.length === 0 && evRes.length === 0 && (
                  <div className="pf-empty">Sin eventos para esta persona en el periodo</div>
                )}
              </div>
            ) : (
              <div className="pf-body">
                <div className="pf-empty">Selecciona una persona para ver su actividad</div>
              </div>
            )}
          </div>

          {/* Bitacora table */}
          <div className="tcard">
            <div className="tcard-hdr"><h3>Bitacora de eventos ({ev.length})</h3></div>
            <div className="tscroll">
              <table>
                <thead>
                  <tr>
                    <th>ID</th><th>Fecha</th><th>T</th><th>Linea</th>
                    <th>Tipo</th><th>Defecto SMT</th><th>Evento</th>
                    <th>Prioridad</th><th>Estatus</th>
                  </tr>
                </thead>
                <tbody>
                  {ev.map(function(e,i){
                    return (
                      <tr key={i}>
                        <td><strong>{e.id}</strong></td>
                        <td style={{whiteSpace:"nowrap",fontSize:10}}>{e.fecha}</td>
                        <td>{e.turno}</td>
                        <td style={{maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.linea_estacion}</td>
                        <td><span style={{fontSize:9,background:"#EDF5F3",color:"#1E5545",padding:"2px 5px",borderRadius:4,fontWeight:600}}>{e.tipo_evento}</span></td>
                        <td style={{maxWidth:100}}>
                          {e.defecto_smt && e.defecto_smt !== "N/A"
                            ? <span className="badge bt" style={{fontSize:8.5,whiteSpace:"normal"}}>{e.defecto_smt}</span>
                            : <span style={{color:"#C8C2BA",fontSize:10}}>-</span>}
                        </td>
                        <td style={{maxWidth:170,fontSize:10.5}}>{e.evento_detectado}</td>
                        <td><span className={bprio(e.prioridad)}>{e.prioridad}</span></td>
                        <td><span className={best(e.estatus)}>{e.estatus}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Pendientes */}
          {pend.length > 0 && (
            <div className="tcard" style={{marginTop:14}}>
              <div className="tcard-hdr"><h3>Pendientes operativos ({pend.length})</h3></div>
              <div className="plist">
                {pend.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
              </div>
            </div>
          )}

          {/* Before/After */}
          <div className="cmp" style={{marginTop:14}}>
            <div className="cmpc">
              <div className="cmplbl"><div className="cmpdot"/><span>Antes</span></div>
              {["Sin clasificacion SMT","Sin trazabilidad por turno","Eventos con ruido","Juntas sin datos"].map(function(t,i){
                return <div key={i} className="cmrow"><div className="cmic">X</div><p>{t}</p></div>;
              })}
            </div>
            <div className="cmpc aft">
              <div className="cmplbl"><div className="cmpdot g"/><span>Despues SMTintel</span></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>{ev.length} eventos</strong> con defecto SMT</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>Pareto</strong> para root cause</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>{pend.length} pendientes</strong> con owner</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p>Excel 7 hojas en minutos</p></div>
            </div>
          </div>

          {/* Footer */}
          <div className="foot">
            <p><strong>SMTintel by ALDA</strong> - Manufacturing Analytics - {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"8px 16px",fontSize:12}} onClick={download}>Descargar Excel</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
