<script type="text/babel">
const { useState, useRef, useCallback } = React;

// ── HELPERS ──────────────────────────────────────────────────────────────────

function to24h(h, min, sec, mer) {
  let hour = parseInt(h);
  const m = (mer || "").toLowerCase().replace(/[\s.]/g, "");
  if (m.startsWith("p") && hour !== 12) hour += 12;
  if (m.startsWith("a") && hour === 12) hour = 0;
  return { hour, timeStr: `${String(hour).padStart(2,"0")}:${min}:${sec||"00"}` };
}

function parseTurno(h) {
  if (h >= 6 && h < 14) return "1T";
  if (h >= 14 && h < 22) return "2T";
  return "3T";
}

function parseWhatsApp(txt) {
  const lines = txt.split(/\r?\n/);
  const msgs = [];
  // Format A: [DD/MM/YY, H:MM:SS a.m.] Name: text
  const reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  // Format B: DD/MM/YYYY, HH:MM - Name: text
  const reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM|a\.m\.|p\.m\.)?\s*[-–]\s*([^:]+?):\s*(.*)$/i;
  let cur = null;
  for (const raw of lines) {
    const line = raw.replace(/[\u200e\u200f\u202a-\u202e‎]/g, "").trim();
    const m = line.match(reA) || line.match(reB);
    if (m) {
      if (cur) msgs.push(cur);
      const [, d, mo, yr, h, min, sec, mer, sender, text] = m;
      let year = parseInt(yr); if (year < 100) year += 2000;
      const { hour, timeStr } = to24h(h, min, sec, mer || "");
      const dateIso = `${year}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dateDisp = `${String(d).padStart(2,"0")}/${String(mo).padStart(2,"0")}/${year}`;
      cur = { dateIso, dateDisp, timeStr, hour, turno: parseTurno(hour), sender: sender.replace(/^~/,"").trim(), text: text.trim() };
    } else if (cur && line && !line.startsWith("[")) {
      cur.text += " " + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  const sorted = [...msgs].sort((a,b) => a.dateIso.localeCompare(b.dateIso));
  const last = new Date(sorted[sorted.length-1].dateIso);
  const cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  const cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(m => m.dateIso >= cutStr);
}

function cleanMsgs(msgs) {
  const skip = /imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|Se te añadió|creó este grupo|cifrados de extremo|agregó a|salió del grupo|cambió el|ahora es admin|Se editó este mensaje/i;
  const noise = /^(buenos d|buenas t|buenas n|buen d|buen día|gracias|de nada|ok\b|oki|👍|🙏|ahí paso|ahi paso|ahí van|con permiso|disculpe|perdón|por favor|porfavor|hasta luego|con gusto|claro que|sale 👍|sale$|enterado$|recibido$|entendido$|\bsi\b$|\bno\b$)/i;
  return msgs.filter(m =>
    m.text &&
    m.text.trim().length > 8 &&
    !m.text.match(skip) &&
    !m.text.trim().match(noise)
  );
}

async function readZip(file) {
  const zip = await JSZip.loadAsync(file);
  for (const name of Object.keys(zip.files)) {
    if (name.endsWith(".txt") && !name.startsWith("__MACOSX")) {
      return await zip.files[name].async("string");
    }
  }
  throw new Error("No se encontró archivo .txt dentro del ZIP. Verifica que sea una exportación de WhatsApp.");
}

async function analyzeWithAI(msgs, apiKey) {
  // Limit to 150 msgs max to prevent JSON truncation on dense chats
  const sample = msgs.slice(0, 150).map(m =>
    `[${m.dateDisp} ${m.timeStr}|${m.turno}|${m.sender}]:${m.text}`
  ).join("\n");

  const system = `Experto en manufactura SMT/PCB/PTH. Extrae SOLO eventos operativos accionables de mensajes WhatsApp de manufactura.

INCLUIR: paros línea, defectos calidad, equivocados componente, cambios modelo, FAI, LCR vencido, falta material, rollo mal cargado, RMA, AOI/ICT, seguridad, llenado barril, inversión componentes, daño físico, problemas sistema.
EXCLUIR: saludos, ok, gracias, confirmaciones simples, emojis solos, mensajes sin evento.

Máximo 15 eventos. Descripciones cortas (máx 80 chars). JSON ÚNICAMENTE sin texto extra:
{"eventos":[{"id":"EVT-001","fecha":"DD/MM/YYYY","hora":"HH:MM","turno":"1T|2T|3T","modelo":"N/P o N/D","linea_estacion":"L1|etc","reporta":"nombre","area_involucrada":"área","tipo_evento":"categoría","evento_detectado":"descripción","impacto":"impacto","accion_requerida":"acción","responsable_sugerido":"responsable","estatus":"Abierto|En proceso|Cerrado","prioridad":"Crítica|Alta|Media|Baja","fuente_chat":"DD/MM/YY HH:MM nombre","notas":""}],"kpis":[{"fechahora":"DD/MM/YYYY HH:MM","indicador":"nombre","valor":0.0,"unidad":"%","fuente":"nombre"}],"resumen":{"periodo":"DD/MM/YYYY a DD/MM/YYYY","grupo":"nombre grupo","total_eventos":0,"alertas_criticas":["alerta"],"acciones_pendientes":["accion"],"estatus_lineas":["linea"]},"directorio":[{"nombre":"nombre","departamento":"área","rol":"rol","mensajes":0,"eventos":0,"area_owner":"área"}]}`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 6000,
      system,
      messages: [
        { role: "user", content: `Analiza estos ${msgs.length} mensajes del grupo de manufactura. Responde ÚNICAMENTE con el JSON, sin texto antes ni después:\n\n${sample}` },
        { role: "assistant", content: "{" }
      ]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    const msg = err.error?.message || `Error API ${resp.status}`;
    if (resp.status === 401) throw new Error("API Key inválida. Verifica tu clave en console.anthropic.com");
    if (resp.status === 429) throw new Error("Límite de uso alcanzado. Espera un momento e intenta de nuevo.");
    throw new Error(msg);
  }
  const data = await resp.json();
  if (!data.content?.length) throw new Error("Respuesta vacía de la API. Intenta de nuevo.");
  const txt = "{" + data.content.map(b => b.text || "").join("");
  // Robust JSON extraction: strip markdown fences, find outermost { }
  const stripped = txt.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  const start = stripped.indexOf("{");
  const end = stripped.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("La IA no devolvió JSON válido. Intenta de nuevo o reduce el rango de días.");
  const jsonStr = stripped.slice(start, end + 1);
  try {
    return JSON.parse(jsonStr);
  } catch(parseErr) {
    // Try to salvage truncated JSON by closing open structures
    const fixed = jsonStr
      .replace(/,\s*$/, "")           // trailing comma
      .replace(/,\s*\]/, "]")          // trailing comma in array
      .replace(/,\s*\}/, "}")          // trailing comma in object
      + (jsonStr.split("{").length > jsonStr.split("}").length ? "}" : "")
      + (jsonStr.split("[").length > jsonStr.split("]").length ? "]}" : "");
    try {
      return JSON.parse(fixed);
    } catch {
      throw new Error("Error al procesar la respuesta. Intenta con menos días (1 o 3) para reducir el tamaño.");
    }
  }
}

  const STEPS = ["Leyendo ZIP","Parseando mensajes","Filtrando eventos","Analizando con IA","Generando Excel"];

  const handle = useCallback(async (file) => {
    if (!file || !file.name.endsWith(".zip")) { setErrMsg("Sube un archivo .zip exportado de WhatsApp"); setState("error"); return; }
    if (!apiKey.trim()) { setErrMsg("Ingresa tu API Key de Anthropic para continuar"); setState("error"); return; }
    setState("loading"); setProg(8); setProgStep(0);

      if (!clean.length) throw new Error(`No hay mensajes operativos en los últimos ${days} días. Aumenta el rango.`);
      setProgStep(3); setProg(55);
      const res = await analyzeWithAI(clean, apiKey.trim());
      setProgStep(4); setProg(82);
      const bytes = await buildXlsx(res, clean);
      setProg(100); setResult(res); setXlsxBytes(bytes); setState("done");

          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer">console.anthropic.com</a>
        </div>
      </div>

      {/* IDLE */}
      {state === "idle" && (
        <div
          className={`up ${drag?"drag":""}`}
          onDragOver={e=>{e.preventDefault();setDrag(true)}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0])}}
          onClick={()=>fileRef.current.click()}
        >
          <div className="up-top">
            <input ref={fileRef} type="file" accept=".zip" style={{display:"none"}} onChange={e=>handle(e.target.files[0])} />
            <div className="up-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            </div>
            <h3>Sube el archivo .zip de WhatsApp</h3>
            <p>Arrastra aquí o haz clic — funciona con cualquier grupo de manufactura</p>
            <div>
              {["CALIDAD SMT/PTH","SMT Output","ERBU CRBU PCBA","Cualquier grupo"].map(t=><span key={t} className="chip">{t}</span>)}
            </div>
            <button className="up-btn" onClick={e=>{e.stopPropagation();fileRef.current.click()}}>
              Seleccionar archivo .zip
            </button>
          </div>
          <div className="filter-bar" onClick={e=>e.stopPropagation()}>
            <label>Analizar los últimos:</label>
            <div className="day-btns">
              {[1,3,7,14,30].map(d=>(
                <button key={d} className={`day-btn ${days===d?"active":""}`} onClick={()=>setDays(d)}>{d} día{d>1?"s":""}</button>
              ))}
            </div>
            <div className="filter-note">El chat puede tener años de historial — filtra solo el periodo relevante</div>
          </div>
        </div>
      )}

      {/* LOADING */}
      {state === "loading" && (
        <div className="prog">
          <h3>Procesando chat de manufactura...</h3>
          <p>{msgStats ? `${msgStats.clean} mensajes relevantes de ${msgStats.filtered} en los últimos ${days} días` : "Leyendo archivo ZIP..."}</p>
          <div className="pbar"><div className="pfill" style={{width:`${prog}%`}} /></div>
          <div className="psteps">
            {STEPS.map((s,i)=><div key={i} className={`pstep ${i===progStep?"on":i<progStep?"ok":""}`}>{i<progStep?"✓ ":""}{s}</div>)}
          </div>
        </div>
      )}

      {/* ERROR */}
      {state === "error" && (
        <><div className="errc">⚠ {errMsg}</div><button className="resetbtn" onClick={reset}>← Intentar de nuevo</button></>
      )}

      {/* DONE */}
      {state === "done" && result && (
        <>
          <button className="resetbtn" onClick={reset}>← Analizar otro chat</button>

          <div className="dlc">
            <div className="dlc-txt">
              <h3>Excel listo para junta ✓</h3>
              <p>{res.periodo||""} · {ev.length} eventos · {msgStats?.clean||0} mensajes analizados</p>
              <div className="dlc-sheets">
                {["Resumen_Junta","Bitacora","Pendientes","KPIs_chat","Dashboard_Base","Directorio_Equipo","Catalogos_Reglas"].map(s=>(
                  <div key={s} className="dlc-sh">▪ {s}</div>
                ))}
              </div>
            </div>
            <button className="dlbtn" onClick={download}>⬇ Descargar .xlsx</button>
          </div>

          <div className="stats">
            <div className="scard"><div className="sval or">{ev.length}</div><div className="slb">Total eventos</div></div>
            <div className="scard"><div className="sval re">{crit.length}</div><div className="slb">Críticos activos</div></div>
            <div className="scard"><div className="sval bl">{pend.length}</div><div className="slb">Pendientes</div></div>
            <div className="scard"><div className="sval gr">{cerr.length}</div><div className="slb">Cerrados</div></div>
          </div>

          {kpis.length > 0 && (
            <div className="tcard">
              <div className="tcard-hdr"><h3>KPIs reportados en chat</h3></div>
              <div style={{padding:"12px 16px"}}>
                {kpis.map((k,i)=>(
                  <div key={i} className="krow">
                    <div className="kval">{k.valor}<span style={{fontSize:11}}>{k.unidad}</span></div>
                    <div className="kin"><div className="nm">{k.indicador}</div><div className="ts">{k.fechahora} · {k.fuente}</div></div>
                    <div className="kbar"><div className="kbf" style={{width:`${Math.min(100,k.valor<2?k.valor*100:k.valor)}%`}} /></div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="charts">
            <div className="crt">
              <h4>Por modelo / N/P</h4>
              {byMod.map((x,i)=><div key={i} className="brow"><div className="blbl" title={x.l}>{x.l}</div><div className="btrk"><div className="bfil" style={{width:`${(x.n/mxM)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}
            </div>
            <div className="crt">
              <h4>Por línea / estación</h4>
              {byLin.map((x,i)=><div key={i} className="brow"><div className="blbl" title={x.l}>{x.l}</div><div className="btrk"><div className="bfil bl" style={{width:`${(x.n/mxL)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}
            </div>
            <div className="crt">
              <h4>Por prioridad</h4>
              {byPrio.map((x,i)=><div key={i} className="brow"><div className="blbl">{x.l}</div><div className="btrk"><div className={`bfil ${x.c}`} style={{width:`${(x.n/mxP)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}
            </div>
            <div className="crt">
              <h4>Por estatus</h4>
              {[{l:"Abiertos",n:ev.filter(e=>e.estatus==="Abierto").length,c:"re"},{l:"En proceso",n:ev.filter(e=>e.estatus==="En proceso").length,c:"ye"},{l:"Cerrados",n:cerr.length,c:"gr"}].map((x,i)=>(
                <div key={i} className="brow"><div className="blbl">{x.l}</div><div className="btrk"><div className={`bfil ${x.c}`} style={{width:`${(x.n/Math.max(ev.length,1))*100}%`}}/></div><div className="bnum">{x.n}</div></div>
              ))}
            </div>
          </div>

          {/* ── FILTRO POR PERSONA ── */}
          {(() => {
            const personas = [...new Set([
              ...ev.map(e=>e.reporta),
              ...ev.map(e=>e.responsable_sugerido)
            ].filter(p=>p&&p!=="N/D"&&p.length>1))].sort();
            const evReportados  = personaFiltro ? ev.filter(e=>e.reporta?.toLowerCase().includes(personaFiltro.toLowerCase())) : [];
            const evResponsable = personaFiltro ? ev.filter(e=>e.responsable_sugerido?.toLowerCase().includes(personaFiltro.toLowerCase())&&!evReportados.includes(e)) : [];
            const dirInfo = result?.directorio?.find(d=>d.nombre?.toLowerCase().includes(personaFiltro.toLowerCase()));
            const criticos = evReportados.filter(e=>e.prioridad==="Crítica").length;
            const abiertos = [...evReportados,...evResponsable].filter(e=>e.estatus!=="Cerrado").length;
            return (
              <div className="pf-card">
                <div className="pf-hdr">
                  <h3>👤 Filtro por persona</h3>
                  <select className="pf-select" value={personaFiltro} onChange={e=>setPersonaFiltro(e.target.value)}>
                    <option value="">— Selecciona una persona —</option>
                    {personas.map((p,i)=><option key={i} value={p}>{p}</option>)}
                  </select>
                  {personaFiltro&&<button className="pf-clear" onClick={()=>setPersonaFiltro("")}>✕ Limpiar</button>}
                </div>
                {personaFiltro ? (
                  <div className="pf-body">
                    <div className="pf-profile">
                      <div className="pf-avatar">{personaFiltro.charAt(0).toUpperCase()}</div>
                      <div className="pf-info">
                        <div className="pf-name">{personaFiltro}</div>
                        <div className="pf-dept">{dirInfo?`${dirInfo.departamento} · ${dirInfo.rol}${dirInfo.area_owner?` · Owner: ${dirInfo.area_owner}`:""}` : "Participante del chat"}</div>
                        <div className="pf-stats">
                          <div className="pf-stat"><div className="pf-stat-val">{evReportados.length}</div><div className="pf-stat-lbl">Reportó</div></div>
                          <div className="pf-stat bl"><div className="pf-stat-val">{evResponsable.length}</div><div className="pf-stat-lbl">Es responsable</div></div>
                          <div className="pf-stat re"><div className="pf-stat-val">{criticos}</div><div className="pf-stat-lbl">Críticos</div></div>
                          <div className="pf-stat gr"><div className="pf-stat-val">{abiertos}</div><div className="pf-stat-lbl">Abiertos</div></div>
                        </div>
                      </div>
                    </div>
                    {evReportados.length>0&&(<>
                      <div className="pf-section-title">Eventos que reportó ({evReportados.length})</div>
                      <div className="plist" style={{padding:0,marginBottom:14}}>
                        {evReportados.map((e,i)=>(
                          <div key={i} className={`pitem ${e.prioridad==="Crítica"?"cr":e.prioridad==="Alta"?"al":""}`}>
                            <div className="pitem-top"><span className="pitem-id">{e.id} · {e.fecha} · {e.turno}</span><span className={bprio(e.prioridad)}>{e.prioridad}</span></div>
                            <h4>{e.evento_detectado}</h4><p>{e.accion_requerida}</p>
                            <div className="pmeta">
                              <span className="ptag">📍 {e.linea_estacion}</span>
                              {e.modelo!=="N/D"&&<span className="ptag">{e.modelo}</span>}
                              <span className={best(e.estatus)}>{e.estatus}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </>)}
                    {evResponsable.length>0&&(<>
                      <div className="pf-section-title">Eventos donde es responsable ({evResponsable.length})</div>
                      <div className="plist" style={{padding:0}}>
                        {evResponsable.map((e,i)=>(
                          <div key={i} className={`pitem ${e.prioridad==="Crítica"?"cr":e.prioridad==="Alta"?"al":""}`} style={{borderLeftColor:"var(--bl)"}}>
                            <div className="pitem-top"><span className="pitem-id">{e.id} · {e.fecha} · {e.turno}</span><span className={bprio(e.prioridad)}>{e.prioridad}</span></div>
                            <h4>{e.evento_detectado}</h4><p>{e.accion_requerida}</p>
                            <div className="pmeta">
                              <span className="ptag">📍 {e.linea_estacion}</span>
                              {e.modelo!=="N/D"&&<span className="ptag">{e.modelo}</span>}
                              <span className="ptag">Reportó: {e.reporta}</span>
                              <span className={best(e.estatus)}>{e.estatus}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </>)}
                    {evReportados.length===0&&evResponsable.length===0&&(
                      <div className="pf-empty">Sin eventos registrados para esta persona en el periodo</div>
                    )}
                  </div>
                ):(
                  <div className="pf-body"><div className="pf-empty">Selecciona una persona para ver su actividad operativa del periodo</div></div>
                )}
              </div>
            );
          })()}

          <div className="tcard">
            <div className="tcard-hdr"><h3>Bitácora de eventos ({ev.length})</h3></div>
            <div className="tscroll">
              <table>
                <thead><tr><th>ID</th><th>Fecha</th><th>T</th><th>Modelo</th><th>Línea</th><th>Tipo evento</th><th>Prioridad</th><th>Estatus</th></tr></thead>
                <tbody>
                  {ev.map((e,i)=>(
                    <tr key={i}>
                      <td><strong>{e.id}</strong></td>
                      <td style={{whiteSpace:"nowrap"}}>{e.fecha}</td>
                      <td>{e.turno}</td>
                      <td style={{maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.modelo}</td>
                      <td>{e.linea_estacion}</td>
                      <td style={{maxWidth:150}}>{e.tipo_evento}</td>
                      <td><span className={bprio(e.prioridad)}>{e.prioridad}</span></td>
                      <td><span className={best(e.estatus)}>{e.estatus}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {pend.length > 0 && (
            <div className="tcard" style={{marginTop:16}}>
              <div className="tcard-hdr"><h3>Pendientes operativos ({pend.length})</h3></div>
              <div className="plist">
                {pend.map((e,i)=>(
                  <div key={i} className={`pitem ${e.prioridad==="Crítica"?"cr":e.prioridad==="Alta"?"al":""}`}>
                    <div className="pitem-top"><span className="pitem-id">{e.id} · {e.fecha} · {e.turno}</span><span className={bprio(e.prioridad)}>{e.prioridad}</span></div>
                    <h4>{e.evento_detectado}</h4>
                    <p>{e.accion_requerida}</p>
                    <div className="pmeta">
                      <span className="ptag">📍 {e.linea_estacion}</span>
                      <span className="ptag">👤 {e.responsable_sugerido}</span>
                      {e.modelo !== "N/D" && <span className="ptag">{e.modelo}</span>}
                      <span className={best(e.estatus)}>{e.estatus}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{marginTop:16,marginBottom:8}} className="tcard-hdr"><h3 style={{color:"var(--or)",fontSize:11,letterSpacing:".08em",textTransform:"uppercase"}}>● Resultado del análisis</h3></div>
          <div className="cmp">
            <div className="cmpc">
              <div className="cmplbl"><div className="cmpdot"></div><span>Antes — Chat disperso</span></div>
              {["Información sin estructura ni trazabilidad","Imposible identificar qué sigue pendiente","Eventos críticos mezclados con ruido","Juntas sin datos claros ni historial"].map((t,i)=>(
                <div key={i} className="cmrow"><div className="cmic">✕</div><p>{t}</p></div>
              ))}
            </div>
            <div className="cmpc aft">
              <div className="cmplbl"><div className="cmpdot g"></div><span>Después — Dashboard SMT</span></div>
              <div className="cmrow"><div className="cmic g">✓</div><p><strong>{ev.length} eventos</strong> clasificados por turno, línea y prioridad</p></div>
              <div className="cmrow"><div className="cmic g">✓</div><p><strong>{pend.length} pendientes</strong> con responsable y acción concreta</p></div>
              <div className="cmrow"><div className="cmic g">✓</div><p><strong>{crit.length} críticos</strong> identificados para atención inmediata</p></div>
              <div className="cmrow"><div className="cmic g">✓</div><p>Excel con 6 hojas listo en minutos, no horas</p></div>
            </div>
          </div>

          <div className="foot">
            <p><strong>Dashboard SMT</strong> · Powered by Claude AI · {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"9px 18px",fontSize:12}} onClick={download}>⬇ Descargar Excel</button>
          </div>
        </>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
