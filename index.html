<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMTintel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F1EE;
  --w:#FFFFFF;
  --g50:#F8F7F5;--g100:#EEECEA;--g200:#DDDBD7;--g300:#B8B4AE;
  --g500:#8A8580;--g700:#3D3A36;--g900:#1A1714;
  --green:#1E5C48;--green2:#2A7A60;--green3:#48A882;
  --lime:#6B8C3A;--limeL:#EAF0DC;
  --re:#C0392B;--reL:#FDF0EE;
  --bl:#2952A3;--blL:#EBF0FC;
  --gr:#1A7A3C;--grL:#EBF8EE;
  --ye:#B87820;--yeL:#FBF5E6;
  --pu:#6B2DA8;--puL:#F2ECFB;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --shadow:0 2px 6px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08),0 16px 40px rgba(0,0,0,.07);
  --radius:14px;
  --radius-sm:8px;
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#F4F3F0;color:var(--g900);min-height:100vh;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em
}
#root{max-width:820px;margin:0 auto;padding:32px 20px 80px}

/* ── HEADER ── */
.hdr{
background:var(–green);
border-radius:20px;padding:28px 32px;margin-bottom:20px;
display:flex;align-items:center;gap:22px;
position:relative;overflow:hidden;
box-shadow:0 4px 20px rgba(30,92,72,.25)
}
.hdr::before{
content:’’;position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);
pointer-events:none
}
.hdr::after{
content:’’;position:absolute;right:-40px;top:-40px;
width:200px;height:200px;border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%)
}
.hdr-logo{flex-shrink:0;position:relative;z-index:1}
.hdr-info{position:relative;z-index:1}
.hdr-badge{
display:inline-flex;align-items:center;
background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
color:rgba(255,255,255,.85);font-size:8.5px;font-weight:700;
letter-spacing:.14em;text-transform:uppercase;
padding:3px 10px;border-radius:99px;margin-bottom:8px
}
.hdr-info h1{font-size:15px;font-weight:500;color:rgba(255,255,255,.95);margin-bottom:3px}
.hdr-info h2{font-size:11px;color:rgba(255,255,255,.45);font-weight:400}

/* ── API BAR ── */
.api-bar{
background:var(–w);border:1px solid var(–g200);border-radius:var(–radius);
padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
box-shadow:var(–shadow-sm)
}
.api-bar label{font-size:12px;font-weight:600;color:var(–g700);white-space:nowrap}
.api-input{
flex:1;min-width:180px;border:1.5px solid var(–g200);border-radius:var(–radius-sm);
padding:8px 12px;font-size:12px;color:var(–g900);font-family:‘Courier New’,monospace;
background:var(–g50);outline:none;transition:border-color .15s,box-shadow .15s
}
.api-input:focus{border-color:var(–green);box-shadow:0 0 0 3px rgba(30,92,72,.1)}
.api-note{font-size:10px;color:var(–g500);width:100%;margin-top:3px}
.api-note a{color:var(–green2);text-decoration:none;font-weight:500}

/* ── UPLOAD ── */
.up{
background:var(–w);border:2px dashed var(–g200);border-radius:var(–radius);
margin-bottom:16px;cursor:pointer;transition:all .2s;box-shadow:var(–shadow-sm)
}
.up:hover,.up.drag{border-color:var(–green3);background:#F0F8F5}
.up-body{padding:40px 24px;text-align:center}
.up-icon{
width:56px;height:56px;background:#EAF5F0;border:1.5px solid #B8DECE;
border-radius:16px;display:flex;align-items:center;justify-content:center;
margin:0 auto 16px;color:var(–green2)
}
.up h3{font-size:19px;font-weight:700;margin-bottom:6px;color:var(–g900)}
.up p{font-size:13px;color:var(–g500);margin-bottom:16px}
.chip{
display:inline-block;background:var(–g100);border:1px solid var(–g200);
border-radius:99px;padding:3px 12px;font-size:10px;color:var(–g700);font-weight:500;margin:3px
}
.up-btn{
display:inline-flex;align-items:center;gap:8px;background:var(–green);
color:#fff;border:none;border-radius:10px;padding:12px 26px;font-size:13.5px;
font-weight:600;cursor:pointer;margin-top:14px;letter-spacing:-.01em;
box-shadow:0 2px 10px rgba(30,92,72,.3);transition:all .2s
}
.up-btn:hover{background:var(–green2);box-shadow:0 4px 14px rgba(30,92,72,.35);transform:translateY(-1px)}
.filter-bar{
background:var(–g50);border-top:1px solid var(–g100);
padding:13px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.filter-bar label{font-size:12px;font-weight:600;color:var(–g700)}
.day-btns{display:flex;gap:5px;flex-wrap:wrap}
.day-btn{
border:1.5px solid var(–g200);background:var(–w);border-radius:99px;
padding:5px 14px;font-size:12px;font-weight:500;color:var(–g500);cursor:pointer;transition:all .15s
}
.day-btn:hover{border-color:var(–green);color:var(–green)}
.day-btn.active{background:var(–green);border-color:var(–green);color:#fff;font-weight:600}

/* ── PROGRESS ── */
.prog{
background:var(–w);border:1px solid var(–g200);border-radius:var(–radius);
padding:36px;text-align:center;margin-bottom:16px;box-shadow:var(–shadow-sm)
}
.prog h3{font-size:18px;font-weight:700;margin-bottom:5px;color:var(–g900)}
.prog p{font-size:12.5px;color:var(–g500);margin-bottom:22px}
.pbar{background:var(–g100);border-radius:99px;height:6px;overflow:hidden;margin-bottom:18px}
.pfill{height:6px;border-radius:99px;background:linear-gradient(90deg,var(–green),var(–green3));transition:width .5s ease}
.psteps{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.pstep{font-size:10px;color:var(–g300);font-weight:500;text-align:center;flex:1}
.pstep.on{color:var(–green);font-weight:700}
.pstep.ok{color:var(–gr);font-weight:600}

/* ── TABLE CARDS ── */
.tcard{
background:var(–w);border:1px solid var(–g200);border-radius:var(–radius);
overflow:hidden;margin-bottom:16px;box-shadow:var(–shadow-sm)
}
.tcard-hdr{
padding:14px 20px;border-bottom:1px solid var(–g100);
display:flex;align-items:center;justify-content:space-between;background:var(–g50)
}
.tcard-hdr h3{font-size:13.5px;font-weight:700;color:var(–g900)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{
background:var(–g50);padding:9px 14px;text-align:left;
font-weight:600;color:var(–g500);font-size:10px;
text-transform:uppercase;letter-spacing:.05em;
border-bottom:1.5px solid var(–g200);white-space:nowrap
}
td{padding:10px 14px;border-bottom:1px solid var(–g100);color:var(–g700);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(–g50)}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:.01em}
.bc{background:#FCE8E6;color:#922B21}.ba{background:#FEF6E0;color:#8A5C10}
.bm{background:#EBF0FC;color:#1E3C82}.bb{background:#EBF8EE;color:#145A28}
.bo{background:#FEF6E0;color:#8A5C10;border:1px solid #F5DFA0}
.be{background:#EBF0FC;color:#2040A0;border:1px solid #BDD0F8}
.bce{background:#EBF8EE;color:#145A28;border:1px solid #A0DEB4}
.bt{background:#F2ECFB;color:#521DA8;border:1px solid #C8A8F0}

/* ── PENDING ITEMS ── */
.plist{display:flex;flex-direction:column;gap:8px;padding:14px}
.pitem{
background:var(–g50);border:1px solid var(–g200);
border-left:3px solid var(–green2);border-radius:0 10px 10px 0;
padding:11px 14px;transition:all .15s
}
.pitem:hover{background:var(–w);box-shadow:var(–shadow-sm);transform:translateX(2px)}
.pitem.cr{border-left-color:var(–re)}.pitem.al{border-left-color:var(–ye)}
.pitem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.pitem-id{font-size:9.5px;font-weight:700;color:var(–g400,var(–g300));letter-spacing:.04em}
.pitem h4{font-size:12.5px;font-weight:700;color:var(–g900);margin-bottom:3px;line-height:1.3}
.pitem p{font-size:11px;color:var(–g500);line-height:1.45}
.pmeta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ptag{font-size:9.5px;background:var(–w);border:1px solid var(–g200);border-radius:99px;padding:2px 8px;color:var(–g700);font-weight:500}

/* ── KPI ── */
.krow{
display:flex;align-items:center;gap:12px;
background:linear-gradient(90deg,#EAF5F0,var(–w));
border:1px solid #C0DECE;border-radius:10px;padding:11px 15px;margin-bottom:7px
}
.kval{font-size:22px;font-weight:800;color:var(–green);width:72px;flex-shrink:0;line-height:1}
.kin{flex:1}
.kin .nm{font-size:12px;font-weight:600;color:var(–g900)}
.kin .ts{font-size:10px;color:var(–g500);margin-top:1px}
.kbar{width:80px;height:5px;background:var(–g200);border-radius:99px;flex-shrink:0}
.kbf{height:5px;border-radius:99px;background:var(–green)}

/* ── PERSONA FILTER ── */
.pf-card{background:var(–w);border:1px solid var(–g200);border-radius:var(–radius);overflow:hidden;margin-bottom:16px;box-shadow:var(–shadow-sm)}
.pf-hdr{padding:14px 20px;border-bottom:1px solid var(–g100);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(–g50)}
.pf-hdr h3{font-size:13.5px;font-weight:700;flex:1;color:var(–g900)}
.pf-select{border:1.5px solid var(–g200);border-radius:var(–radius-sm);padding:7px 12px;font-size:12px;color:var(–g900);background:var(–w);outline:none;cursor:pointer;min-width:180px;transition:border-color .15s}
.pf-select:focus{border-color:var(–green)}
.pf-clear{background:var(–g100);border:1px solid var(–g200);border-radius:var(–radius-sm);padding:6px 13px;font-size:11.5px;color:var(–g700);cursor:pointer;font-weight:500}
.pf-body{padding:18px 20px}
.pf-profile{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
.pf-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(–green2),var(–green));display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(30,92,72,.25)}
.pf-info{flex:1}
.pf-name{font-size:16px;font-weight:800;color:var(–g900);margin-bottom:3px}
.pf-dept{font-size:11.5px;color:var(–g500);margin-bottom:8px}
.pf-stats{display:flex;gap:8px;flex-wrap:wrap}
.pf-stat{background:var(–g50);border:1.5px solid var(–g200);border-radius:10px;padding:9px 14px;text-align:center;min-width:66px}
.pf-stat-val{font-size:22px;font-weight:800;color:var(–green);line-height:1}
.pf-stat-lbl{font-size:9.5px;color:var(–g500);margin-top:2px;font-weight:500}
.pf-stat.bl .pf-stat-val{color:var(–bl)}.pf-stat.gr .pf-stat-val{color:var(–gr)}.pf-stat.re .pf-stat-val{color:var(–re)}
.pf-section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(–green);margin-bottom:8px;margin-top:6px}
.pf-empty{font-size:13px;color:var(–g300);text-align:center;padding:28px 0}

/* ── BEFORE/AFTER ── */
.cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(–g200);border-radius:var(–radius);overflow:hidden;margin-bottom:16px;box-shadow:var(–shadow-sm)}
.cmpc{padding:22px 24px;background:var(–w)}
.cmpc.aft{background:var(–g50);border-left:1px solid var(–g200)}
.cmplbl{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.cmpdot{width:8px;height:8px;border-radius:50%;background:var(–re)}.cmpdot.g{background:var(–gr)}
.cmplbl span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(–g500)}
.cmrow{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.cmic{width:20px;height:20px;border-radius:5px;background:var(–reL);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(–re);font-size:10px;font-weight:700}
.cmic.g{background:var(–grL);color:var(–gr)}
.cmrow p{font-size:12px;color:var(–g700);line-height:1.4;padding-top:1px}

/* ── MISC ── */
.resetbtn{display:inline-flex;align-items:center;gap:5px;background:var(–g100);border:1.5px solid var(–g200);border-radius:var(–radius-sm);padding:7px 14px;font-size:11.5px;font-weight:500;color:var(–g700);cursor:pointer;margin-bottom:16px;transition:all .15s}
.resetbtn:hover{background:var(–g200)}
.errc{background:var(–reL);border:1.5px solid #F0C4BE;border-radius:var(–radius);padding:14px 18px;margin-bottom:14px;color:var(–re);font-size:12.5px}
.foot{background:var(–w);border:1px solid var(–g200);border-radius:var(–radius);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;box-shadow:var(–shadow-sm)}
.foot p{font-size:11px;color:var(–g500)}
.foot strong{color:var(–g900)}

@media(max-width:600px){
.cmp{grid-template-columns:1fr}
.cmpc.aft{border-left:none;border-top:1px solid var(–g200)}
.hdr{padding:20px 18px;flex-direction:column;gap:14px}
#root{padding:14px 12px 60px}
}

/* ── SOLENOID ANIMATION — continuous loop ── */
@keyframes trace-loop {
0%   { stroke-dashoffset: 400; opacity:0; }
8%   { opacity:1; }
70%  { stroke-dashoffset: 0; opacity:1; }
85%  { stroke-dashoffset: 0; opacity:1; }
95%  { stroke-dashoffset: 400; opacity:0; }
100% { stroke-dashoffset: 400; opacity:0; }
}
@keyframes via-loop {
0%,15%  { r:0; opacity:0; }
30%      { r:3.5; opacity:1; }
40%      { r:2.5; }
70%,85%  { r:3; opacity:1; }
95%,100% { r:0; opacity:0; }
}
@keyframes pulse-glow {
0%, 100% { opacity:.3; transform:scale(1); }
50%       { opacity:1; transform:scale(1.4); }
}
@keyframes signal-travel {
0%        { cx:144; opacity:0; }
5%        { opacity:1; }
100%      { cx:560; opacity:0; }
}
@keyframes fade-up {
from { opacity:0; transform:translateY(12px); }
to   { opacity:1; transform:translateY(0); }
}
@keyframes fade-in {
from { opacity:0; }
to   { opacity:1; }
}
.anim-header { animation: fade-up .6s ease both; }
.anim-header-sub { animation: fade-up .6s .1s ease both; }
.anim-header-desc { animation: fade-up .6s .2s ease both; }
.anim-chips { animation: fade-up .5s .35s ease both; }
</style>

</head>

<script type="text/babel">
var _useState = React.useState;
var _useRef = React.useRef;
var _useCallback = React.useCallback;

// ── HELPERS ──────────────────────────────────────────────────────────────────

function to24h(h, min, sec, mer) {
  var hour = parseInt(h);
  var m = (mer || "").toLowerCase().replace(/[\s.]/g, "");
  if (m.indexOf("p") === 0 && hour !== 12) hour += 12;
  if (m.indexOf("a") === 0 && hour === 12) hour = 0;
  return {
    hour: hour,
    timeStr: String(hour).padStart(2,"0") + ":" + min + ":" + (sec || "00")
  };
}

function parseTurno(h, min, dateIso) {
  var m = parseInt(min) || 0;
  var dow = 1; // default Mon
  if (dateIso) {
    var parts = dateIso.split("-");
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    dow = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
  }

  // Saturday (6): single shift 09:00-18:00
  if (dow === 6) {
    if (h >= 9 && h < 18) return "1T-Sab";
    if (h >= 18) return "2T-Sab";
    return "FS-Sab";
  }

  // Sunday (0): 1T 06:00-18:00, 2T 18:00-06:00
  if (dow === 0) {
    if (h >= 6 && h < 18) return "1T-Dom";
    return "2T-Dom";
  }

  // Friday (5): 3T ends 09:00, 1T 09:00-15:15, 2T 15:15-23:59
  if (dow === 5) {
    if (h >= 0 && h < 6) return "3T";
    if (h === 6 || h === 7 || h === 8) return "3T"; // Fri 3T extends to 09:00
    if (h < 15 || (h === 15 && m < 15)) return "1T";
    return "2T";
  }

  // Mon-Thu (1-4):
  // 3T: 00:00-06:00
  // 1T: 06:00-15:15
  // 2T: 15:15-00:00
  if (h >= 0 && h < 6) return "3T";
  if (h < 15 || (h === 15 && m < 15)) return "1T";
  return "2T";
}

function parseWhatsApp(txt) {
  var lines = txt.split(/\r?\n/);
  var msgs = [];
  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
  var cur = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].replace(/[\u200e\u200f\u202a\u202b\u202c\u202d\u202e\u202f]/g, "").trim();
    var m = line.match(reA) || line.match(reB);
    if (m) {
      if (cur) msgs.push(cur);
      var d, mo, yr, h2, min, sec, mer, sender, text;
      if (line.match(reA)) {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec=m[6]||"00"; mer=m[7]||""; sender=m[8]; text=m[9];
      } else {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec="00"; mer=""; sender=m[6]; text=m[7];
      }
      var year = parseInt(yr);
      if (year < 100) year += 2000;
      var t = to24h(h2, min, sec, mer);
      var dateIso = year + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      cur = {
        dateIso: dateIso,
        dateDisp: String(d).padStart(2,"0") + "/" + String(mo).padStart(2,"0") + "/" + year,
        timeStr: t.timeStr,
        hour: t.hour,
        turno: parseTurno(t.hour, min, dateIso),
        sender: sender.replace(/^~/,"").trim(),
        text: text.trim()
      };
    } else if (cur && line && !line.startsWith("[")) {
      cur.text += " " + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function cleanMsgs(msgs) {
  var skip = /imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|cifrados de extremo|ahora es admin/i;
  var noise = /^(buenos d|buenas t|buen d|gracias|de nada|enterado|recibido|entendido)/i;
  return msgs.filter(function(m){
    return m.text && m.text.trim().length > 8 && !m.text.match(skip) && !m.text.trim().match(noise);
  });
}

async function readZip(file) {
  var zip = await JSZip.loadAsync(file);
  var names = Object.keys(zip.files);
  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    if (name.endsWith(".txt") && !name.startsWith("__MACOSX")) {
      return await zip.files[name].async("string");
    }
  }
  throw new Error("No se encontro .txt en el ZIP");
}

    "INCLUIR: paros linea, defectos calidad, falta material, FAI, LCR vencido, RMA, AOI/ICT, dano fisico. " +
    "EXCLUIR: saludos, ok, gracias, emojis solos. " +
    "Catalogo defecto_smt: Solder bridge|Missing component|Wrong component|Wrong orientation|Polarity inverted|" +
    "Misaligned component|BGA short|BGA open|Lifted pad|Feeder misload|Machine stop|Wrong reel|Missing material|" +
    "ICT open|ICT short|Functional test fail|N/A. " +
    "tipo_evento: Calidad|Proceso|Material|Sistema|Seguridad|Produccion. " +
    "Maximo 15 eventos. Solo JSON sin texto extra:" +
    '{"eventos":[{"id":"EVT-001","fecha":"DD/MM/YYYY","hora":"HH:MM","turno":"1T|2T|3T",' +
    '"modelo":"N/P o N/D","linea_estacion":"L1 o N/D","reporta":"nombre",' +
    '"area_involucrada":"SMT|PTH|ICT|AOI|Calidad|Mantenimiento|Materiales|Produccion",' +
    '"tipo_evento":"Calidad|Proceso|Material|Sistema|Seguridad|Produccion",' +
    '"defecto_smt":"del catalogo o N/A","evento_detectado":"descripcion","impacto":"impacto",' +
    '"accion_requerida":"accion","responsable_sugerido":"responsable",' +
    '"estatus":"Abierto|En proceso|Cerrado","prioridad":"Critica|Alta|Media|Baja",' +
    '"fuente_chat":"DD/MM/YY HH:MM nombre","notas":""}],' +
    '"kpis":[{"fechahora":"DD/MM/YYYY HH:MM","indicador":"nombre","valor":0.0,"unidad":"%","fuente":"nombre"}],' +
    '"resumen":{"periodo":"DD/MM/YYYY a DD/MM/YYYY","grupo":"nombre","total_eventos":0,' +
    '"alertas_criticas":["alerta"],"acciones_pendientes":["accion"],"estatus_lineas":["linea"]},' +
    '"directorio":[{"nombre":"nombre","departamento":"area","rol":"rol","mensajes":0,"eventos":0,"area_owner":"area"}]}';

  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 6000,
      system: system,
      messages: [
        { role: "user", content: "Analiza " + msgs.length + " mensajes. Solo JSON:\n\n" + sample },
        { role: "assistant", content: "{" }
      ]
    })
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    if (resp.status === 401) throw new Error("API Key invalida. Verifica en console.anthropic.com");
    if (resp.status === 429) throw new Error("Limite de uso alcanzado. Espera e intenta de nuevo.");
    throw new Error((err.error && err.error.message) || ("Error API " + resp.status));
  }

  var data = await resp.json();
  if (!data.content || !data.content.length) throw new Error("Respuesta vacia. Intenta de nuevo.");

  var raw = "{" + data.content.map(function(b){ return b.text || ""; }).join("");
  var clean = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  var s = clean.indexOf("{");
  var e = clean.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("JSON invalido. Reduce el rango de dias.");
  var jsonStr = clean.slice(s, e+1);

  try { return JSON.parse(jsonStr); } catch(_) {}

  var fixed = jsonStr
    .replace(/,\s*([}\]])/g, "$1");
  try { return JSON.parse(fixed); } catch(_) {}

  throw new Error("Error procesando respuesta. Intenta con 1 o 3 dias.");
}

  ev.forEach(function(e){ if(e.defecto_smt && e.defecto_smt!=="N/A") defMap2[e.defecto_smt]=(defMap2[e.defecto_smt]||0)+1; });
  var byDef = Object.keys(defMap2).map(function(k){return{l:k,n:defMap2[k]};}).sort(function(a,b){return b.n-a.n;}).slice(0,5);
  var mxD = Math.max.apply(null, byDef.map(function(x){return x.n;}).concat([1]));

  // ── TIMELINE por hora ──
  var horaMap = {};
  var horaTipoMap = {};
  var TIPOS = ["Calidad","Proceso","Material","Sistema","Produccion","Seguridad"];
  ev.forEach(function(e) {
    if (!e.hora) return;
    var h = e.hora.split(":")[0];
    if (!h || isNaN(parseInt(h))) return;
    var hh = String(parseInt(h)).padStart(2,"0");
    horaMap[hh] = (horaMap[hh]||0) + 1;
    if (!horaTipoMap[hh]) horaTipoMap[hh] = {};
    var t = e.tipo_evento || "N/D";
    horaTipoMap[hh][t] = (horaTipoMap[hh][t]||0) + 1;
  });
  var byHora = Object.keys(horaMap).sort().map(function(h){
    return { h: h, n: horaMap[h], tipos: horaTipoMap[h]||{} };
  });
  var mxH = Math.max.apply(null, byHora.map(function(x){return x.n;}).concat([1]));

  // Color por tipo para timeline
  var tipoColor = {
    Calidad:"#2952A3", Proceso:"#2A7A60", Material:"#B87820",
    Sistema:"#6B2DA8", Produccion:"#1A7A3C", Seguridad:"#C0392B", "N/D":"#8A8580"
  };

  // Turno label por hora
  function horaToTurno(hh) {
    var h = parseInt(hh);
    if (h >= 6 && h < 15) return "1T";
    if (h >= 15) return "2T";
    return "3T";
  }
  var turnoColor = {"1T":"#2A7A60","2T":"#2952A3","3T":"#6B2DA8"};


  var personaSet = {};
  ev.forEach(function(e){
    if(e.reporta && e.reporta !== "N/D") personaSet[e.reporta] = true;
    if(e.responsable_sugerido && e.responsable_sugerido !== "N/D") personaSet[e.responsable_sugerido] = true;
  });
  var personas = Object.keys(personaSet).sort();

  var evRep = personaFiltro ? ev.filter(function(e){ return e.reporta && e.reporta.toLowerCase().indexOf(personaFiltro.toLowerCase()) >= 0; }) : [];
  var evRes = personaFiltro ? ev.filter(function(e){ return e.responsable_sugerido && e.responsable_sugerido.toLowerCase().indexOf(personaFiltro.toLowerCase()) >= 0 && evRep.indexOf(e) === -1; }) : [];
  var dirInfo = result && result.directorio ? result.directorio.find(function(d){ return d.nombre && d.nombre.toLowerCase().indexOf(personaFiltro.toLowerCase()) >= 0; }) : null;

  function bprio(p) { return ({Critica:"badge bc",Alta:"badge ba",Media:"badge bm",Baja:"badge bb"})[p] || "badge"; }
  function best(s) { return ({Abierto:"badge bo","En proceso":"badge be",Cerrado:"badge bce"})[s] || "badge"; }

  function PendItem(props) {
    var e = props.e;
    return (
      <div className={"pitem" + (e.prioridad==="Critica"?" cr":e.prioridad==="Alta"?" al":"")}>
        <div className="pitem-top">
          <span className="pitem-id">{e.id} - {e.fecha} - {e.turno}</span>
          <span className={bprio(e.prioridad)}>{e.prioridad}</span>
        </div>
        <h4>{e.evento_detectado}</h4>
        <p>{e.accion_requerida}</p>
        <div className="pmeta">
          <span className="ptag">{e.linea_estacion}</span>
          <span className="ptag">{e.responsable_sugerido}</span>
          {e.modelo !== "N/D" && <span className="ptag">{e.modelo}</span>}
          {e.defecto_smt && e.defecto_smt !== "N/A" && <span className="badge bt">{e.defecto_smt}</span>}
          <span className={best(e.estatus)}>{e.estatus}</span>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* HEADER — Casper style */}
      <div style={{marginBottom:32,paddingTop:8}}>
        {/* Logo row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <LogoSVG/>
          <span style={{fontSize:11,color:"#9A9590",fontWeight:500,letterSpacing:".02em"}}>carmacorte.github.io</span>
        </div>

        {/* SOLENOID ANIMATION — continuous loop */}
        <div style={{marginBottom:16,overflow:"hidden",height:48}}>
          <svg width="100%" height="48" viewBox="0 0 600 48" preserveAspectRatio="xMidYMid meet">
            {/* Base trace */}
            <line x1="0" y1="24" x2="600" y2="24" stroke="#C8D8B8" strokeWidth="1" opacity="0.35"/>

            {/* Solenoid coil — draws and resets in loop */}
            <polyline
              points="0,24 30,24 36,8 48,8 54,38 66,38 72,8 84,8 90,38 102,38 108,8 120,8 126,38 138,38 144,24 600,24"
              fill="none" stroke="#2A7A60" strokeWidth="2"
              strokeLinecap="round" strokeLinejoin="round"
              strokeDasharray="400" strokeDashoffset="400"
              style={{animation:"trace-loop 3.5s cubic-bezier(.4,0,.2,1) infinite"}}/>

            {/* Vias — appear and disappear in sync */}
            <circle cx="54" cy="38" r="0" fill="#F4F3F0" stroke="#2A7A60" strokeWidth="1.5"
              style={{animation:"via-loop 3.5s ease .4s infinite"}}/>
            <circle cx="90" cy="38" r="0" fill="#F4F3F0" stroke="#2A7A60" strokeWidth="1.5"
              style={{animation:"via-loop 3.5s ease .55s infinite"}}/>
            <circle cx="126" cy="38" r="0" fill="#F4F3F0" stroke="#2A7A60" strokeWidth="1.5"
              style={{animation:"via-loop 3.5s ease .7s infinite"}}/>
            <circle cx="72" cy="8" r="0" fill="#2A7A60"
              style={{animation:"via-loop 3.5s ease .47s infinite"}}/>
            <circle cx="108" cy="8" r="0" fill="#2A7A60"
              style={{animation:"via-loop 3.5s ease .62s infinite"}}/>

            {/* Signal dot travelling down the trace after coil draws */}
            <circle cx="144" cy="24" r="3.5" fill="#4DB896" opacity="0"
              style={{animation:"signal-travel 3.5s linear .85s infinite"}}/>

            {/* Pulse dot — always pulsing */}
            <circle cx="570" cy="24" r="2.5" fill="#2A7A60"
              style={{animation:"pulse-glow 1.4s ease-in-out infinite"}}/>

            {/* Net label */}
            <text x="170" y="20" fontSize="8" fill="#9A9590" fontFamily="Courier New,monospace"
              opacity="0" style={{animation:"fade-in .4s ease 1.5s both"}}>
              SIG_SMT
            </text>
          </svg>
        </div>

        {/* Display headline */}
        <div className="anim-header" style={{marginBottom:6}}>
          <span style={{fontSize:11,fontWeight:600,color:"#2A7A60",letterSpacing:".08em",textTransform:"uppercase"}}>Manufacturing Analytics</span>
        </div>
        <h1 className="anim-header-sub" style={{fontSize:38,fontWeight:800,color:"#1A1714",lineHeight:1.05,letterSpacing:"-.03em",marginBottom:10}}>
          Chat de manufactura<br/>
          <span style={{color:"#1E5C48"}}>a Dashboard SMT</span>
        </h1>
        <p className="anim-header-desc" style={{fontSize:14,color:"#8A8580",fontWeight:400,lineHeight:1.5,maxWidth:420}}>
          Sube el .zip de WhatsApp, selecciona el rango y descarga la bitacora Excel lista para junta.
        </p>
        {/* Chips row */}
        <div className="anim-chips" style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
          {["SMT","AOI","SPI","X-RAY","Root Cause"].map(function(t){
            return <span key={t} style={{fontSize:10.5,fontWeight:600,color:"#6A8060",background:"#EAF0E4",border:"1px solid #C8D8B8",borderRadius:99,padding:"4px 12px"}}>{t}</span>;
          })}
        </div>
      </div>

      {/* API KEY */}
      <div className="api-bar">
        <label>API Key:</label>
        <input className="api-input" type="password" placeholder="sk-ant-api03-..."
          value={apiKey} onChange={function(e){ saveKey(e.target.value); }}/>
        <div className="api-note">
          Guardada en este navegador.{" "}
          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer">
            console.anthropic.com
          </a>
        </div>
      </div>

      {/* IDLE — Casper minimal upload */}
      {state === "idle" && (
        <div>
          {/* Upload zone — minimal, almost invisible until hover */}
          <div
            style={{
              border:"1.5px dashed #C8C4BE",borderRadius:16,
              background: drag ? "#F0F5EE" : "#FAFAF9",
              cursor:"pointer",transition:"all .2s",marginBottom:20
            }}
            onDragOver={function(e){ e.preventDefault(); setDrag(true); }}
            onDragLeave={function(){ setDrag(false); }}
            onDrop={function(e){ e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); }}
            onClick={function(){ fileRef.current.click(); }}
          >
            <input ref={fileRef} type="file" accept=".zip" style={{display:"none"}}
              onChange={function(e){ handle(e.target.files[0]); }}/>
            <div style={{padding:"48px 32px",textAlign:"center"}}>
              {/* Minimal icon */}
              <div style={{width:48,height:48,borderRadius:12,background:"#EEF3EA",border:"1px solid #C8D8BC",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",color:"#4A7A50"}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
              </div>
              <div style={{fontSize:16,fontWeight:600,color:"#1A1714",marginBottom:4}}>
                Arrastra tu .zip aqui
              </div>
              <div style={{fontSize:13,color:"#9A9590",marginBottom:20}}>
                o haz clic para seleccionar
              </div>
              <button
                style={{
                  background:"#1E5C48",color:"#fff",border:"none",
                  borderRadius:99,padding:"10px 24px",fontSize:13,fontWeight:600,
                  cursor:"pointer",letterSpacing:"-.01em",
                  boxShadow:"0 2px 8px rgba(30,92,72,.25)"
                }}
                onClick={function(e){ e.stopPropagation(); fileRef.current.click(); }}
              >
                Seleccionar archivo
              </button>
            </div>
          </div>

          {/* Days filter — clean pill row */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,paddingLeft:4}}>
            <span style={{fontSize:12,fontWeight:500,color:"#8A8580"}}>Analizar ultimos:</span>
            <div style={{display:"flex",gap:6}}>
              {[1,3,7,14,30].map(function(d){
                return (
                  <button key={d}
                    style={{
                      border: days===d ? "none" : "1.5px solid #DDDBD7",
                      background: days===d ? "#1E5C48" : "#fff",
                      color: days===d ? "#fff" : "#6A6560",
                      borderRadius:99,padding:"5px 14px",fontSize:12,
                      fontWeight: days===d ? 700 : 500,cursor:"pointer",
                      transition:"all .15s"
                    }}
                    onClick={function(){ setDays(d); }}>
                    {d}d
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* LOADING */}
      {state === "loading" && (
        <div className="prog">
          <h3>Procesando chat...</h3>
          <p>{msgStats
            ? (msgStats.clean + " mensajes relevantes de " + msgStats.total + " totales")
            : "Leyendo ZIP..."}</p>
          <div className="pbar">
            <div className="pfill" style={{width: prog + "%"}}/>
          </div>
          <div className="psteps">
            {STEPS.map(function(s, i){
              return (
                <div key={i} className={"pstep" + (i===progStep?" on":i<progStep?" ok":"")}>
                  {i < progStep ? "ok " : ""}{s}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ERROR */}
      {state === "error" && (
        <div>
          <div className="errc">Error: {errMsg}</div>
          <button className="resetbtn" onClick={reset}>Intentar de nuevo</button>
        </div>
      )}

      {/* DONE */}
      {state === "done" && result && (
        <div>
          <button className="resetbtn" onClick={reset}>Analizar otro chat</button>

          {/* Download bar */}
          <div style={{background:"linear-gradient(135deg,#1E5C48,#2A7A60)",borderRadius:14,padding:"20px 26px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,.08)"}}>
            <div>
              <h3 style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:3}}>Excel listo para junta</h3>
              <p style={{fontSize:11,color:"rgba(242,236,200,.6)"}}>{(res.periodo || "") + " - " + ev.length + " eventos - " + ((msgStats && msgStats.clean) || 0) + " msgs"}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>
                {["Resumen_Junta","Bitacora","Pendientes","KPIs_chat","Dashboard_Base","Directorio","Catalogos"].map(function(s){
                  return <span key={s} style={{background:"rgba(200,216,150,.12)",border:"1px solid rgba(200,216,150,.2)",borderRadius:4,padding:"2px 8px",fontSize:9,color:"#F2ECC8"}}>{s}</span>;
                })}
              </div>
            </div>
            <button onClick={download} style={{background:"#7A9448",color:"#fff",border:"none",borderRadius:10,padding:"12px 22px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,boxShadow:"0 2px 8px rgba(122,148,72,.35)"}}>
              Descargar .xlsx
            </button>
          </div>

          {/* Stats cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:28,fontWeight:800,color:"#1E5C48",lineHeight:1,marginBottom:4}}>{ev.length}</div>
              <div style={{fontSize:10.5,color:"#8A8580",fontWeight:500}}>Total eventos</div>
            </div>
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:28,fontWeight:800,color:"#C0392B",lineHeight:1,marginBottom:4}}>{crit.length}</div>
              <div style={{fontSize:10.5,color:"#8A8580",fontWeight:500}}>Criticos</div>
            </div>
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:28,fontWeight:800,color:"#2952A3",lineHeight:1,marginBottom:4}}>{pend.length}</div>
              <div style={{fontSize:10.5,color:"#8A8580",fontWeight:500}}>Pendientes</div>
            </div>
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:28,fontWeight:800,color:"#1A7A3C",lineHeight:1,marginBottom:4}}>{cerr.length}</div>
              <div style={{fontSize:10.5,color:"#8A8580",fontWeight:500}}>Cerrados</div>
            </div>
          </div>

          {/* KPIs */}
          {kpis.length > 0 && (
            <div className="tcard">
              <div className="tcard-hdr"><h3>KPIs en chat</h3></div>
              <div style={{padding:"10px 14px"}}>
                {kpis.map(function(k, i){
                  return (
                    <div key={i} className="krow">
                      <div className="kval">{k.valor}<span style={{fontSize:9}}>{k.unidad}</span></div>
                      <div className="kin">
                        <div className="nm">{k.indicador}</div>
                        <div className="ts">{k.fechahora} - {k.fuente}</div>
                      </div>
                      <div className="kbar">
                        <div className="kbf" style={{width: Math.min(100, k.valor < 2 ? k.valor*100 : k.valor) + "%"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── TIMELINE DE COMPORTAMIENTO DE PLANTA ── */}
          {byHora.length >= 2 && (
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,overflow:"hidden",marginBottom:14,boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
              <div style={{padding:"14px 20px",borderBottom:"1px solid #EEECEA",background:"#F8F7F5",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <h3 style={{fontSize:13.5,fontWeight:700,color:"#1A1714",marginBottom:2}}>Timeline de comportamiento de planta</h3>
                  <span style={{fontSize:10,color:"#8A8580"}}>Eventos detectados por hora del periodo analizado</span>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[["1T","#2A7A60"],["2T","#2952A3"],["3T","#6B2DA8"]].map(function(t){
                    return <span key={t[0]} style={{fontSize:9,fontWeight:600,color:t[1],background:t[1]+"18",border:"1px solid "+t[1]+"30",borderRadius:99,padding:"2px 8px"}}>{t[0]}</span>;
                  })}
                </div>
              </div>
              <div style={{padding:"16px 20px"}}>
                {byHora.map(function(x, i) {
                  var pct = (x.n / mxH) * 100;
                  var tc = turnoColor[horaToTurno(x.h)] || "#2A7A60";
                  // dominant tipo for this hour
                  var domTipo = "N/D";
                  var domCount = 0;
                  Object.keys(x.tipos).forEach(function(t){ if(x.tipos[t]>domCount){domCount=x.tipos[t];domTipo=t;} });
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                      {/* Hour label */}
                      <div style={{fontFamily:"'Courier New',monospace",fontSize:11,fontWeight:700,color:"#3D3A36",width:28,flexShrink:0,textAlign:"right"}}>{x.h}</div>

                        <div style={{
                          position:"absolute",left:0,top:0,bottom:0,
                          width:pct+"%",borderRadius:99,
                          background:"linear-gradient(90deg,"+tc+","+tc+"CC)",
                          transition:"width .4s ease"
                        }}/>
  
                      </div>

                      <div style={{fontSize:11,fontWeight:700,color:"#3D3A36",width:16,textAlign:"right",flexShrink:0}}>{x.n}</div>

                  </span>

          {/* Charts row 1 */}

                    <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:"#2A7A60",width:(x.n/mxM*100)+"%"}}/></div>

                    <div style={{fontSize:10,color:"#8A8580",width:88,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.l}</div>
                    <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:"#2952A3",width:(x.n/mxL*100)+"%"}}/></div>
                    <div style={{fontSize:10.5,fontWeight:700,color:"#3D3A36",width:20,textAlign:"right"}}>{x.n}</div>

            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
              <h4 style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#1A1714"}}>Por prioridad</h4>

                return (
                  <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                    <div style={{fontSize:10,color:"#8A8580",width:88,flexShrink:0}}>{x.l}</div>
                    <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:colors[x.c]||"#2C7566",width:(x.n/mxP*100)+"%"}}/></div>
                    <div style={{fontSize:10.5,fontWeight:700,color:"#3D3A36",width:20,textAlign:"right"}}>{x.n}</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
              <h4 style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#1A1714"}}>Por estatus</h4>
              {[
                {l:"Abiertos",n:ev.filter(function(e){return e.estatus==="Abierto";}).length,c:"#C42020"},
                {l:"En proceso",n:ev.filter(function(e){return e.estatus==="En proceso";}).length,c:"#D4860A"},
                {l:"Cerrados",n:cerr.length,c:"#148A3C"}
              ].map(function(x,i){
                return (
                  <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                    <div style={{fontSize:10,color:"#8A8580",width:88,flexShrink:0}}>{x.l}</div>
                    <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:x.c,width:(x.n/Math.max(ev.length,1)*100)+"%"}}/></div>
                    <div style={{fontSize:10.5,fontWeight:700,color:"#3D3A36",width:20,textAlign:"right"}}>{x.n}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Charts row 2 - SMT Pareto + Tipo */}
          {(byDef.length > 0 || byTipo.length > 0) && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              {byDef.length > 0 && (
                <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
                  <h4 style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#1A1714"}}>Pareto defectos SMT</h4>
                  {byDef.map(function(x,i){
                    return (
                      <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                        <div style={{fontSize:10,color:"#8A8580",width:88,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.l}</div>
                        <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:"#6B2DA8",width:(x.n/mxD*100)+"%"}}/></div>
                        <div style={{fontSize:10.5,fontWeight:700,color:"#3D3A36",width:20,textAlign:"right"}}>{x.n}</div>
                      </div>
                    );
                  })}
                </div>
              )}
              {byTipo.length > 0 && (
                <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
                  <h4 style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#1A1714"}}>Por tipo de evento</h4>
                  {byTipo.map(function(x,i){
                    return (
                      <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                        <div style={{fontSize:10,color:"#8A8580",width:88,flexShrink:0}}>{x.l}</div>
                        <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:"#6B8C3A",width:(x.n/mxT*100)+"%"}}/></div>
                        <div style={{fontSize:10.5,fontWeight:700,color:"#3D3A36",width:20,textAlign:"right"}}>{x.n}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Persona filter */}
          <div className="pf-card">
            <div className="pf-hdr">
              <h3>Filtro por persona</h3>
              <select className="pf-select" value={personaFiltro}
                onChange={function(e){ setPersonaFiltro(e.target.value); }}>
                <option value="">Todos los participantes</option>
                {personas.map(function(p,i){ return <option key={i} value={p}>{p}</option>; })}
              </select>
              {personaFiltro && (
                <button className="pf-clear" onClick={function(){ setPersonaFiltro(""); }}>Limpiar</button>
              )}
            </div>
            {personaFiltro ? (
              <div className="pf-body">
                <div className="pf-profile">
                  <div className="pf-avatar">{personaFiltro.charAt(0).toUpperCase()}</div>
                  <div className="pf-info">
                    <div className="pf-name">{personaFiltro}</div>
                    <div className="pf-dept">
                      {dirInfo ? (dirInfo.departamento + " - " + dirInfo.rol) : "Participante del chat"}
                    </div>
                    <div className="pf-stats">
                      <div className="pf-stat"><div className="pf-stat-val">{evRep.length}</div><div className="pf-stat-lbl">Reporto</div></div>
                      <div className="pf-stat bl"><div className="pf-stat-val">{evRes.length}</div><div className="pf-stat-lbl">Responsable</div></div>
                      <div className="pf-stat re"><div className="pf-stat-val">{evRep.filter(function(e){return e.prioridad==="Critica";}).length}</div><div className="pf-stat-lbl">Criticos</div></div>
                      <div className="pf-stat gr"><div className="pf-stat-val">{evRep.concat(evRes).filter(function(e){return e.estatus!=="Cerrado";}).length}</div><div className="pf-stat-lbl">Abiertos</div></div>
                    </div>
                  </div>
                </div>
                {evRep.length > 0 && (
                  <div>
                    <div className="pf-section-title">Eventos reportados ({evRep.length})</div>
                    <div className="plist" style={{padding:0,marginBottom:12}}>
                      {evRep.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
                    </div>
                  </div>
                )}
                {evRes.length > 0 && (
                  <div>
                    <div className="pf-section-title">Donde es responsable ({evRes.length})</div>
                    <div className="plist" style={{padding:0}}>
                      {evRes.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
                    </div>
                  </div>
                )}
                {evRep.length === 0 && evRes.length === 0 && (
                  <div className="pf-empty">Sin eventos para esta persona en el periodo</div>
                )}
              </div>
            ) : (
              <div className="pf-body">
                <div className="pf-empty">Selecciona una persona para ver su actividad</div>
              </div>
            )}
          </div>

          {/* Bitacora table */}
          <div className="tcard">
            <div className="tcard-hdr"><h3>Bitacora de eventos ({ev.length})</h3></div>
            <div className="tscroll">
              <table>
                <thead>
                  <tr>
                    <th>ID</th><th>Fecha</th><th>T</th><th>Linea</th>
                    <th>Tipo</th><th>Defecto SMT</th><th>Evento</th>
                    <th>Prioridad</th><th>Estatus</th>
                  </tr>
                </thead>
                <tbody>
                  {ev.map(function(e,i){
                    return (
                      <tr key={i}>
                        <td><strong>{e.id}</strong></td>
                        <td style={{whiteSpace:"nowrap",fontSize:10}}>{e.fecha}</td>
                        <td>{e.turno}</td>
                        <td style={{maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.linea_estacion}</td>
                        <td><span style={{fontSize:9,background:"#EDF5F3",color:"#1E5545",padding:"2px 5px",borderRadius:4,fontWeight:600}}>{e.tipo_evento}</span></td>
                        <td style={{maxWidth:100}}>
                          {e.defecto_smt && e.defecto_smt !== "N/A"
                            ? <span className="badge bt" style={{fontSize:8.5,whiteSpace:"normal"}}>{e.defecto_smt}</span>
                            : <span style={{color:"#C8C2BA",fontSize:10}}>-</span>}
                        </td>
                        <td style={{maxWidth:170,fontSize:10.5}}>{e.evento_detectado}</td>
                        <td><span className={bprio(e.prioridad)}>{e.prioridad}</span></td>
                        <td><span className={best(e.estatus)}>{e.estatus}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Pendientes */}
          {pend.length > 0 && (
            <div className="tcard" style={{marginTop:14}}>
              <div className="tcard-hdr"><h3>Pendientes operativos ({pend.length})</h3></div>
              <div className="plist">
                {pend.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
              </div>
            </div>
          )}

          {/* Before/After */}
          <div className="cmp" style={{marginTop:14}}>
            <div className="cmpc">
              <div className="cmplbl"><div className="cmpdot"/><span>Antes</span></div>
              {["Sin clasificacion SMT","Sin trazabilidad por turno","Eventos con ruido","Juntas sin datos"].map(function(t,i){
                return <div key={i} className="cmrow"><div className="cmic">X</div><p>{t}</p></div>;
              })}
            </div>
            <div className="cmpc aft">
              <div className="cmplbl"><div className="cmpdot g"/><span>Despues SMTintel</span></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>{ev.length} eventos</strong> con defecto SMT</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>Pareto</strong> para root cause</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>{pend.length} pendientes</strong> con owner</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p>Excel 7 hojas en minutos</p></div>
            </div>
          </div>

          {/* Footer */}
          <div className="foot">
            <p><strong>SMTintel by ALDA</strong> - Manufacturing Analytics - {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"8px 16px",fontSize:12}} onClick={download}>Descargar Excel</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
