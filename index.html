<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMTinel · Command Center v2.6</title>
    
    <!-- CONFIGURACIÓN NÚCLEO (Configuración de Supabase) -->
    <script>
        window.TRACEOPS_CONFIG = {
            enabled: true,
            url: "https://irjaljqlijpfwkljusbu.supabase.co",
            anonKey: "sb_publishable_FRi9eaXD-6TYVXLCCUCWkg_1VuvcIhV",
            version: "2.6.0-HuginnMuninn"
        };

        // Cargador de Dependencias Críticas (Excel, PPTX, Zip)[span_0](start_span)[span_0](end_span)
        const scripts = [
            "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js",
            "https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js",
            "https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"
        ];

        function loadEngine() {
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.async = false;
                document.head.appendChild(script);
            });
            console.log("🚀 SMTinel Engine: Componentes cargados.");
        }
        loadEngine();
    </script>

    <style>
        :root {
            --mfg-blue: #007AFF; /* Huginn: Logic/Blue */
            --mfg-green: #34C759; /* Muninn: Memory/Green */
            --industrial-dark: #09090b;
            --panel-bg: rgba(22, 22, 26, 0.8);
            --accent-glow: rgba(0, 122, 255, 0.15);
        }

        body {
            background-color: var(--industrial-dark);
            color: #f4f4f5;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Command Center */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar-terminal {
            width: 70px;
            background: #000;
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 25px;
        }

        .main-view {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #27272a; /* Divisor visual */
            position: relative;
        }

        /* Panel Huginn (Izquierda) */
        .panel-huginn {
            background: linear-gradient(135deg, #09090b 0%, #0d1117 100%);
            padding: 40px;
            border-right: 1px solid var(--mfg-blue);
            box-shadow: inset -20px 0 50px var(--accent-glow);
        }

        /* Panel Muninn (Derecha) */
        .panel-muninn {
            background: linear-gradient(225deg, #09090b 0%, #0d1117 100%);
            padding: 40px;
            border-left: 1px solid var(--mfg-green);
        }

        /* Centro: El Escudo (Shield) */
        .shield-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }

        .shield-ring {
            width: 180px;
            height: 180px;
            border: 2px double var(--mfg-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(9, 9, 11, 0.9);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* Estilos de Contenido */
        .header-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .data-stream {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #71717a;
            margin-top: 20px;
            border-top: 1px solid #27272a;
            padding-top: 10px;
        }

        .btn-industrial {
            background: transparent;
            border: 1px solid #3f3f46;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-industrial:hover {
            border-color: var(--mfg-blue);
            background: var(--accent-glow);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar-terminal">
            <div style="color: var(--mfg-blue)">◈</div>
            <div>▤</div>
            <div>⚙</div>
        </aside>

        <main class="main-view">
            <!-- HUGINN: Pensamiento / Acción Inmediata -->
            <section class="panel-huginn">
                <div class="header-tag" style="color: var(--mfg-blue)">Sector: Huginn // Logic</div>
                <h1 style="font-weight: 200;">Trazabilidad</h1>
                <p>Captura de incidentes y análisis RCCA activo.</p>
                
                <button class="btn-industrial" onclick="runTraceability()">EJECUTAR ESCANEO</button>
                
                <div class="data-stream" id="log-huginn">
                    > Esperando entrada de datos...
                </div>
            </section>

            <!-- MUNINN: Memoria / Historial / Reportes -->
            <section class="panel-muninn">
                <div class="header-tag" style="color: var(--mfg-green)">Sector: Muninn // Memory</div>
                <h1 style="font-weight: 200;">Inteligencia</h1>
                <p>Generación de reportes 8D y memoria histórica de fallas.</p>
                
                <button class="btn-industrial" onclick="generateReport()">GENERAR REPORTE GLOBAL</button>

                <div class="data-stream" id="log-muninn">
                    > Acceso a base de datos: OK
                </div>
            </section>

            <!-- SHIELD NUCLEUS -->
            <div class="shield-overlay">
                <div class="shield-ring">
                    <span style="font-size: 2rem;">🛡️</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Lógica de Integración de Mejoras
        async function runTraceability() {
            const log = document.getElementById('log-huginn');
            log.innerHTML += "<br>> Iniciando motor de búsqueda TraceOps...";
            // Aquí se llama a la lógica de procesamiento de mensajes/datos[span_1](start_span)[span_1](end_span)
        }

        async function generateReport() {
            const log = document.getElementById('log-muninn');
            log.innerHTML += "<br>> Extrayendo datos históricos para 8D...";
            
            // Verificación de librerías cargadas antes de procesar
            if (typeof ExcelJS !== 'undefined') {
                log.innerHTML += "<br><span style='color:var(--mfg-green)'>> Motor ExcelJS: Listo.</span>";
            } else {
                log.innerHTML += "<br><span style='color:red'>> Error: Motor de reportes no cargado.</span>";
            }
        }

        // Inicialización del sistema
        window.onload = () => {
            console.log("SMTinel Command Center Iniciado Correctamente.");
        };
    </script>
</body>
</html>
