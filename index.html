<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMTintel — Manufacturing Analytics</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#F5F3EE;
--w:#fff;
--g200:#E2DDD7;
--g700:#4A4540;
--teal:#2E7A6A;
--teal2:#1E5545;
}

body{
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
background:var(--bg);
color:#1E1B18;
min-height:100vh
}

#root{
max-width:940px;
margin:0 auto;
padding:24px 16px
}

.hdr{
background:var(--teal2);
color:#fff;
border-radius:16px;
padding:20px;
margin-bottom:20px
}

.upload{
border:2px dashed var(--g200);
padding:40px;
border-radius:12px;
text-align:center;
background:#fff;
cursor:pointer
}

.btn{
background:var(--teal);
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:600;
cursor:pointer
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px
}

.card{
background:white;
padding:14px;
border-radius:10px;
border:1px solid var(--g200)
}

.card h3{
font-size:22px
}

.card p{
font-size:12px;
color:var(--g700)
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
padding:8px;
border-bottom:1px solid var(--g200);
font-size:12px;
text-align:left
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useRef}=React

// ---------- PARSER WHATSAPP ----------

function to24h(h,min,sec,mer){
let hour=parseInt(h)
const m=(mer||"").toLowerCase()

if(m.includes("p") && hour!==12) hour+=12
if(m.includes("a") && hour===12) hour=0

return {
hour,
timeStr:String(hour).padStart(2,"0")+":"+min+":"+(sec||"00")
}
}

function parseTurno(h){
if(h>=6 && h<14) return "1T"
if(h>=14 && h<22) return "2T"
return "3T"
}

function parseWhatsApp(txt){

const lines=txt.split(/\r?\n/)
const msgs=[]

const reA=/^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i
const reB=/^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i

let cur=null

for(const raw of lines){

const line=raw.trim()

const m=line.match(reA) || line.match(reB)

if(m){

if(cur) msgs.push(cur)

const d=m[1]
const mo=m[2]
const yr=m[3]

const h=m[4]
const min=m[5]
const sec=m[6]||"00"
const mer=m[7]||""

const sender=m[m.length-2]
const text=m[m.length-1]

let year=parseInt(yr)
if(year<100) year+=2000

const {hour,timeStr}=to24h(h,min,sec,mer)

cur={
fecha:d+"/"+mo+"/"+year,
hora:timeStr,
turno:parseTurno(hour),
sender:sender,
text:text
}

}else if(cur && line){
cur.text+=" "+line
}

}

if(cur) msgs.push(cur)

return msgs
}

// ---------- APP ----------

function App(){

const[file,setFile]=useState(null)
const[data,setData]=useState([])
const[fileRef]=useState(useRef())

async function handleZip(f){

try{

const zip=await JSZip.loadAsync(f)

for(const name of Object.keys(zip.files)){

if(name.endsWith(".txt")){

const txt=await zip.files[name].async("string")

const parsed=parseWhatsApp(txt)

setData(parsed.slice(0,30))

break

}

}

}catch(e){
alert("Error leyendo ZIP")
}

}

return(

<div>

<div className="hdr">
<h2>SMTintel — Manufacturing Analytics</h2>
<p>Chat de manufactura → Dashboard SMT</p>
</div>

<div className="upload"
onClick={()=>fileRef.current.click()}
>

<input
type="file"
ref={fileRef}
accept=".zip"
style={{display:"none"}}
onChange={e=>handleZip(e.target.files[0])}
/>

<p>Sube el ZIP exportado de WhatsApp</p>

<br/>

<button className="btn">Seleccionar archivo</button>

</div>

{data.length>0 && (

<>

<div className="stats">

<div className="card">
<h3>{data.length}</h3>
<p>Mensajes parseados</p>
</div>

<div className="card">
<h3>{[...new Set(data.map(x=>x.sender))].length}</h3>
<p>Participantes</p>
</div>

<div className="card">
<h3>{data.filter(x=>x.turno==="1T").length}</h3>
<p>Turno 1</p>
</div>

<div className="card">
<h3>{data.filter(x=>x.turno==="2T").length}</h3>
<p>Turno 2</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>Turno</th>
<th>Usuario</th>
<th>Mensaje</th>
</tr>
</thead>

<tbody>

{data.map((m,i)=>

<tr key={i}>
<td>{m.fecha}</td>
<td>{m.hora}</td>
<td>{m.turno}</td>
<td>{m.sender}</td>
<td>{m.text}</td>
</tr>

)}

</tbody>

</table>

</>

)}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
