<html lang="es">
<head>

<title>SMTintel — Manufacturing Analytics</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F3EE;--w:#fff;--g50:#F9F8F6;--g100:#F0EDE9;--g200:#E2DDD7;
  --g300:#C8C2BA;--g500:#8A847C;--g700:#4A4540;--g900:#1E1B18;
  --teal:#2E7A6A;--teal2:#1E5545;--teal3:#3A9A85;--tealLight:#D0EAE4;
  --lime:#CDDBA0;--lime2:#8A9F5C;--lime3:#F5EED0;
  --re:#DC2626;--rel:#FEF2F2;--or:#E8621A;--ol:#FFF0E8;
  --bl:#2563EB;--bll:#EFF4FF;--gr:#16A34A;--grl:#F0FDF4;
  --pu:#7C3AED;--pul:#F5F3FF;
}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh}
#root{max-width:940px;margin:0 auto;padding:24px 16px 60px}

.hdr{background:var(–teal2);border-radius:18px;padding:24px 32px;margin-bottom:20px;position:relative;overflow:hidden;display:flex;align-items:center;gap:24px}
.hdr::before{content:’’;position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(205,219,160,.12),transparent 70%);border-radius:50%}
.hdr-text{position:relative;z-index:1}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(205,219,160,.12);border:1px solid rgba(205,219,160,.22);color:var(–lime);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.hdr-text h1{font-size:13px;font-weight:300;color:var(–lime3);letter-spacing:.3px;margin-bottom:2px}
.hdr-text h2{font-size:11px;color:rgba(245,238,208,.45);font-weight:300;letter-spacing:.8px}

.api-bar{background:var(–w);border:1px solid var(–g200);border-radius:12px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.api-bar label{font-size:12px;font-weight:600;color:var(–g700);white-space:nowrap}
.api-input{flex:1;min-width:200px;border:1px solid var(–g200);border-radius:7px;padding:7px 12px;font-size:12px;color:var(–g900);font-family:monospace;background:var(–g50);outline:none}
.api-input:focus{border-color:var(–teal)}
.api-note{font-size:10.5px;color:var(–g500);width:100%}
.api-note a{color:var(–teal);text-decoration:none}

.up{background:var(–w);border:2px dashed var(–g200);border-radius:14px;margin-bottom:20px;overflow:hidden;cursor:pointer;transition:all .2s}
.up:hover,.up.drag{border-color:var(–teal);background:#F0F7F5}
.up-top{padding:32px 36px 24px;text-align:center}
.up-icon{width:52px;height:52px;background:#EDF5F3;border:1px solid #C5DDD8;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(–teal)}
.up h3{font-size:17px;font-weight:700;margin-bottom:5px}
.up p{font-size:13px;color:var(–g500);margin-bottom:14px}
.chip{display:inline-block;background:var(–g100);border:1px solid var(–g200);border-radius:6px;padding:3px 10px;font-size:10.5px;color:var(–g700);font-weight:500;margin:3px}
.up-btn{display:inline-flex;align-items:center;gap:7px;background:var(–teal);color:#fff;border:none;border-radius:9px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;transition:opacity .2s}
.up-btn:hover{opacity:.88}
.filter-bar{background:var(–g50);border-top:1px solid var(–g200);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:600;color:var(–g700)}
.day-btns{display:flex;gap:6px;flex-wrap:wrap}
.day-btn{border:1px solid var(–g200);background:var(–w);border-radius:7px;padding:5px 12px;font-size:12px;font-weight:500;color:var(–g700);cursor:pointer;transition:all .15s}
.day-btn:hover{border-color:var(–teal);color:var(–teal)}
.day-btn.active{background:var(–teal);border-color:var(–teal);color:#fff;font-weight:700}
.filter-note{font-size:11px;color:var(–g500);margin-left:auto}

.prog{background:var(–w);border:1px solid var(–g200);border-radius:14px;padding:32px 36px;text-align:center;margin-bottom:20px}
.prog h3{font-size:17px;font-weight:700;margin-bottom:5px}
.prog p{font-size:12.5px;color:var(–g500);margin-bottom:20px}
.pbar{background:var(–g100);border-radius:99px;height:7px;overflow:hidden;margin-bottom:16px}
.pfill{height:7px;border-radius:99px;background:linear-gradient(90deg,var(–teal2),var(–teal3));transition:width .5s ease}
.psteps{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.pstep{font-size:10px;color:var(–g300);font-weight:500;text-align:center;flex:1;min-width:60px}
.pstep.on{color:var(–teal);font-weight:700}
.pstep.ok{color:var(–gr)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.scard{background:var(–w);border:1px solid var(–g200);border-radius:11px;padding:14px 16px}
.sval{font-size:26px;font-weight:800;line-height:1}
.sval.te{color:var(–teal)}.sval.re{color:var(–re)}.sval.bl{color:var(–bl)}.sval.gr{color:var(–gr)}
.slb{font-size:10.5px;color:var(–g500);margin-top:3px}

.dlc{background:var(–teal2);border-radius:14px;padding:24px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:16px}
.dlc-txt h3{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.dlc-txt p{font-size:12px;color:rgba(245,238,208,.65)}
.dlc-sheets{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.dlc-sh{display:flex;align-items:center;gap:4px;background:rgba(205,219,160,.1);border:1px solid rgba(205,219,160,.18);border-radius:5px;padding:3px 9px;font-size:10px;color:var(–lime3)}
.dlbtn{display:inline-flex;align-items:center;gap:7px;background:var(–lime2);color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s}
.dlbtn:hover{opacity:.88}

.tcard{background:var(–w);border:1px solid var(–g200);border-radius:14px;overflow:hidden;margin-bottom:16px}
.tcard-hdr{padding:14px 20px;border-bottom:1px solid var(–g100);display:flex;align-items:center;justify-content:space-between}
.tcard-hdr h3{font-size:13.5px;font-weight:700}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{background:var(–g50);padding:9px 12px;text-align:left;font-weight:600;color:var(–g700);font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(–g200);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(–g100);color:var(–g700);vertical-align:top;line-height:1.4}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(–g50)}

.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9.5px;font-weight:700}
.bc{background:#FEE2E2;color:#991B1B}.ba{background:#FEF3C7;color:#92400E}
.bm{background:var(–bll);color:#1E3A8A}.bb{background:var(–grl);color:#166534}
.bo{background:#FFF7ED;color:#9A3412;border:1px solid #FED7AA}
.be{background:var(–bll);color:#1E40AF;border:1px solid #BFCFFE}
.bce{background:var(–grl);color:#14532D;border:1px solid #BBF7D0}
.bt{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE}

.plist{display:flex;flex-direction:column;gap:7px;padding:14px 16px}
.pitem{background:var(–g50);border:1px solid var(–g200);border-left:3px solid var(–teal);border-radius:0 9px 9px 0;padding:10px 14px}
.pitem.cr{border-left-color:var(–re)}.pitem.al{border-left-color:#F59E0B}
.pitem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.pitem-id{font-size:9.5px;font-weight:700;color:var(–g500)}
.pitem h4{font-size:12px;font-weight:700;color:var(–g900);margin-bottom:2px}
.pitem p{font-size:11px;color:var(–g500);line-height:1.4}
.pmeta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ptag{font-size:9.5px;background:var(–w);border:1px solid var(–g200);border-radius:4px;padding:2px 7px;color:var(–g700)}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.crt{background:var(–w);border:1px solid var(–g200);border-radius:12px;padding:16px 18px}
.crt h4{font-size:12.5px;font-weight:700;margin-bottom:12px}
.brow{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.blbl{font-size:10.5px;color:var(–g500);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrk{flex:1;background:var(–g100);border-radius:4px;height:7px}
.bfil{height:7px;border-radius:4px;background:var(–teal)}
.bfil.bl{background:var(–bl)}.bfil.re{background:var(–re)}.bfil.gr{background:var(–gr)}.bfil.ye{background:#F59E0B}.bfil.lm{background:var(–lime2)}.bfil.pu{background:var(–pu)}
.bnum{font-size:10.5px;font-weight:600;color:var(–g700);width:20px;text-align:right}

.krow{display:flex;align-items:center;gap:10px;background:var(–g50);border:1px solid var(–g200);border-radius:9px;padding:9px 13px;margin-bottom:7px}
.kval{font-size:18px;font-weight:800;color:var(–teal);width:70px;flex-shrink:0}
.kin{flex:1}.kin .nm{font-size:11.5px;font-weight:600;color:var(–g900)}
.kin .ts{font-size:10px;color:var(–g500)}
.kbar{width:100px;height:6px;background:var(–g200);border-radius:99px;flex-shrink:0}
.kbf{height:6px;border-radius:99px;background:var(–teal)}

.pf-card{background:var(–w);border:1px solid var(–g200);border-radius:14px;overflow:hidden;margin-bottom:16px}
.pf-hdr{padding:14px 20px;border-bottom:1px solid var(–g100);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pf-hdr h3{font-size:13.5px;font-weight:700;flex:1}
.pf-select{border:1px solid var(–g200);border-radius:8px;padding:7px 12px;font-size:12px;color:var(–g900);background:var(–g50);outline:none;cursor:pointer;min-width:180px}
.pf-select:focus{border-color:var(–teal)}
.pf-clear{display:inline-flex;align-items:center;gap:5px;background:var(–g100);border:1px solid var(–g200);border-radius:7px;padding:6px 12px;font-size:11px;font-weight:500;color:var(–g700);cursor:pointer}
.pf-body{padding:16px 20px}
.pf-profile{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
.pf-avatar{width:44px;height:44px;border-radius:50%;background:var(–teal);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex-shrink:0}
.pf-info{flex:1}
.pf-name{font-size:16px;font-weight:800;color:var(–g900);margin-bottom:3px}
.pf-dept{font-size:12px;color:var(–g500);margin-bottom:8px}
.pf-stats{display:flex;gap:10px;flex-wrap:wrap}
.pf-stat{background:var(–g50);border:1px solid var(–g200);border-radius:8px;padding:8px 14px;text-align:center}
.pf-stat-val{font-size:20px;font-weight:800;color:var(–teal);line-height:1}
.pf-stat-lbl{font-size:10px;color:var(–g500);margin-top:2px}
.pf-stat.bl .pf-stat-val{color:var(–bl)}.pf-stat.gr .pf-stat-val{color:var(–gr)}.pf-stat.re .pf-stat-val{color:var(–re)}
.pf-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(–teal);margin-bottom:10px;margin-top:4px}
.pf-empty{font-size:13px;color:var(–g500);text-align:center;padding:24px 0}

.cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(–g200);border-radius:14px;overflow:hidden;margin-bottom:16px}
.cmpc{padding:22px 26px;background:var(–w)}
.cmpc.aft{background:var(–g50);border-left:1px solid var(–g200)}
.cmplbl{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.cmpdot{width:8px;height:8px;border-radius:50%;background:var(–re)}
.cmpdot.g{background:var(–gr)}
.cmplbl span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(–g500)}
.cmrow{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.cmic{width:20px;height:20px;border-radius:5px;background:var(–rel);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(–re);font-size:10px;font-weight:700}
.cmic.g{background:var(–grl);color:var(–gr)}
.cmrow p{font-size:12px;color:var(–g700);line-height:1.4;padding-top:1px}

.resetbtn{display:inline-flex;align-items:center;gap:6px;background:var(–g100);border:1px solid var(–g200);border-radius:7px;padding:7px 14px;font-size:11.5px;font-weight:500;color:var(–g700);cursor:pointer;margin-bottom:16px}
.resetbtn:hover{background:var(–g200)}
.errc{background:var(–rel);border:1px solid #FECACA;border-radius:11px;padding:16px 20px;margin-bottom:16px;color:var(–re);font-size:12.5px}
.foot{background:var(–w);border:1px solid var(–g200);border-radius:14px;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:12px}
.foot p{font-size:11.5px;color:var(–g500)}
.foot strong{color:var(–g900)}
.sec-lbl{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.sec-dot{width:7px;height:7px;border-radius:50%;background:var(–teal)}
.sec-lbl span{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(–teal)}

@media(max-width:600px){
.stats{grid-template-columns:repeat(2,1fr)}
.charts{grid-template-columns:1fr}
.cmp{grid-template-columns:1fr}
.cmpc.aft{border-left:none;border-top:1px solid var(–g200)}
.hdr{padding:18px 18px;flex-direction:column;align-items:flex-start;gap:12px}
.dlc{flex-direction:column;align-items:flex-start}
#root{padding:12px 10px 40px}
.filter-note{display:none}
}
</style>

</head>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

// ── LOGO ──────────────────────────────────────────────────────────────────────
const Logo = () => {
const f = “‘Segoe UI’,system-ui,sans-serif”;
return (

<text x=“60” y=“48” style={{fontFamily:f,fontSize:“6px”,fontWeight:300}} fill=“rgba(205,219,160,.55)” letterSpacing=“0.6”>SMT · AOI · SPI · X-RAY · ROOT CAUSE</text>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function to24h(h,min,sec,mer){let hour=parseInt(h);const m=(mer||””).toLowerCase().replace(/[\s.]/g,””);if(m.startsWith(“p”)&&hour!==12)hour+=12;if(m.startsWith(“a”)&&hour===12)hour=0;return{hour,timeStr:`${String(hour).padStart(2,"0")}:${min}:${sec||"00"}`};}
function parseTurno(h){if(h>=6&&h<14)return”1T”;if(h>=14&&h<22)return”2T”;return”3T”;}

function parseWhatsApp(txt){
const lines=txt.split(/\r?\n/);const msgs=[];
const reA=/^[(\d{1,2})/(\d{1,2})/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a.?m.?|p.?m.?)?]\s*([^:]+?):\s*(.*)$/i;
const reB=/^(\d{1,2})/(\d{1,2})/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM|a.m.|p.m.)?\s*[-–]\s*([^:]+?):\s*(.*)$/i;
let cur=null;
for(const raw of lines){
const line=raw.replace(/[\u200e\u200f\u202a-\u202e\u202f]/g,””).trim();
const m=line.match(reA)||line.match(reB);
if(m){if(cur)msgs.push(cur);const[,d,mo,yr,h,min,sec,mer,sender,text]=m;let year=parseInt(yr);if(year<100)year+=2000;const{hour,timeStr}=to24h(h,min,sec,mer||””);const dateIso=`${year}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;const dateDisp=`${String(d).padStart(2,"0")}/${String(mo).padStart(2,"0")}/${year}`;cur={dateIso,dateDisp,timeStr,hour,turno:parseTurno(hour),sender:sender.replace(/^~/,””).trim(),text:text.trim()};}
else if(cur&&line&&!line.startsWith(”[”))cur.text+=” “+line;
}
if(cur)msgs.push(cur);return msgs;
}

function filterByDays(msgs,days){if(!msgs.length)return msgs;const sorted=[…msgs].sort((a,b)=>a.dateIso.localeCompare(b.dateIso));const last=new Date(sorted[sorted.length-1].dateIso);const cutoff=new Date(last);cutoff.setDate(cutoff.getDate()-days+1);const cutStr=cutoff.toISOString().slice(0,10);return sorted.filter(m=>m.dateIso>=cutStr);}

function cleanMsgs(msgs){
const skip=/imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|Se te añadió|creó este grupo|cifrados de extremo|agregó a|salió del grupo|cambió el|ahora es admin|Se editó este mensaje/i;
const noise=/^(buenos d|buenas t|buenas n|buen d|buen día|gracias|de nada|ok\b|oki|👍|🙏|ahí paso|ahi paso|ahí van|con permiso|disculpe|perdón|por favor|porfavor|hasta luego|con gusto|sale$|enterado$|recibido$|entendido$|\bsi\b$|\bno\b$)/i;
return msgs.filter(m=>m.text&&m.text.trim().length>8&&!m.text.match(skip)&&!m.text.trim().match(noise));
}

    <input className="api-input" type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>saveKey(e.target.value)}/>
    <div className="api-note">Guardada en este navegador · <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer">console.anthropic.com</a></div>
  </div>

  {state==="idle"&&(
    <div className={`up ${drag?"drag":""}`} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0])}} onClick={()=>fileRef.current.click()}>
      <div className="up-top">
        <input ref={fileRef} type="file" accept=".zip" style={{display:"none"}} onChange={e=>handle(e.target.files[0])}/>
        <div className="up-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
        <h3>Sube el .zip de WhatsApp</h3>
        <p>Arrastra o haz clic — cualquier grupo de manufactura</p>
        <div>{["CALIDAD SMT/PTH","SMT Output","ERBU CRBU","Cualquier grupo"].map(t=><span key={t} className="chip">{t}</span>)}</div>
        <button className="up-btn" onClick={e=>{e.stopPropagation();fileRef.current.click()}}>Seleccionar .zip</button>
      </div>
      <div className="filter-bar" onClick={e=>e.stopPropagation()}>
        <label>Últimos:</label>
        <div className="day-btns">{[1,3,7,14,30].map(d=><button key={d} className={`day-btn ${days===d?"active":""}`} onClick={()=>setDays(d)}>{d}d</button>)}</div>
        <div className="filter-note">Filtra periodo relevante del historial</div>
      </div>
    </div>
  )}

  {state==="loading"&&(
    <div className="prog">
      <h3>Procesando chat...</h3>
      <p>{msgStats?`${msgStats.clean} mensajes relevantes · ${msgStats.filtered} en período · ${msgStats.total} totales`:"Leyendo ZIP..."}</p>
      <div className="pbar"><div className="pfill" style={{width:`${prog}%`}}/></div>
      <div className="psteps">{STEPS.map((s,i)=><div key={i} className={`pstep ${i===progStep?"on":i<progStep?"ok":""}`}>{i<progStep?"✓ ":""}{s}</div>)}</div>
    </div>
  )}

  {state==="error"&&(<><div className="errc">⚠ {errMsg}</div><button className="resetbtn" onClick={reset}>← Intentar de nuevo</button></>)}

  {state==="done"&&result&&(
    <>
      <button className="resetbtn" onClick={reset}>← Analizar otro chat</button>

      <div className="dlc">
        <div className="dlc-txt">
          <h3>Excel listo para junta ✓</h3>
          <p>{res.periodo||""} · {ev.length} eventos · {msgStats?.clean||0} mensajes analizados</p>
          <div className="dlc-sheets">{["Resumen_Junta","Bitacora","Pendientes","KPIs_chat","Dashboard_Base","Directorio_Equipo","Catalogos_Reglas"].map(s=><div key={s} className="dlc-sh">▪ {s}</div>)}</div>
        </div>
        <button className="dlbtn" onClick={download}>⬇ Descargar .xlsx</button>
      </div>

      <div className="stats">
        <div className="scard"><div className="sval te">{ev.length}</div><div className="slb">Total eventos</div></div>
        <div className="scard"><div className="sval re">{crit.length}</div><div className="slb">Críticos activos</div></div>
        <div className="scard"><div className="sval bl">{pend.length}</div><div className="slb">Pendientes</div></div>
        <div className="scard"><div className="sval gr">{cerr.length}</div><div className="slb">Cerrados</div></div>
      </div>

      {kpis.length>0&&(
        <div className="tcard">
          <div className="tcard-hdr"><h3>KPIs reportados en chat</h3></div>
          <div style={{padding:"12px 16px"}}>
            {kpis.map((k,i)=>(
              <div key={i} className="krow">
                <div className="kval">{k.valor}<span style={{fontSize:10}}>{k.unidad}</span></div>
                <div className="kin"><div className="nm">{k.indicador}</div><div className="ts">{k.fechahora} · {k.fuente}</div></div>
                <div className="kbar"><div className="kbf" style={{width:`${Math.min(100,k.valor<2?k.valor*100:k.valor)}%`}}/></div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="charts">
        <div className="crt"><h4>Por modelo / N/P</h4>{byMod.map((x,i)=><div key={i} className="brow"><div className="blbl" title={x.l}>{x.l}</div><div className="btrk"><div className="bfil" style={{width:`${(x.n/mxM)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}</div>
        <div className="crt"><h4>Por línea / estación</h4>{byLin.map((x,i)=><div key={i} className="brow"><div className="blbl" title={x.l}>{x.l}</div><div className="btrk"><div className="bfil bl" style={{width:`${(x.n/mxL)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}</div>
        <div className="crt"><h4>Por prioridad</h4>{byPrio.map((x,i)=><div key={i} className="brow"><div className="blbl">{x.l}</div><div className="btrk"><div className={`bfil ${x.c}`} style={{width:`${(x.n/mxP)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}</div>
        <div className="crt"><h4>Por estatus</h4>{[{l:"Abiertos",n:ev.filter(e=>e.estatus==="Abierto").length,c:"re"},{l:"En proceso",n:ev.filter(e=>e.estatus==="En proceso").length,c:"ye"},{l:"Cerrados",n:cerr.length,c:"gr"}].map((x,i)=><div key={i} className="brow"><div className="blbl">{x.l}</div><div className="btrk"><div className={`bfil ${x.c}`} style={{width:`${(x.n/Math.max(ev.length,1))*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}</div>
      </div>

      {(byDef.length>0||byTipo.length>0)&&(
        <div className="charts">
          {byDef.length>0&&<div className="crt"><h4>Pareto defectos SMT</h4>{byDef.map((x,i)=><div key={i} className="brow"><div className="blbl" title={x.l}>{x.l}</div><div className="btrk"><div className="bfil pu" style={{width:`${(x.n/mxD)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}</div>}
          {byTipo.length>0&&<div className="crt"><h4>Por tipo de evento</h4>{byTipo.map((x,i)=><div key={i} className="brow"><div className="blbl">{x.l}</div><div className="btrk"><div className="bfil lm" style={{width:`${(x.n/mxT)*100}%`}}/></div><div className="bnum">{x.n}</div></div>)}</div>}
        </div>
      )}

      <div className="pf-card">
        <div className="pf-hdr">
          <h3>👤 Filtro por persona</h3>
          <select className="pf-select" value={personaFiltro} onChange={e=>setPersonaFiltro(e.target.value)}>
            <option value="">— Todos los participantes —</option>
            {personas.map((p,i)=><option key={i} value={p}>{p}</option>)}
          </select>
          {personaFiltro&&<button className="pf-clear" onClick={()=>setPersonaFiltro("")}>✕ Limpiar</button>}
        </div>
        {personaFiltro?(
          <div className="pf-body">
            <div className="pf-profile">
              <div className="pf-avatar">{personaFiltro.charAt(0).toUpperCase()}</div>
              <div className="pf-info">
                <div className="pf-name">{personaFiltro}</div>
                <div className="pf-dept">{dirInfo?`${dirInfo.departamento} · ${dirInfo.rol}${dirInfo.area_owner?` · Owner: ${dirInfo.area_owner}`:""}` : "Participante del chat"}</div>
                <div className="pf-stats">
                  <div className="pf-stat"><div className="pf-stat-val">{evRep.length}</div><div className="pf-stat-lbl">Reportó</div></div>
                  <div className="pf-stat bl"><div className="pf-stat-val">{evRes.length}</div><div className="pf-stat-lbl">Responsable</div></div>
                  <div className="pf-stat re"><div className="pf-stat-val">{evRep.filter(e=>e.prioridad==="Crítica").length}</div><div className="pf-stat-lbl">Críticos</div></div>
                  <div className="pf-stat gr"><div className="pf-stat-val">{[...evRep,...evRes].filter(e=>e.estatus!=="Cerrado").length}</div><div className="pf-stat-lbl">Abiertos</div></div>
                </div>
              </div>
            </div>
            {evRep.length>0&&(<><div className="pf-section-title">Eventos reportados ({evRep.length})</div><div className="plist" style={{padding:0,marginBottom:14}}>{evRep.map((e,i)=><PendItem key={i} e={e}/>)}</div></>)}
            {evRes.length>0&&(<><div className="pf-section-title">Eventos donde es responsable ({evRes.length})</div><div className="plist" style={{padding:0}}>{evRes.map((e,i)=><PendItem key={i} e={e}/>)}</div></>)}
            {evRep.length===0&&evRes.length===0&&<div className="pf-empty">Sin eventos registrados para esta persona en el periodo</div>}
          </div>
        ):(
          <div className="pf-body"><div className="pf-empty">Selecciona una persona para ver su actividad operativa</div></div>
        )}
      </div>

      <div className="tcard">
        <div className="tcard-hdr"><h3>Bitácora de eventos ({ev.length})</h3></div>
        <div className="tscroll">
          <table>
            <thead><tr><th>ID</th><th>Fecha</th><th>T</th><th>Línea</th><th>Tipo</th><th>Defecto SMT</th><th>Evento</th><th>Prioridad</th><th>Estatus</th></tr></thead>
            <tbody>
              {ev.map((e,i)=>(
                <tr key={i}>
                  <td><strong>{e.id}</strong></td>
                  <td style={{whiteSpace:"nowrap",fontSize:10.5}}>{e.fecha}</td>
                  <td>{e.turno}</td>
                  <td style={{maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.linea_estacion}</td>
                  <td><span style={{fontSize:9,background:"#EDF5F3",color:"#1E5545",padding:"2px 6px",borderRadius:4,fontWeight:600,whiteSpace:"nowrap"}}>{e.tipo_evento}</span></td>
                  <td style={{maxWidth:110}}>{e.defecto_smt&&e.defecto_smt!=="N/A"?<span className="badge bt" style={{whiteSpace:"normal",fontSize:9}}>{e.defecto_smt}</span>:<span style={{color:"var(--g300)",fontSize:10}}>—</span>}</td>
                  <td style={{maxWidth:180,fontSize:10.5}}>{e.evento_detectado}</td>
                  <td><span className={bprio(e.prioridad)}>{e.prioridad}</span></td>
                  <td><span className={best(e.estatus)}>{e.estatus}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {pend.length>0&&(
        <div className="tcard" style={{marginTop:16}}>
          <div className="tcard-hdr"><h3>Pendientes operativos ({pend.length})</h3></div>
          <div className="plist">{pend.map((e,i)=><PendItem key={i} e={e}/>)}</div>
        </div>
      )}

      <div style={{marginTop:16,marginBottom:8}}><div className="sec-lbl"><div className="sec-dot"/><span>Resultado del análisis</span></div></div>
      <div className="cmp">
        <div className="cmpc">
          <div className="cmplbl"><div className="cmpdot"/><span>Antes — Chat disperso</span></div>
          {["Sin clasificación de defectos SMT","Sin trazabilidad entre turnos","Eventos críticos mezclados con ruido","Juntas sin datos ni Pareto"].map((t,i)=><div key={i} className="cmrow"><div className="cmic">✕</div><p>{t}</p></div>)}
        </div>
        <div className="cmpc aft">
          <div className="cmplbl"><div className="cmpdot g"/><span>Después — SMTintel</span></div>
          <div className="cmrow"><div className="cmic g">✓</div><p><strong>{ev.length} eventos</strong> con defecto SMT clasificado</p></div>
          <div className="cmrow"><div className="cmic g">✓</div><p><strong>Pareto</strong> de defectos para root cause inmediato</p></div>
          <div className="cmrow"><div className="cmic g">✓</div><p><strong>{pend.length} pendientes</strong> con owner y acción</p></div>
          <div className="cmrow"><div className="cmic g">✓</div><p>Excel con 7 hojas + directorio del equipo</p></div>
        </div>
      </div>

      <div className="foot">
        <p><strong>SMTintel by ALDA</strong> · Manufacturing Analytics · {new Date().toLocaleDateString("es-MX")}</p>
        <button className="dlbtn" style={{padding:"9px 18px",fontSize:12}} onClick={download}>⬇ Descargar Excel</button>
      </div>
    </>
  )}
</>

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
