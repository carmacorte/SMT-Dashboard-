.be{background:#EBF0FC;color:#2040A0;border:1px solid #BDD0F8}
.bce{background:#EBF8EE;color:#145A28;border:1px solid #A0DEB4}
.bt{background:#F2ECFB;color:#521DA8;border:1px solid #C8A8F0}
.plist{display:flex;flex-direction:column;gap:8px;padding:14px}
.pitem{background:var(--g50);border:1px solid var(--g200);border-left:3px solid var(--green2);border-radius:0 10px 10px 0;padding:11px 14px;transition:all .15s}
.pitem:hover{background:var(--w);box-shadow:var(--shadow-sm);transform:translateX(2px)}
.pitem.cr{border-left-color:var(--re)}.pitem.al{border-left-color:var(--ye)}
.pitem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.pitem-id{font-size:9.5px;font-weight:700;color:var(--g400,var(--g300));letter-spacing:.04em}
.pitem h4{font-size:12.5px;font-weight:700;color:var(--g900);margin-bottom:3px;line-height:1.3}
.pitem p{font-size:11px;color:var(--g500);line-height:1.45}
.pmeta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ptag{font-size:9.5px;background:var(--w);border:1px solid var(--g200);border-radius:99px;padding:2px 8px;color:var(--g700);font-weight:500}
.krow{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,#EAF5F0,var(--w));border:1px solid #C0DECE;border-radius:10px;padding:11px 15px;margin-bottom:7px}
.kval{font-size:22px;font-weight:800;color:var(--green);width:72px;flex-shrink:0;line-height:1}
.kin{flex:1}
.kin .nm{font-size:12px;font-weight:600;color:var(--g900)}
.kin .ts{font-size:10px;color:var(--g500);margin-top:1px}
.kbar{width:80px;height:5px;background:var(--g200);border-radius:99px;flex-shrink:0}
.kbf{height:5px;border-radius:99px;background:var(--green)}
.pf-card{background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.pf-hdr{padding:14px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--g50)}
.pf-hdr h3{font-size:13.5px;font-weight:700;flex:1;color:var(--g900)}
.pf-select{border:1.5px solid var(--g200);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--g900);background:var(--w);outline:none;cursor:pointer;min-width:180px;transition:border-color .15s}
.pf-select:focus{border-color:var(--green)}
.pf-clear{background:var(--g100);border:1px solid var(--g200);border-radius:var(--radius-sm);padding:6px 13px;font-size:11.5px;color:var(--g700);cursor:pointer;font-weight:500}
.pf-body{padding:18px 20px}
.pf-profile{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
.pf-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--green2),var(--green));display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(30,92,72,.25)}
.pf-info{flex:1}
.pf-name{font-size:16px;font-weight:800;color:var(--g900);margin-bottom:3px}
.pf-dept{font-size:11.5px;color:var(--g500);margin-bottom:8px}
.pf-stats{display:flex;gap:8px;flex-wrap:wrap}
.pf-stat{background:var(--g50);border:1.5px solid var(--g200);border-radius:10px;padding:9px 14px;text-align:center;min-width:66px}
.pf-stat-val{font-size:22px;font-weight:800;color:var(--green);line-height:1}
.pf-stat-lbl{font-size:9.5px;color:var(--g500);margin-top:2px;font-weight:500}
.pf-stat.bl .pf-stat-val{color:var(--bl)}.pf-stat.gr .pf-stat-val{color:var(--gr)}.pf-stat.re .pf-stat-val{color:var(--re)}
.pf-section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:8px;margin-top:6px}
.pf-empty{font-size:13px;color:var(--g300);text-align:center;padding:28px 0}
.cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.cmpc{padding:22px 24px;background:var(--w)}
.cmpc.aft{background:var(--g50);border-left:1px solid var(--g200)}
.cmplbl{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.cmpdot{width:8px;height:8px;border-radius:50%;background:var(--re)}.cmpdot.g{background:var(--gr)}
.cmplbl span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500)}
.cmrow{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.cmic{width:20px;height:20px;border-radius:5px;background:var(--reL);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--re);font-size:10px;font-weight:700}
.cmic.g{background:var(--grL);color:var(--gr)}
.cmrow p{font-size:12px;color:var(--g700);line-height:1.4;padding-top:1px}
.resetbtn{display:inline-flex;align-items:center;gap:5px;background:var(--g100);border:1.5px solid var(--g200);border-radius:var(--radius-sm);padding:7px 14px;font-size:11.5px;font-weight:500;color:var(--g700);cursor:pointer;margin-bottom:16px;transition:all .15s}
.resetbtn:hover{background:var(--g200)}
.errc{background:var(--reL);border:1.5px solid #F0C4BE;border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;color:var(--re);font-size:12.5px}
.foot{background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;box-shadow:var(--shadow-sm)}
.foot p{font-size:11px;color:var(--g500)}
.foot strong{color:var(--g900)}
.ev-gallery{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ev-thumb{width:48px;height:48px;border-radius:7px;object-fit:cover;border:1.5px solid var(--g200);cursor:pointer;transition:all .15s;flex-shrink:0}
.ev-thumb:hover{transform:scale(1.08);border-color:var(--green);box-shadow:0 2px 8px rgba(30,92,72,.2)}
.ev-add-btn{width:48px;height:48px;border-radius:7px;border:1.5px dashed var(--g300);background:var(--g50);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g500);font-size:18px;flex-shrink:0;transition:all .15s}
.ev-add-btn:hover{border-color:var(--green);color:var(--green);background:var(--grL)}
.ev-count{font-size:9px;font-weight:700;color:var(--green);background:#EAF5F0;border:1px solid #B8DECE;border-radius:99px;padding:1px 7px;margin-left:4px;vertical-align:middle}
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.lb-box{background:#fff;border-radius:16px;overflow:hidden;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.lb-hdr{padding:12px 16px;background:var(--g50);border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;gap:10px}
.lb-hdr span{font-size:12px;font-weight:600;color:var(--g700);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-close{width:28px;height:28px;border-radius:50%;background:var(--g100);border:none;cursor:pointer;font-size:14px;color:var(--g700);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb-img-wrap{overflow:auto;display:flex;align-items:center;justify-content:center;padding:12px}
.lb-img-wrap img{max-width:80vw;max-height:70vh;border-radius:8px;display:block}
.img-panel{background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:12px;margin-top:8px}
.img-panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:8px}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
.img-pick-item{position:relative;cursor:pointer;border-radius:7px;overflow:hidden;aspect-ratio:1}
.img-pick-item img{width:100%;height:100%;object-fit:cover;display:block}
.img-pick-item.selected::after{content:"";position:absolute;inset:0;background:rgba(30,92,72,.4);border:2px solid var(--green);border-radius:7px}
.img-pick-item.selected::before{content:"v";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;font-weight:700;z-index:1}
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:12px}
.picker-box{background:#fff;border-radius:18px 18px 0 0;width:min(920px,100%);max-height:84vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.picker-head{padding:12px 16px;border-bottom:1px solid var(--g200);background:var(--g50);display:flex;align-items:center;justify-content:space-between;gap:12px}
.picker-title{font-size:13px;font-weight:700;color:var(--g900)}
.picker-sub{font-size:10px;color:var(--g500);margin-top:2px}
.picker-close{border:1px solid var(--g200);background:#fff;color:var(--g700);cursor:pointer;border-radius:10px;padding:7px 12px;font-size:11px;font-weight:600;flex-shrink:0}
.picker-grid{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px;overflow:auto;background:#fff}
.picker-card{position:relative;border:1.5px solid var(--g200);border-radius:10px;overflow:hidden;background:#fff;cursor:pointer;transition:all .15s}
.picker-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.picker-card.selected{border-color:var(--green);box-shadow:0 0 0 2px rgba(30,92,72,.12)}
.picker-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#EEECEA}
.picker-check{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.picker-meta{padding:6px 7px 8px}
.picker-date{font-size:9px;font-weight:700;color:var(--green);line-height:1.2}
.picker-time,.picker-sender{font-size:8.5px;color:var(--g500);line-height:1.2;margin-top:1px}
.ic-wrap{position:relative;width:100%;padding:12px 0 10px;background:#F4F3F0;border-radius:16px;margin-bottom:14px;border:1px solid #DDDBD7;overflow:hidden}
.ic-stage{position:relative;display:flex;align-items:center;justify-content:center;min-height:332px;padding:0 6px}
.ic-card{position:absolute;background:#fff;border-radius:18px;border:1px solid #DDDBD7;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.ic-card.active{position:relative;width:calc(100% - 44px);max-width:456px;box-shadow:0 10px 28px rgba(0,0,0,.14);border-color:#2A7A60;z-index:3;cursor:default;transform:translateX(0) scale(1)}
.ic-card.prev{width:calc(100% - 94px);max-width:340px;transform:translateX(-74%) scale(.78) rotateY(7deg);opacity:.32;z-index:2;filter:brightness(.92);box-shadow:0 3px 12px rgba(0,0,0,.10)}
.ic-card.next{width:calc(100% - 94px);max-width:340px;transform:translateX(74%) scale(.78) rotateY(-7deg);opacity:.32;z-index:2;filter:brightness(.92);box-shadow:0 3px 12px rgba(0,0,0,.10)}
.ic-card.far-prev{transform:translateX(-102%) scale(.62) rotateY(10deg);opacity:.08;z-index:1}
.ic-card.far-next{transform:translateX(102%) scale(.62) rotateY(-10deg);opacity:.08;z-index:1}
.ic-card-head{padding:12px 14px 8px;border-bottom:1px solid #EEECEA;display:flex;align-items:flex-start;gap:8px}
.ic-tabs{display:flex;overflow-x:auto;border-bottom:1px solid #EEECEA;background:#F8F7F5;scrollbar-width:none}
.ic-tabs::-webkit-scrollbar{display:none}
.ic-tab{flex:1 1 0;padding:10px 6px;font-size:10.5px;font-weight:700;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#8A8580;transition:all .15s;white-space:nowrap;text-align:center}
.ic-tab.on{border-bottom-color:#1E5C48;color:#1E5C48;background:#fff}
.ic-face-switch{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-bottom:8px}
.ic-face-btn{min-height:36px;border-radius:999px;padding:0 10px;font-size:10.5px;font-weight:800;cursor:pointer}
.ic-body{padding:12px 14px;min-height:132px;overflow-y:auto;max-height:256px}
.ic-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.ic-field{margin-bottom:8px}
.ic-field-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A8580;margin-bottom:3px}
.ic-field-val{font-size:11px;color:#1A1714;line-height:1.4}
.ic-field-val.empty{color:#C8C4BE;font-style:italic}
.ic-badge{display:inline-block;font-size:8.5px;font-weight:700;border-radius:999px;padding:3px 8px;margin:2px 3px 2px 0}
.ic-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0 2px;position:relative;z-index:10}
.ic-nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid #DDDBD7;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#3D3A36;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.ic-nav-btn:hover{background:#1E5C48;color:#fff;border-color:#1E5C48}
.ic-nav-btn:disabled{opacity:.3;cursor:default;box-shadow:none}
.ic-dots{display:flex;gap:4px;align-items:center}
.ic-dot{width:6px;height:6px;border-radius:50%;background:#DDDBD7;transition:all .25s}
.ic-dot.on{background:#1E5C48;width:18px;border-radius:3px}
.ic-related{background:#FEF9E8;border:1px solid #F5E4A0;border-radius:10px;padding:8px 10px;margin-top:10px}
@media(max-width:600px){
.ic-wrap{padding:10px 0 8px;border-radius:16px}
.ic-wrap > div:first-child{padding:0 12px 8px !important}
.ic-stage{min-height:292px;padding:0 4px}
.ic-card.active{width:calc(100% - 16px);max-width:none}
.ic-card.prev{width:calc(100% - 56px);transform:translateX(-84%) scale(.76);opacity:.22}
.ic-card.next{width:calc(100% - 56px);transform:translateX(84%) scale(.76);opacity:.22}
.ic-card.far-prev,.ic-card.far-next{display:none}
.ic-card-head{padding:10px 12px 8px}
.ic-tab{padding:9px 4px;font-size:10px}
.ic-face-btn{min-height:34px;font-size:10px}
.ic-body{padding:10px 12px;max-height:246px;min-height:124px}
.ic-grid-2{gap:7px}
.ic-field{margin-bottom:7px}
.ic-field-label{font-size:7.8px}
.ic-field-val{font-size:10.5px;line-height:1.36}
.ic-nav{gap:10px;padding:8px 0 0}
.ic-nav-btn{width:32px;height:32px;font-size:14px}
.ic-dot.on{width:16px}
.ic-related{padding:8px 9px}
}
@media(max-width:600px){
.cmp{grid-template-columns:1fr}
.cmpc.aft{border-left:none;border-top:1px solid var(--g200)}
.hdr{padding:20px 18px;flex-direction:column;gap:14px}
#root{padding:14px 12px 60px}
.lb-img-wrap img{max-width:90vw;max-height:60vh}
.picker-overlay{padding:0}
.picker-box{width:100%;max-height:88vh;border-radius:18px 18px 0 0}
.picker-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:10px}
}
@keyframes trace-loop{0%{stroke-dashoffset:400;opacity:0}8%{opacity:1}70%{stroke-dashoffset:0;opacity:1}85%{stroke-dashoffset:0;opacity:1}95%{stroke-dashoffset:400;opacity:0}100%{stroke-dashoffset:400;opacity:0}}
@keyframes via-loop{0%,15%{r:0;opacity:0}30%{r:3.5;opacity:1}40%{r:2.5}70%,85%{r:3;opacity:1}95%,100%{r:0;opacity:0}}
@keyframes pulse-glow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes signal-travel{0%{cx:144;opacity:0}5%{opacity:1}100%{cx:560;opacity:0}}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.anim-header{animation:fade-up .6s ease both}
.anim-header-sub{animation:fade-up .6s .1s ease both}
.anim-header-desc{animation:fade-up .6s .2s ease both}
.anim-chips{animation:fade-up .5s .35s ease both}

.saas-header-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:14px;
  background:#fff;
  border:1px solid #E5E2DD;
  box-shadow:0 8px 24px rgba(26,23,20,.06);
  color:#3E3935;
  font-size:12px;
  font-weight:600;
}


.ops-hero{position:relative;min-height:460px;border-radius:28px;overflow:hidden;margin:0 0 24px;background:#081119;box-shadow:0 20px 48px rgba(0,0,0,.14)}
.ops-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.02)}
.ops-hero-content{position:relative;z-index:2;max-width:760px;padding:42px 24px 28px;color:#F4F6F7}
.ops-hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:#9FC4B6;margin-bottom:14px}
.ops-hero-title{margin:0 0 12px;font-size:44px;line-height:.95;letter-spacing:-.04em;font-weight:800;color:#FFFFFF}
.ops-hero-title span{display:block;color:#7FB49E;font-size:38px}
.ops-hero-subtitle{margin:0 0 20px;max-width:520px;font-size:16px;line-height:1.55;color:rgba(244,246,247,.82)}
.ops-hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.ops-hero-btn{border:none;border-radius:999px;padding:12px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s}
.ops-hero-btn.primary{background:#1E5C48;color:#fff;box-shadow:0 6px 18px rgba(30,92,72,.28)}
.ops-hero-btn.primary:hover{background:#174A3B;transform:translateY(-1px)}
.ops-hero-btn.ghost{background:rgba(255,255,255,.08);color:#F4F6F7;border:1px solid rgba(255,255,255,.14)}
.ops-hero-btn.ghost:hover{background:rgba(255,255,255,.12)}
.ops-hero-chips{display:flex;gap:8px;flex-wrap:wrap}
.ops-hero-chips span{font-size:10.5px;font-weight:600;color:#E6F0EB;background:rgba(255,255,255,.06);border:1px solid rgba(200,216,184,.25);border-radius:999px;padding:5px 12px}
@media (max-width:768px){
  .ops-hero{min-height:400px;border-radius:22px}
  .ops-hero-content{padding:30px 18px 22px}
  .ops-hero-title{font-size:36px}
  .ops-hero-title span{font-size:30px}
  .ops-hero-subtitle{font-size:15px;line-height:1.55}
  .ops-hero-btn{width:100%}
}


/* ---- TraceOps embedded UI fix: ensure classes actually render ---- */
.traceops-context{background:linear-gradient(135deg,#FFFFFF,#F8FAFC);border:1px solid #E6EAF0;border-radius:24px;padding:18px 20px;margin:0 0 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;box-shadow:0 10px 24px rgba(20,32,51,.05)}
.traceops-context-main{display:flex;flex-direction:column;gap:8px;min-width:0;flex:1}
.traceops-context-kicker{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#5B657A}
.traceops-context-title{font-size:28px;line-height:1.04;font-weight:800;color:#162033;letter-spacing:-.03em}
.traceops-context-subtitle{font-size:13px;line-height:1.55;color:#5B657A;max-width:760px}
.traceops-context-chips{display:flex;gap:8px;row-gap:8px;flex-wrap:wrap}
.traceops-context-chips span{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:7px 12px;background:#F8FAFC;border:1px solid #E6EAF0;font-size:10.5px;font-weight:700;color:#243B63;white-space:nowrap}
.traceops-context-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.traceops-tabs{display:inline-flex;align-items:center;gap:6px;background:#EEF2F7;border:1px solid #D9E2EC;border-radius:999px;padding:6px;margin:0 0 16px}
.traceops-tab{border:none;background:transparent;color:#5B657A;font-size:12px;font-weight:700;padding:10px 16px;border-radius:999px;cursor:pointer;transition:all .18s ease}
.traceops-tab.active{background:#243B63;color:#fff;box-shadow:0 4px 12px rgba(36,59,99,.18)}
.traceops-kpi-strip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px}
.traceops-kpi-card{background:#fff;border:1px solid #E6EAF0;border-radius:20px;padding:16px 18px;box-shadow:0 2px 12px rgba(20,32,51,.04);display:flex;flex-direction:column;gap:6px;min-width:0}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.TRACEOPS_SUPABASE = window.TRACEOPS_SUPABASE || {
  url: "",
  anonKey: "",
  enabled: false
};

window.TraceOpsCloud = (function(){
  function cfg(){
    var raw = window.TRACEOPS_SUPABASE || {};
    return {
      url: (raw.url || "").trim(),
      anonKey: (raw.anonKey || "").trim(),
      enabled: !!raw.enabled
    };
  }

  function isConfigured(){
    var c = cfg();
    return c.enabled && c.url && c.anonKey && window.supabase && typeof window.supabase.createClient === "function";
  }

  function getClient(){
    if (!isConfigured()) return null;
    if (!window.__traceopsSupabaseClient) {
      var c = cfg();
      window.__traceopsSupabaseClient = window.supabase.createClient(c.url, c.anonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
    }
    return window.__traceopsSupabaseClient;
  }

  async function getUser(){
    var client = getClient();
    if (!client) return null;
    var out = await client.auth.getUser();
    return out && out.data ? out.data.user : null;
  }

async function initApp(){
  var client = getClient();
  if (!client) return;

  const { data } = await client.auth.getSession();

  if (data && data.session) {
    console.log("Sesión activa detectada");

    // 🔥 AUTO LOAD
    await loadRccasFromCloud();
  }
}
async function loadRccasFromCloud(){
  var client = getClient();
  if (!client) {
    console.warn("No hay cliente Supabase");
    return;
  }

  const { data, error } = await client
    .from('traceops_rcca_cases')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    console.error("Error cargando RCCA:", error);
    return;
  }

  console.log("RCCA desde nube:", data);

  // 🔥 NORMALIZAR (ESTO ES CLAVE)
  const rccas = (data || []).map(row => row.payload);

  console.log("RCCA normalizados:", rccas);

  window.__traceops_cloud_rccas = rccas;
  if (typeof renderInvestigationCarousel === "function") {
    renderInvestigationCarousel(rccas);
  }
} 
async function signIn(email, password){
    var client = getClient();
    if (!client) throw new Error("Supabase no configurado.");
    var out = await client.auth.signInWithPassword({ email: email, password: password });
    if (out.error) throw out.error;
    return out.data;
  }

async function signUp(email, password){
    var client = getClient();
    if (!client) throw new Error("Supabase no configurado.");
    var out = await client.auth.signUp({ email: email, password: password });
    if (out.error) throw out.error;
    return out.data;
  }

  async function signOut(){
    var client = getClient();
    if (!client) return;
    var out = await client.auth.signOut();
    if (out.error) throw out.error;
  }

  function onAuthChange(handler){
    var client = getClient();
    if (!client) return { data: { subscription: { unsubscribe: function(){} } } };
    return client.auth.onAuthStateChange(function(evt, session){
      handler(evt, session && session.user ? session.user : null, session);
    });
  }

  async function listRcca(){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) return [];
    var q = await client
      .from("traceops_rcca_cases")
      .select("rcca_id,payload,updated_at")
      .eq("user_id", user.id)
      .order("updated_at", { ascending: false });
    if (q.error) throw q.error;
    return (q.data || []).map(function(row){
      var payload = row.payload || {};
      payload.rcca_id = payload.rcca_id || row.rcca_id;
      payload._cloud_updated_at = row.updated_at || null;
      return payload;
    });
  }

  async function upsertRcca(rcca){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) throw new Error("Sesion no disponible.");
    var row = {
      user_id: user.id,
      rcca_id: rcca.rcca_id,
      payload: Object.assign({}, rcca, {
        updated_at: new Date().toISOString(),
        source: rcca.source || "manual"
      }),
      updated_at: new Date().toISOString()
    };
    var q = await client.from("traceops_rcca_cases").upsert(row, { onConflict: "user_id,rcca_id" }).select("updated_at").single();
    if (q.error) throw q.error;
    return q.data;
  }

  async function removeRcca(rccaId){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) throw new Error("Sesion no disponible.");
    var q = await client.from("traceops_rcca_cases").delete().eq("user_id", user.id).eq("rcca_id", rccaId);
    if (q.error) throw q.error;
  }

  return {
    cfg: cfg,
    isConfigured: isConfigured,
    getClient: getClient,
    getUser: getUser,
    signIn: signIn,
    signUp: signUp,
    signOut: signOut,
    onAuthChange: onAuthChange,
    listRcca: listRcca,
    upsertRcca: upsertRcca,
    removeRcca: removeRcca
  };
})();
</script>

<script>

function parseTurno(h, min, dateIso) {
  var m = parseInt(min) || 0;
  var dow = 1;
  if (dateIso) {
    var parts = dateIso.split("-");
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    dow = d.getDay();
  }
  if (dow === 6) {
    if (h >= 0 && h < 9) return "3T";
    if (h >= 9 && h < 18) return "1T-Sab";
    return "2T-Sab";
  }
  if (dow === 0) {
    if (h >= 6 && h < 18) return "1T-Dom";
    return "2T-Dom";
  }
  if (h >= 0 && h < 6) return "3T";
  if (h < 15 || (h === 15 && m < 15)) return "1T";
  return "2T";
}

function parseWhatsApp(txt) {
  var lines = txt.split(/\r?\n/);
  var msgs = [];
  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
  var cur = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].replace(/[\u200e\u200f\u202a\u202b\u202c\u202d\u202e\u202f]/g, "").trim();
    var m = line.match(reA) || line.match(reB);
    if (m) {
      if (cur) msgs.push(cur);
      var d, mo, yr, h2, min, sec, mer, sender, text;
      if (line.match(reA)) {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec=m[6]||"00"; mer=m[7]||""; sender=m[8]; text=m[9];
      } else {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec="00"; mer=""; sender=m[6]; text=m[7];
      }
      var year = parseInt(yr);
      if (year < 100) year += 2000;
      var t = to24h(h2, min, sec, mer);
      var dateIso = year + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      cur = {
        dateIso: dateIso,
        dateDisp: String(d).padStart(2,"0") + "/" + String(mo).padStart(2,"0") + "/" + year,
        timeStr: t.timeStr,
        hour: t.hour,
        turno: parseTurno(t.hour, min, dateIso),
        sender: sender.replace(/^~/,"").trim(),
        text: text.trim()
      };
    } else if (cur && line && !line.startsWith("[")) {
      cur.text += " " + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function getISOWeek(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getWeekRange(weekN, year) {
  var jan4 = new Date(Date.UTC(year, 0, 4));
  var day = jan4.getUTCDay() || 7;
  var monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - day + 1 + (weekN - 1) * 7);
  var sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  return {
    from: monday.toISOString().slice(0,10),
    to: sunday.toISOString().slice(0,10)
  };
}

function filterMsgs(msgs, mode, days, dateFrom, dateTo, weekNum, weekYear) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  if (mode === "range" && dateFrom && dateTo) {
    var f = dateFrom <= dateTo ? dateFrom : dateTo;
    var t = dateFrom <= dateTo ? dateTo : dateFrom;
    return sorted.filter(function(m){ return m.dateIso >= f && m.dateIso <= t; });
  }
  if (mode === "week" && weekNum && weekYear) {
    var wr = getWeekRange(parseInt(weekNum), parseInt(weekYear));
    return sorted.filter(function(m){ return m.dateIso >= wr.from && m.dateIso <= wr.to; });
  }
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function traceOpsFilterMediaNamesBySelectedRange(mediaNames, imgMeta, filteredMsgs) {
  var out = { names: [], outsideRangeCount: 0, unknownDateCount: 0 };
  var names = mediaNames || [];
  if (!names.length) return out;
  if (!filteredMsgs || !filteredMsgs.length) {
    out.outsideRangeCount = names.length;
    return out;
  }
  var allowedDates = {};
  filteredMsgs.forEach(function(m) {
    if (m && m.dateIso) allowedDates[m.dateIso] = true;
  });
  names.forEach(function(fname) {
    var meta = (imgMeta && imgMeta[fname]) || null;
    var dateIso = meta && meta.dateIso ? meta.dateIso : "";
    if (!dateIso) {
      out.unknownDateCount += 1;
      return;
    }
    if (allowedDates[dateIso]) out.names.push(fname);
    else out.outsideRangeCount += 1;
  });
  return out;
}

function cleanMsgs(msgs) {
  var skip = /imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|cifrados de extremo|ahora es admin/i;
  var noise = /^(buenos d|buenas t|buen d|gracias|de nada|enterado|recibido|entendido)/i;
  return msgs.filter(function(m){
    return m.text && m.text.trim().length > 8 && !m.text.match(skip) && !m.text.trim().match(noise);
  });
}

// ═══════════════════════════════════════════════════════════════
// EML / MBOX PARSER — TraceOps v2026-03-22-clean
// Normaliza emails al mismo formato de mensajes WhatsApp
// Limpia HTML/MIME, quoted-printable, firmas y replies largos
// ═══════════════════════════════════════════════════════════════

function decodeQuotedPrintable(str) {
  if (!str) return '';
  return String(str)
    .replace(/=\r?\n/g, '')
    .replace(/=([0-9A-Fa-f]{2})/g, function(_, hex) {
      try { return String.fromCharCode(parseInt(hex, 16)); } catch(_) { return _; }
    });
}

function decodeMimeWords(str) {
  if (!str) return '';
  return String(str).replace(/=\?([^?]+)\?([BQbq])\?([^?]+)\?=/g, function(_, charset, enc, text) {
    try {
      if (String(enc).toUpperCase() === 'B') {
        return decodeURIComponent(escape(atob(String(text).replace(/\s/g, ''))));
      }
      var qp = String(text).replace(/_/g, ' ');
      return decodeQuotedPrintable(qp);
    } catch(_) {
      return text;
    }
  });
}

function decodeHtmlEntities(str) {
  if (!str) return '';
  try {
    var ta = document.createElement('textarea');
    ta.innerHTML = str;
    return ta.value;
  } catch(_) {
    return str
      .replace(/&nbsp;/gi, ' ')
      .replace(/&amp;/gi, '&')
      .replace(/&lt;/gi, '<')
      .replace(/&gt;/gi, '>')
      .replace(/&quot;/gi, '"')
      .replace(/&#39;/gi, "'");
  }
}

function stripHtmlToText(str) {
  if (!str) return '';
  var s = String(str)
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<head[\s\S]*?<\/head>/gi, ' ')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<\/div>/gi, '\n')
    .replace(/<\/li>/gi, '\n')
    .replace(/<li[^>]*>/gi, '• ')
    .replace(/<[^>]+>/g, ' ');
  return decodeHtmlEntities(s);
}

function decodeEmlEncoding(str, encoding) {
  if (!str) return '';
  var enc = (encoding || '').toLowerCase().trim();
  if (enc === 'base64') {
    try { return decodeURIComponent(escape(atob(String(str).replace(/\s/g, '')))); } catch(_) { return str; }
  }
  if (enc === 'quoted-printable') return decodeQuotedPrintable(str);
  return str;
}

function parseEmlHeaders(lines) {
  var headers = {};
  var i = 0;
  while (i < lines.length) {
    if (!lines[i] || lines[i].trim() === '') { i++; break; }
    var m = lines[i].match(/^([\w\-]+):\s*(.*)/);
    if (m) {
      var key = m[1].toLowerCase();
      var val = m[2];
      while (i + 1 < lines.length && /^[ \t]/.test(lines[i + 1])) {
        i++;
        val += ' ' + lines[i].trim();
      }
      headers[key] = decodeMimeWords(val);
    }
    i++;
  }
  return { headers: headers, bodyStart: i };
}

function cleanEmailTextLocal(text) {
  if (!text) return '';
  var s = String(text);
  s = s.replace(/\r/g, '\n');
  s = s.replace(/\u00a0/g, ' ').replace(/[\u200B-\u200F\u202A-\u202E]/g, '');
  s = stripHtmlToText(s);
  s = decodeHtmlEntities(s);
  s = s.replace(/^\s*(mime-version|content-type|content-transfer-encoding|content-disposition|x-[\w\-]+):.*$/gim, ' ');
  s = s.replace(/^--[\w=:\-\.\/\+]+\s*$/gim, ' ');
  s = s.replace(/\[(cid|image):[^\]]+\]/gi, ' ');
  var cutPatterns = [
    /\n\s*-----Original Message-----[\s\S]*$/i,
    /\n\s*From:\s.*\n\s*Sent:\s.*\n\s*To:\s.*[\s\S]*$/i,
    /\n\s*De:\s.*\n\s*Enviado el:\s.*\n\s*Para:\s.*[\s\S]*$/i,
    /\n\s*On .*wrote:[\s\S]*$/i,
    /\n\s*El .*escribi[oó]:[\s\S]*$/i,
    /\n\s*________________________________[\s\S]*$/i
  ];
  for (var i = 0; i < cutPatterns.length; i++) {
    if (cutPatterns[i].test(s)) {
      s = s.replace(cutPatterns[i], ' ');
      break;
    }
  }
  s = s.replace(/\n\s*>.*$/gm, ' ');
  s = s.replace(/https?:\/\/\S+/gi, ' ');
  s = s.replace(/\b(?:AVISO DE CONFIDENCIALIDAD|CONFIDENTIALITY NOTICE|DISCLAIMER|Microsoft Teams meeting|Join the meeting|Start Free Trial|Book a Demo)\b[\s\S]*$/i, ' ');
  s = s.replace(/\n{2,}/g, '\n');
  s = s.replace(/[ \t]+/g, ' ');
  s = s.replace(/\s*\n\s*/g, '\n');
  var lines = s.split(/\n+/).map(function(line){ return line.trim(); }).filter(function(line){
    if (!line) return false;
    if (/^(from|to|cc|bcc|subject|sent|date|de|para|asunto|enviado):\s*$/i.test(line)) return false;
    if (/^(--|__)+$/.test(line)) return false;
    return true;
  });
  s = lines.join('\n').trim();
  s = s.replace(/\n/g, ' ');
  s = s.replace(/\s{2,}/g, ' ').trim();
  return s;
}

function extractEmlBodyText(lines, bodyStart, contentType, encoding) {
  var rawBody = lines.slice(bodyStart).join('\n');
  var ct = (contentType || '').toLowerCase();
  var boundaryM = ct.match(/boundary="?([^";]+)"?/i);
  if (boundaryM) {
    var boundary = boundaryM[1].trim();
    var safeBoundary = boundary.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('--' + safeBoundary);
    var parts = rawBody.split(re);
    var bestText = '';
    var bestHtml = '';
    for (var pi = 0; pi < parts.length; pi++) {
      var part = parts[pi];
      if (!part || /^\s*--\s*$/.test(part)) continue;
      var partLines = part.replace(/^\s+/, '').split(/\r?\n/);
      var partInfo = parseEmlHeaders(partLines);
      var partCt = (partInfo.headers['content-type'] || '').toLowerCase();
      var partEnc = (partInfo.headers['content-transfer-encoding'] || '').toLowerCase().trim();
      var payload = decodeEmlEncoding(partLines.slice(partInfo.bodyStart).join('\n').trim(), partEnc);
      if (partCt.indexOf('multipart/') >= 0) {
        var nested = extractEmlBodyText(partLines, partInfo.bodyStart, partCt, partEnc);
        if (nested && !bestText) bestText = nested;
        continue;
      }
      if (partCt.indexOf('text/plain') >= 0) {
        var cleanPlain = cleanEmailTextLocal(payload);
        if (cleanPlain && cleanPlain.length > bestText.length) bestText = cleanPlain;
      } else if (partCt.indexOf('text/html') >= 0) {
        var cleanHtml = cleanEmailTextLocal(payload);
        if (cleanHtml && cleanHtml.length > bestHtml.length) bestHtml = cleanHtml;
      }
    }
    if (bestText) return bestText;
    if (bestHtml) return bestHtml;
  }
  var decoded = decodeEmlEncoding(rawBody.trim(), encoding);
  return cleanEmailTextLocal(decoded);
}

function parseEmlToMsg(rawText) {
  if (!rawText || !rawText.trim()) return null;
  var lines = String(rawText).split(/\r?\n/);
  var info = parseEmlHeaders(lines);
  var h = info.headers;

  var dateObj = null;
  try { dateObj = h['date'] ? new Date(h['date']) : null; } catch(_) {}
  if (!dateObj || isNaN(dateObj.getTime())) dateObj = new Date();

  var year = dateObj.getFullYear();
  var month = dateObj.getMonth() + 1;
  var day = dateObj.getDate();
  var hour = dateObj.getHours();
  var min = dateObj.getMinutes();
  var dateIso = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  var timeStr = String(hour).padStart(2,'0') + ':' + String(min).padStart(2,'0');

  var fromRaw = decodeMimeWords(h['from'] || 'email@desconocido');
  var addrM = fromRaw.match(/<([^>]+)>/);
  var addr = addrM ? addrM[1] : fromRaw.replace(/"/g,'').trim();

  var body = extractEmlBodyText(lines, info.bodyStart, h['content-type'] || '', h['content-transfer-encoding'] || '');
  var text = ((subject ? '[' + subject + '] ' : '') + body).replace(/\s+/g, ' ').trim();
  if (!text || text.trim().length < 12) return null;
  if (text.length > 1200) text = text.slice(0, 1200) + '...';

  return {
    dateIso: dateIso,
    dateDisp: String(day).padStart(2,'0') + '/' + String(month).padStart(2,'0') + '/' + year,
    timeStr: timeStr,
    hour: hour,

}

function parseMboxToMsgs(rawText) {

function traceOpsIsStickerMediaLocal(baseName) {
  var b = String(baseName || "").toLowerCase().trim();

  if (/\.webp$/i.test(b)) return true;
  if (/(^|[_\-\s])(sticker|stickers|emoji|meme|funny|tenor|giphy|gif)([_\-\s]|\.)/i.test(b)) return true;
  return false;
}

var _zipRef = null;
var _imgCache = {};

async function readZip(file) {
  var zip = await JSZip.loadAsync(file);
  _zipRef = zip;
  _imgCache = {};
  var names = Object.keys(zip.files);
  var txt = null;
  var imgNames = [];
  var filteredMediaNames = [];
  var imgMeta = {};
  var emlMsgs = [];

  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    if (name.startsWith("__MACOSX")) continue;
    var base = name.split("/").pop();
    if (!base) continue;

    // WhatsApp txt (existente)
    if (!txt && base.endsWith(".txt") && !base.toLowerCase().endsWith(".eml")) {
      txt = await zip.files[name].async("string");
    }
    // Imagenes (existente) — filtra stickers / noise multimedia
    if (/\.(jpe?g|png|webp)$/i.test(base)) {
      if (traceOpsIsStickerMediaLocal(base)) {
        filteredMediaNames.push(base);
      } else {
        imgNames.push(base);
      }
    }
    // EML — nuevo
    if (base.toLowerCase().endsWith(".eml")) {
      try {
        var emlRaw = await zip.files[name].async("string");
        var msg = parseEmlToMsg(emlRaw);
        if (msg) emlMsgs.push(msg);
      } catch(_) {}
    }
    // MBOX — nuevo
    if (base.toLowerCase().endsWith(".mbox")) {
      try {
        var mboxRaw = await zip.files[name].async("string");
        var mboxMsgs = parseMboxToMsgs(mboxRaw);
        emlMsgs = emlMsgs.concat(mboxMsgs);
      } catch(_) {}
    }
  }

  // Construir imgMeta desde txt de WhatsApp si existe
  if (txt) {
    var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
    var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
    var lastMeta = null;
    var lastTextAny = "";
    var lastTextBySender = {};
    txt.split(/\r?\n/).forEach(function(rawLine) {
      var line = rawLine.replace(/[\u200e\u200f\u202a-\u202f]/g,"").trim();
      var m = line.match(reA) || line.match(reB);
      if (m) {
        var isA = !!line.match(reA);
        var d=m[1],mo=m[2],yr=m[3],h2=m[4],min2=m[5];
        var mer=isA?(m[7]||""):""; var sender=isA?m[8]:m[6]; var text=isA?m[9]:m[7];
        var year=parseInt(yr); if(year<100) year+=2000;
        var hour=parseInt(h2);
        var mlow=(mer||"").toLowerCase().replace(/[\s.]/g,"");
        if(mlow.indexOf("p")===0 && hour!==12) hour+=12;
        if(mlow.indexOf("a")===0 && hour===12) hour=0;
        var senderNorm=(sender||"").replace(/^~/,"").trim();
        lastMeta={
          dateIso:year+"-"+String(mo).padStart(2,"0")+"-"+String(d).padStart(2,"0"),
          timeStr:String(hour).padStart(2,"0")+":"+min2,
          sender:senderNorm
        };
        if (text && !/<adjunto:/i.test(text)) {
          lastTextAny = String(text || "").replace(/\s+/g," ").trim();
          if (senderNorm) lastTextBySender[senderNorm] = lastTextAny;
        }
      } else if (lastMeta && line && !line.startsWith("[")) {
        var prev = lastTextBySender[lastMeta.sender] || lastTextAny || "";
        var merged = (prev + " " + line).replace(/\s+/g," ").trim();
        lastTextAny = merged;
        if (lastMeta.sender) lastTextBySender[lastMeta.sender] = merged;
      }
      var adj = line.match(/<adjunto:\s*([^>]+\.(?:jpe?g|png|webp))\s*>/i);
      if (adj && lastMeta) {
        imgMeta[adj[1].trim()] = {
          dateIso:lastMeta.dateIso,
          timeStr:lastMeta.timeStr,
          sender:lastMeta.sender,
          contextText:(lastTextBySender[lastMeta.sender] || lastTextAny || "").slice(0,320)
        };
      }
    });
  }

  var hasWA = !!(txt && txt.trim().length > 0);
  var hasEml = emlMsgs.length > 0;

  if (!hasWA && !hasEml) {
    throw new Error("No se encontro .txt de WhatsApp ni archivos .eml/.mbox en el ZIP");
  }

  return {
    txt: txt || "",
    imgNames: imgNames,
    filteredMediaNames: filteredMediaNames,
    imgMeta: imgMeta,
    emlMsgs: emlMsgs || [],
    hasWA: hasWA,
    hasEml: hasEml
  };
}

async function loadImg(fname) {
  if (_imgCache[fname]) return _imgCache[fname];
  if (!_zipRef) return null;
  var allNames = Object.keys(_zipRef.files);
  var match = allNames.find(function(n){ return n.split("/").pop() === fname; });
  if (!match) return null;
  try {
    var b64 = await _zipRef.files[match].async("base64");
    var ext = fname.split(".").pop().toLowerCase().replace("jpg","jpeg");
    var url = "data:image/"+ext+";base64,"+b64;
    _imgCache[fname] = url;
    return url;
  } catch(_) { return null; }
}

  function traceOpsNormSenderSafeLocal(s){
    return String(s||"").toLowerCase().replace(/^~/,"").replace(/[^a-z0-9]+/g," ").trim();
  }

  function traceOpsTextBlobForEvent(ev){
    return [
      ev && ev.reporta || "",
      ev && ev.responsable_sugerido || "",

  function traceOpsExtractModelTokensSafeLocal(text){
    try {
      if (typeof extractModelTokensLocal === "function") return extractModelTokensLocal(text);
    } catch (_) {}
    var s = String(text||"");
    var out = [];
    var m = s.match(/\b(?:N\/P|P\/N|MODEL|MODELO|PART)\s*[:# ]?\s*([A-Z0-9][A-Z0-9-]{4,})/ig) || [];
    m.forEach(function(hit){
      var m2 = hit.match(/([A-Z0-9][A-Z0-9-]{4,})/i);
      if (m2) out.push(String(m2[1]).toUpperCase());
    });
    var m3 = s.match(/\b([A-Z]{2,}[0-9]{3,}[A-Z0-9-]*)\b/g) || [];
    m3.forEach(function(v){ out.push(String(v).toUpperCase()); });
    return Array.from(new Set(out)).slice(0,12);
  }

  function traceOpsExtractPartsSafeLocal(text){
    try {
      if (typeof extractPartsLocal === "function") return extractPartsLocal(text);
    } catch (_) {}
    var s = String(text||"");
    var found = s.match(/\b(?:U|R|C|Q|L|D|TP|IC|CN|FB)\d{1,4}\b/ig) || [];
    return Array.from(new Set(found.map(function(v){ return String(v).toUpperCase(); }))).slice(0,20);
  }

  function traceOpsMiniNormLocal(text){
    return String(text||"")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g,"")
      .replace(/[^a-z0-9]+/g," ")
      .trim();
  }

  function traceOpsTokenOverlapScoreLocal(a, b){
    var tokens = Array.from(new Set(traceOpsMiniNormLocal(a).split(" ").filter(function(w){ return w && w.length > 3; })));
    var blob = " " + traceOpsMiniNormLocal(b) + " ";
    var score = 0;
    tokens.forEach(function(t){
      if (blob.indexOf(" " + t + " ") >= 0) score += 1;
    });
    return score;
  }

  function traceOpsAutoAttachImagesToEvents(eventos, imageNames, metaMap){
    var map = {};
    var evs = (eventos||[]).slice();
    var imgs = imageNames || [];
    if(!evs.length || !imgs.length) return map;

    imgs.forEach(function(fname){
      var meta = (metaMap && metaMap[fname]) || {};
      var imgMs = parseIsoDateTimeMs(meta.dateIso, meta.timeStr);
      if(imgMs == null) return;

      var bestEv = null;
      var bestScore = -9999;
      var nearestEv = null;
      var nearestDiff = 999999;
      var sameDayEvents = evs.filter(function(ev){
        var evMs0 = parseEventDateTimeMs(ev);
        return evMs0 != null && sameCalendarDay(imgMs, evMs0);
      });

      evs.forEach(function(ev){
        var evMs = parseEventDateTimeMs(ev);
        if(evMs == null) return;
        if(!sameCalendarDay(imgMs, evMs)) return;

        var diffMin = Math.abs(imgMs - evMs) / 60000;
        if (diffMin < nearestDiff) {
          nearestDiff = diffMin;
          nearestEv = ev;
        }

        var score = 0;

        if (diffMin <= 5) score += 14;
        else if (diffMin <= 15) score += 11;
        else if (diffMin <= 30) score += 9;
        else if (diffMin <= 60) score += 6;
        else if (diffMin <= 180) score += 3;
        else if (diffMin <= 480) score += 1;
        else score += 0;

        var imgSender = traceOpsNormSenderSafeLocal(meta.sender || "");
        var evSender = traceOpsNormSenderSafeLocal(ev.reporta || "");
        var respSender = traceOpsNormSenderSafeLocal(ev.responsable_sugerido || "");
        if (imgSender && evSender && imgSender === evSender) score += 5;
        else if (imgSender && respSender && imgSender === respSender) score += 4;

        var eventBlob = traceOpsTextBlobForEvent(ev);
        var contextText = String(meta.contextText || "");
        var overlap = traceOpsTokenOverlapScoreLocal(contextText, eventBlob);
        score += Math.min(8, overlap * 2);

        var ctxModels = traceOpsExtractModelTokensSafeLocal(contextText);
        var ctxParts = traceOpsExtractPartsSafeLocal(contextText);
        if (ctxModels.length && overlap > 0) score += 2;
        if (ctxParts.length && overlap > 0) score += 3;
        if (/\b(?:aoi|ict|smt|pth|socket|dimm|mix|mezcla|material|label|etiqueta|board|pcb|u\d+|r\d+|c\d+)\b/i.test(contextText)) score += 1;

        if (score > bestScore) {
          bestScore = score;
          bestEv = ev;
        }
      });

      if(!bestEv && sameDayEvents.length === 1){
        bestEv = sameDayEvents[0];
        bestScore = 3;
      }

      if((!bestEv || bestScore < 3) && sameDayEvents.length <= 2 && nearestEv && nearestDiff <= 720){
        bestEv = nearestEv;
        bestScore = 2;
      }

      if(bestEv && (bestScore >= 3 || (sameDayEvents.length <= 2 && nearestDiff <= 720))){
        if(!map[bestEv.id]) map[bestEv.id] = [];
        map[bestEv.id].push(fname);
      }
    });

    Object.keys(map).forEach(function(evId){
      map[evId] = uniqueNames(map[evId]).slice(0,6);
    });

    return map;
  }

            {authUser&&(

        <div className="sidebar-section">

            {state==="done"&&<button className="sidebar-nuevo" onClick={function(){reset();if(isMobile())setSidebarOpen(false);}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>Nuevo analisis</button>}
            {xlsxBytes&&<button className="sidebar-btn active" onClick={function(){download();if(isMobile())setSidebarOpen(false);}} style={{background:"rgba(122,148,72,.15)",color:"#8ABD6E"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Descargar .xlsx</button>}
            <div style={{fontSize:10,lineHeight:1.5,color:"rgba(255,255,255,.38)",padding:"4px 2px 0"}}>La carga de ZIP vive en el header principal para que nunca quede bloqueada por el drawer.</div>

        <div className="sidebar-section" style={{flex:1}}>

            <button className={"sidebar-btn"+(state==="done"?" active":"")} onClick={function(){if(isMobile())setSidebarOpen(false);var el=document.getElementById("results-section");if(el){el.scrollIntoView({behavior:"smooth"});}else if(state!=="done"){window.scrollTo({top:0,behavior:"smooth"});}}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Resultados</button>
            <button className={"sidebar-btn"+(false?" active":"")} onClick={function(){if(isMobile())setSidebarOpen(false);var el=document.getElementById("rcca-section");if(el){el.scrollIntoView({behavior:"smooth"});}}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>RCCA</button>

            <span style={{fontSize:10,fontWeight:800,padding:"4px 8px",borderRadius:999,background:adminOverride?"#244E3E":"rgba(255,255,255,.08)",color:adminOverride?"#fff":"rgba(255,255,255,.72)"}}>{adminOverride?"ACTIVO":"OFF"}</span>
          </button>
          <div className="sidebar-api-note" style={{marginTop:8}}>Override local para este dispositivo. Omite advertencias de rango y sube el limite de salida para pruebas.</div>

        <div className="sidebar-footer">
          <p>TraceOps by SMTintel - ALDA<br/>Operational Event Intelligence</p>
        </div>

      {/* App header */}
      <div className={"sidebar-overlay"+(sidebarOpen&&isMobile()?" show":"")} onClick={function(){setSidebarOpen(false);}}/>

      <header className="saas-topbar">
        <div className="saas-topbar-left">
          <button className="saas-menu-btn" onClick={function(e){e.stopPropagation();setSidebarOpen(!sidebarOpen);}}>
            {sidebarOpen?<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>}

            <span className="hide-mobile">{authUser?"Nube RCCA":"Local RCCA"}</span>
          </div>
          {state==="done"&&<button className="saas-header-btn" onClick={function(){reset();if(isMobile())setSidebarOpen(false);}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg><span className="hide-mobile">Nuevo</span></button>}

          {xlsxBytes&&<button className="saas-header-btn" onClick={function(){download();if(isMobile())setSidebarOpen(false);}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span className="hide-mobile">Descargar XLSX</span></button>}
        </div>

      {/* Main content */}
      <div className={"main-content"+((!sidebarOpen||isMobile())?" expanded":"")}>

{lightbox&&(

              <div style={{flex:1,overflow:"hidden"}}><div style={{fontSize:12,fontWeight:600,color:"#3D3A36",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lightbox.name}</div>{lightbox.meta&&<div style={{fontSize:10,color:"#8A8580",marginTop:2}}>{formatDateIso(lightbox.meta.dateIso)} {lightbox.meta.timeStr} - {lightbox.meta.sender}</div>}</div>
              <button className="lb-close" onClick={function(){setLightbox(null);}}>x</button>
            </div>
            <div className="lb-img-wrap"><img src={lightbox.src} alt={lightbox.name}/></div>

        </div>

      {rccaForm&&<RccaForm init={rccaForm} onSave={saveRcca} onClose={function(){clearRccaDraft();setRccaForm(null);}}/>}

                <div style={{background:"#F5F0FE",border:"1px solid #DBCDF8",borderRadius:10,padding:"10px 8px",textAlign:"center"}}><div style={{fontSize:9,fontWeight:700,color:"#6B2DA8",textTransform:"uppercase"}}>Mad</div><div style={{fontSize:13,fontWeight:700,color:"#6B2DA8"}}>{rccaDetail.madurez_analisis?"M"+rccaDetail.madurez_analisis:"-"}</div></div>
                <div style={{background:"#EAF5F0",border:"1px solid #B8DECE",borderRadius:10,padding:"10px 8px",textAlign:"center"}}><div style={{fontSize:9,fontWeight:700,color:"#1E5C48",textTransform:"uppercase"}}>Eventos</div><div style={{fontSize:13,fontWeight:700,color:"#1E5C48"}}>{rccaDetail.event_ids&&rccaDetail.event_ids.length?rccaDetail.event_ids.length:"0"}</div></div>
              </div>
              {[{l:"Problema",v:rccaDetail.problema,color:"#C0392B",bg:"#FEF0EE"},{l:"Hipotesis",v:rccaDetail.hipotesis,color:"#6B2DA8",bg:"#F5F0FE"},{l:"Causa Raiz",v:rccaDetail.causa_raiz,color:"#2952A3",bg:"#EBF0FC"},{l:"Evidencia Resumen",v:rccaDetail.evidencia_resumen,color:"#1E5C48",bg:"#EAF5F0"},{l:"Validacion",v:rccaDetail.validacion,color:"#2952A3",bg:"#EBF0FC"},{l:"Alcance / Exposicion",v:rccaDetail.alcance_exposicion,color:"#B87820",bg:"#FEF9E8"},{l:"Material Afectado",v:rccaDetail.material_afectado,color:"#6A6560",bg:"#F8F7F5"},{l:"Contencion",v:rccaDetail.contencion,color:"#B87820",bg:"#FEF9E8"},{l:"Accion Correctiva",v:rccaDetail.accion_correctiva,color:"#1A7A3C",bg:"#EBF8EE"},{l:"Accion Preventiva",v:rccaDetail.accion_preventiva,color:"#2A7A60",bg:"#EAF5F0"},{l:"Patron",v:rccaDetail.patron_detectado,color:"#6B2DA8",bg:"#F5F0FE"},{l:"Leccion",v:rccaDetail.leccion_aprendida,color:"#1A1714",bg:"#F8F7F5"}].filter(function(f){return f.v;}).map(function(f){return(
                <div key={f.l} style={{background:f.bg,border:"1px solid "+f.color+"30",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:f.color,marginBottom:5}}>{f.l}</div>
                  <div style={{fontSize:12,color:"#1A1714",lineHeight:1.5}}>{f.v}</div>
                </div>

              {rccaDetail.event_ids&&rccaDetail.event_ids.length>0&&(

            </div>
          </div>

            {["TraceOps","SMT","AOI","Incident Story","Root Cause"].map(function(t){return <span key={t}>{t}</span>;})}

                      if (!r.accion_correctiva || r.accion_correctiva.trim().length < 10) return;
                      var otherEvents = ev.filter(function(e){
                        var linked = r.event_ids && r.event_ids.indexOf(e.id) >= 0;
                        if (linked) return false;
                        var sameModel = r.modelo && e.modelo && r.modelo.toLowerCase() === e.modelo.toLowerCase();
                        var sameDef = r.problema && e.defecto_smt && e.defecto_smt !== "N/A" && r.problema.toLowerCase().indexOf(e.defecto_smt.toLowerCase()) >= 0;
                        var sameType = r.patron_detectado && e.tipo_evento && r.patron_detectado.toLowerCase().indexOf(e.tipo_evento.toLowerCase()) >= 0;
                        return sameModel || sameDef || sameType;
                      });
                      if (otherEvents.length > 0) {
                        yokoCount += otherEvents.length;
                        yokoItems.push({rcca:r, targets:otherEvents.length});
                      }
                    });
                    return (
                      <div>
                        <div style={{fontSize:32,fontWeight:800,color:"#fff",lineHeight:1,marginBottom:4}}>{yokoCount}</div>
                        <div style={{fontSize:9,color:"rgba(255,255,255,.35)"}}>oportunidades detectadas</div>
                        <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:6}}>
                          <span style={{fontSize:8,background:"rgba(91,155,213,.15)",color:"#5B9BD5",borderRadius:4,padding:"2px 7px",fontWeight:600}}>{yokoItems.length} soluciones replicables</span>
                        </div>
                      </div>
                    );
                  })()}
                </div>

              </div>

              {/* LessonTrace detail - Lecciones aprendidas */}
              {rccaList.length > 0 && (function(){
                var lessons = rccaList.filter(function(r){ return r.leccion_aprendida && r.leccion_aprendida.trim().length > 5; });
                if (lessons.length === 0) return null;
                return (
                  <div style={{borderTop:"1px solid #2A5A30",padding:"16px 20px",background:"rgba(30,26,12,.6)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                      <div style={{width:6,height:6,borderRadius:50,background:"#D4960A"}}/>
                      <span style={{fontSize:10.5,fontWeight:700,color:"#D4960A",letterSpacing:".06em",textTransform:"uppercase"}}>LessonTrace — Memoria Organizacional</span>
                      <span style={{fontSize:9,color:"rgba(255,255,255,.3)",marginLeft:"auto"}}>{lessons.length} leccion{lessons.length!==1?"es":""}</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {lessons.slice(0,5).map(function(r){
                        return (
                          <div key={r.rcca_id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(184,120,32,.15)",borderRadius:10,padding:"10px 14px"}}>
                            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:6}}>
                              <div>
                                <span style={{fontSize:9,fontFamily:"monospace",fontWeight:700,color:"#D4960A"}}>{r.rcca_id}</span>
                                {r.modelo && <span style={{fontSize:8.5,color:"rgba(255,255,255,.3)",marginLeft:8}}>{r.modelo}</span>}
                                {r.linea && <span style={{fontSize:8.5,color:"rgba(255,255,255,.3)",marginLeft:6}}>{r.linea}</span>}
                              </div>
                            </div>
                            <div style={{fontSize:11,color:"rgba(255,255,255,.75)",lineHeight:1.45,marginBottom:6}}>{r.leccion_aprendida.slice(0,120)}{r.leccion_aprendida.length>120?"...":""}</div>
                            {r.causa_raiz && <div style={{fontSize:9.5,color:"rgba(255,255,255,.35)",borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:5}}>Causa raiz: {r.causa_raiz.slice(0,80)}{r.causa_raiz.length>80?"...":""}</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* Yokoten detail - Soluciones replicables */}
              {rccaList.length > 0 && ev.length > 0 && (function(){
                var yokoItems = [];
                rccaList.forEach(function(r){
                  if (!r.accion_correctiva || r.accion_correctiva.trim().length < 10) return;
                  var targets = ev.filter(function(e){
                    var linked = r.event_ids && r.event_ids.indexOf(e.id) >= 0;
                    if (linked) return false;
                    var sameModel = r.modelo && e.modelo && e.modelo !== "N/D" && r.modelo.toLowerCase() === e.modelo.toLowerCase();
                    var sameDef = r.problema && e.defecto_smt && e.defecto_smt !== "N/A" && r.problema.toLowerCase().indexOf(e.defecto_smt.toLowerCase()) >= 0;
                    var sameType = r.patron_detectado && e.tipo_evento && r.patron_detectado.toLowerCase().indexOf(e.tipo_evento.toLowerCase()) >= 0;
                    return sameModel || sameDef || sameType;
                  });
                  if (targets.length > 0) yokoItems.push({rcca:r, targets:targets});
                });
                if (yokoItems.length === 0) return null;
                return (
                  <div style={{borderTop:"1px solid #2A5A30",padding:"16px 20px",background:"rgba(12,16,32,.6)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                      <div style={{width:6,height:6,borderRadius:50,background:"#5B9BD5"}}/>
                      <span style={{fontSize:10.5,fontWeight:700,color:"#5B9BD5",letterSpacing:".06em",textTransform:"uppercase"}}>Yokoten — Compartir Conocimiento</span>
                      <span style={{fontSize:9,color:"rgba(255,255,255,.3)",marginLeft:"auto"}}>{yokoItems.length} solucion{yokoItems.length!==1?"es":""} replicable{yokoItems.length!==1?"s":""}</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {yokoItems.slice(0,4).map(function(y){
                        return (
                          <div key={y.rcca.rcca_id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(91,155,213,.15)",borderRadius:10,padding:"10px 14px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                              <span style={{fontSize:9,fontFamily:"monospace",fontWeight:700,color:"#5B9BD5"}}>{y.rcca.rcca_id}</span>
                              <span style={{fontSize:8.5,background:"rgba(91,155,213,.12)",color:"#5B9BD5",borderRadius:4,padding:"1px 7px",fontWeight:600}}>Solucion probada</span>
                              <span style={{fontSize:8.5,color:"rgba(255,255,255,.3)",marginLeft:"auto"}}>{y.targets.length} evento{y.targets.length!==1?"s":""} aplicable{y.targets.length!==1?"s":""}</span>
                            </div>
                            <div style={{fontSize:10.5,color:"rgba(255,255,255,.7)",lineHeight:1.4,marginBottom:8}}>{y.rcca.accion_correctiva.slice(0,100)}{y.rcca.accion_correctiva.length>100?"...":""}</div>
                            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                              <span style={{fontSize:8,color:"rgba(255,255,255,.25)",marginRight:4}}>Aplicar a:</span>
                              {y.targets.slice(0,4).map(function(e){
                                return <span key={e.id} style={{fontSize:8,fontFamily:"monospace",background:"rgba(91,155,213,.1)",color:"#5B9BD5",borderRadius:3,padding:"1px 6px"}}>{e.id}</span>;
                              })}
                              {y.targets.length > 4 && <span style={{fontSize:8,color:"rgba(255,255,255,.25)"}}>+{y.targets.length-4} mas</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* Footer - Tagline */}
              <div style={{borderTop:"1px solid #2A5A30",padding:"12px 20px",textAlign:"center",background:"rgba(0,0,0,.2)"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.25)",letterSpacing:".1em"}}>De Experiencia a Memoria Organizacional</div>
              </div>

            </div>
          )}

          <div className="foot">
            <p><strong>TraceOps</strong> by SMTintel - ALDA - {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"8px 16px",fontSize:12}} onClick={download}>Descargar Excel</button>
          </div>
        </div>
      )}
      </div>{/* end main-content */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.addEventListener('unhandledrejection', function(e) {
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:60px;left:0;right:0;background:#8E44AD;color:#fff;padding:16px;font-family:monospace;font-size:13px;z-index:99999;word-break:break-all';
  box.innerHTML = '<strong>UNHANDLED REJECTION</strong><br>' + (e.reason ? e.reason.toString() : 'unknown');
  document.body.appendChild(box);
});
</script></body>

</html>
