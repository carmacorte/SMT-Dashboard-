<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.TRACEOPS_SUPABASE = window.TRACEOPS_SUPABASE || {
  url: "",
  anonKey: "",
  enabled: false
};

window.TraceOpsCloud = (function(){
  function cfg(){
    var raw = window.TRACEOPS_SUPABASE || {};
    return {
      url: (raw.url || "").trim(),
      anonKey: (raw.anonKey || "").trim(),
      enabled: !!raw.enabled
    };
  }

  function isConfigured(){
    var c = cfg();
    return c.enabled && c.url && c.anonKey && window.supabase && typeof window.supabase.createClient === "function";
  }

  function getClient(){
    if (!isConfigured()) return null;
    if (!window.__traceopsSupabaseClient) {
      var c = cfg();
      window.__traceopsSupabaseClient = window.supabase.createClient(c.url, c.anonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
    }
    return window.__traceopsSupabaseClient;
  }

  async function getUser(){
    var client = getClient();
    if (!client) return null;
    var out = await client.auth.getUser();
    return out && out.data ? out.data.user : null;
  }

async function initApp(){
  var client = getClient();
  if (!client) return;

  const { data } = await client.auth.getSession();

  if (data && data.session) {
    console.log("Sesión activa detectada");

    // 🔥 AUTO LOAD
    await loadRccasFromCloud();
  }
}
async function loadRccasFromCloud(){
  var client = getClient();
  if (!client) {
    console.warn("No hay cliente Supabase");
    return;
  }

  const { data, error } = await client
    .from('traceops_rcca_cases')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    console.error("Error cargando RCCA:", error);
    return;
  }

  console.log("RCCA desde nube:", data);

  // 🔥 NORMALIZAR (ESTO ES CLAVE)
  const rccas = (data || []).map(row => row.payload);

  console.log("RCCA normalizados:", rccas);

  window.__traceops_cloud_rccas = rccas;
  if (typeof renderInvestigationCarousel === "function") {
    renderInvestigationCarousel(rccas);
  }
} 
async function signIn(email, password){
    var client = getClient();
    if (!client) throw new Error("Supabase no configurado.");
    var out = await client.auth.signInWithPassword({ email: email, password: password });
    if (out.error) throw out.error;
    return out.data;
  }

async function signUp(email, password){
    var client = getClient();
    if (!client) throw new Error("Supabase no configurado.");
    var out = await client.auth.signUp({ email: email, password: password });
    if (out.error) throw out.error;
    return out.data;
  }

  async function signOut(){
    var client = getClient();
    if (!client) return;
    var out = await client.auth.signOut();
    if (out.error) throw out.error;
  }

  function onAuthChange(handler){
    var client = getClient();
    if (!client) return { data: { subscription: { unsubscribe: function(){} } } };
    return client.auth.onAuthStateChange(function(evt, session){
      handler(evt, session && session.user ? session.user : null, session);
    });
  }

  async function listRcca(){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) return [];
    var q = await client
      .from("traceops_rcca_cases")
      .select("rcca_id,payload,updated_at")
      .eq("user_id", user.id)
      .order("updated_at", { ascending: false });
    if (q.error) throw q.error;
    return (q.data || []).map(function(row){
      var payload = row.payload || {};
      payload.rcca_id = payload.rcca_id || row.rcca_id;
      payload._cloud_updated_at = row.updated_at || null;
      return payload;
    });
  }

  async function upsertRcca(rcca){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) throw new Error("Sesion no disponible.");
    var row = {
      user_id: user.id,
      rcca_id: rcca.rcca_id,
      payload: Object.assign({}, rcca, {
        updated_at: new Date().toISOString(),
        source: rcca.source || "manual"
      }),
      updated_at: new Date().toISOString()
    };
    var q = await client.from("traceops_rcca_cases").upsert(row, { onConflict: "user_id,rcca_id" }).select("updated_at").single();
    if (q.error) throw q.error;
    return q.data;
  }

  async function removeRcca(rccaId){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) throw new Error("Sesion no disponible.");
    var q = await client.from("traceops_rcca_cases").delete().eq("user_id", user.id).eq("rcca_id", rccaId);
    if (q.error) throw q.error;
  }

  return {
    cfg: cfg,
    isConfigured: isConfigured,
    getClient: getClient,
    getUser: getUser,
    signIn: signIn,
    signUp: signUp,
    signOut: signOut,
    onAuthChange: onAuthChange,
    listRcca: listRcca,
    upsertRcca: upsertRcca,
    removeRcca: removeRcca
  };
})();
</script>

<script>

function parseTurno(h, min, dateIso) {
  var m = parseInt(min) || 0;
  var dow = 1;
  if (dateIso) {
    var parts = dateIso.split("-");
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    dow = d.getDay();
  }
  if (dow === 6) {
    if (h >= 0 && h < 9) return "3T";
    if (h >= 9 && h < 18) return "1T-Sab";
    return "2T-Sab";
  }
  if (dow === 0) {
    if (h >= 6 && h < 18) return "1T-Dom";
    return "2T-Dom";
  }
  if (h >= 0 && h < 6) return "3T";
  if (h < 15 || (h === 15 && m < 15)) return "1T";
  return "2T";
}

function traceOpsNormalizeUnicodeFilenameLocal(name) {
  try {
    return String(name || '').normalize('NFC');
  } catch (_) {
    return String(name || '');
  }
}

function traceOpsNormalizeWhatsAppLineLocal(raw) {
  return String(raw || '')
    .replace(/[\u00a0\u200e\u200f\u202a-\u202f\u2066-\u2069]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function traceOpsIsWhatsAppSystemLineLocal(line) {
  var s = traceOpsNormalizeWhatsAppLineLocal(line);
  if (!s) return false;
  var bracketUser = /^\[\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?\s*(?:a\.?m\.?|p\.?m\.?)?\]\s*[^:]+?:\s*/i;
  var dashUser = /^\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?\s*(?:a\.?m\.?|p\.?m\.?)?\s*-\s*[^:]+?:\s*/i;
  if (bracketUser.test(s) || dashUser.test(s)) return false;
  var tsOnly = /^(?:\[)?\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?\s*(?:a\.?m\.?|p\.?m\.?)?(?:\])?\s*-\s*/i;
  return tsOnly.test(s);
}

function parseWhatsApp(txt) {
  var lines = txt.split(/\r?\n/);
  var msgs = [];
  var dateOrder = inferWhatsAppDateOrder(txt);
  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\s*-\s*([^:]+?):\s*(.*)$/i;
  var cur = null;
  for (var i = 0; i < lines.length; i++) {
    var line = traceOpsNormalizeWhatsAppLineLocal(lines[i]);
    var matchA = line.match(reA);
    var matchB = matchA ? null : line.match(reB);
    var m = matchA || matchB;
    if (m) {
      if (cur) msgs.push(cur);
      var d, mo, yr, h2, min, sec, mer, sender, text;
      if (matchA) {
        d = m[1]; mo = m[2]; yr = m[3]; h2 = m[4]; min = m[5]; sec = m[6] || '00'; mer = m[7] || ''; sender = m[8]; text = m[9];
      } else {
        d = m[1]; mo = m[2]; yr = m[3]; h2 = m[4]; min = m[5]; sec = m[6] || '00'; mer = m[7] || ''; sender = m[8]; text = m[9];
      }
      var resolved = resolveWhatsAppDatePartsLocal(d, mo, dateOrder);
      var year = parseInt(yr, 10);
      if (year < 100) year += 2000;
      var t = to24h(h2, min, sec, mer);
      var dateIso = year + '-' + String(resolved.month).padStart(2, '0') + '-' + String(resolved.day).padStart(2, '0');
      cur = {
        dateIso: dateIso,
        dateDisp: String(resolved.day).padStart(2, '0') + '/' + String(resolved.month).padStart(2, '0') + '/' + year,
        timeStr: t.timeStr,
        hour: t.hour,
        turno: parseTurno(t.hour, min, dateIso),
        sender: String(sender || '').replace(/^~/, '').trim(),
        text: String(text || '').trim()
      };
    } else if (traceOpsIsWhatsAppSystemLineLocal(line)) {
      continue;
    } else if (cur && line && !line.startsWith('[')) {
      cur.text += ' ' + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function getISOWeek(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getWeekRange(weekN, year) {
  var jan4 = new Date(Date.UTC(year, 0, 4));
  var day = jan4.getUTCDay() || 7;
  var monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - day + 1 + (weekN - 1) * 7);
  var sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  return {
    from: monday.toISOString().slice(0,10),
    to: sunday.toISOString().slice(0,10)
  };
}

function filterMsgs(msgs, mode, days, dateFrom, dateTo, weekNum, weekYear) {
  if (!msgs.length) return msgs;

  var sorted = msgs.slice().sort(function(a,b){
    var ad = String(a.dateIso || "");
    var bd = String(b.dateIso || "");
    if (ad === bd) return String(a.timeStr || "").localeCompare(String(b.timeStr || ""));
    return ad.localeCompare(bd);
  });

  if (mode === "range" && dateFrom && dateTo) {
    var f = dateFrom <= dateTo ? dateFrom : dateTo;
    var t = dateFrom <= dateTo ? dateTo : dateFrom;
    return sorted.filter(function(m){ return m.dateIso >= f && m.dateIso <= t; });
  }

  if (mode === "week" && weekNum && weekYear) {
    var wr = getWeekRange(parseInt(weekNum, 10), parseInt(weekYear, 10));
    return sorted.filter(function(m){ return m.dateIso >= wr.from && m.dateIso <= wr.to; });
  }

  var lastMsg = sorted[sorted.length - 1] || null;
  var refMs = 0;
  if (lastMsg && typeof timeToMinsLocal === "function") {
    refMs = timeToMinsLocal(lastMsg.dateIso, lastMsg.timeStr || "00:00");
  }
  if (!refMs && lastMsg && lastMsg.dateIso) {
    var fallbackRef = new Date(lastMsg.dateIso + "T23:59:59");
    refMs = isNaN(fallbackRef.getTime()) ? 0 : fallbackRef.getTime();
  }

  var refDate = refMs ? new Date(refMs) : new Date();
  var cutoff = new Date(refDate.getFullYear(), refDate.getMonth(), refDate.getDate());
  cutoff.setDate(cutoff.getDate() - Math.max(1, parseInt(days, 10) || 1) + 1);

  var cutoffStart = new Date(cutoff.getFullYear(), cutoff.getMonth(), cutoff.getDate(), 0, 0, 0, 0).getTime();
  var refEnd = new Date(refDate.getFullYear(), refDate.getMonth(), refDate.getDate(), 23, 59, 59, 999).getTime();

  return sorted.filter(function(m){
    var ms = 0;
    if (typeof timeToMinsLocal === "function") {
      ms = timeToMinsLocal(m.dateIso, m.timeStr || "00:00");
    }
    if (!ms && m.dateIso) {
      var d = new Date(m.dateIso + "T00:00:00");
      ms = isNaN(d.getTime()) ? 0 : d.getTime();
    }
    return ms >= cutoffStart && ms <= refEnd;
  });
}

function traceOpsFilterMediaNamesBySelectedRange(mediaNames, imgMeta, filteredMsgs) {
  var out = { names: [], outsideRangeCount: 0, unknownDateCount: 0 };
  var names = mediaNames || [];
  if (!names.length) return out;
  if (!filteredMsgs || !filteredMsgs.length) {
    out.outsideRangeCount = names.length;
    return out;
  }
  var allowedDates = {};
  filteredMsgs.forEach(function(m) {
    if (m && m.dateIso) allowedDates[m.dateIso] = true;
  });
  names.forEach(function(fname) {
    var meta = (imgMeta && imgMeta[fname]) || null;
    var dateIso = meta && meta.dateIso ? meta.dateIso : "";
    if (!dateIso) {

function cleanMsgs(msgs) {

  var noise = /^(buenos d|buenas t|buen d|gracias|de nada|enterado|recibido|entendido|ok|thanks|got it|understood|roger)$/i;
  return msgs.filter(function(m){
    return m.text && m.text.trim().length > 8 && !m.text.match(skip) && !m.text.trim().match(noise);

function inferWhatsAppDateOrder(txt) {
  var lines = String(txt || '').split(/\r?\n/);
  var re = /^(?:\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)|(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\s*-\s*([^:]+?):\s*(.*))$/i;
  var dmyScore = 0;
  var mdyScore = 0;
  var inspected = 0;
  for (var i = 0; i < lines.length && inspected < 80; i++) {
    var line = traceOpsNormalizeWhatsAppLineLocal(lines[i]);
    var m = line.match(re);
    if (!m) continue;
    inspected += 1;
    var a = parseInt(m[1] || m[9] || 0, 10) || 0;
    var b = parseInt(m[2] || m[10] || 0, 10) || 0;
    var mer = String(m[7] || m[15] || '').toLowerCase();
    if (a > 12 && b <= 12) dmyScore += 3;
    else if (b > 12 && a <= 12) mdyScore += 3;
    else if (mer) mdyScore += 1;
  }
  return mdyScore > dmyScore ? 'MDY' : 'DMY';
}

function resolveWhatsAppDatePartsLocal(a, b, order) {
  var p1 = parseInt(a, 10) || 0;
  var p2 = parseInt(b, 10) || 0;
  if (p1 > 12 && p2 <= 12) return { day: p1, month: p2 };
  if (p2 > 12 && p1 <= 12) return { day: p2, month: p1 };
  if (String(order || 'DMY').toUpperCase() === 'MDY') return { day: p2, month: p1 };
  return { day: p1, month: p2 };
}

function decodeQuotedPrintable(str) {
  if (!str) return '';
  return String(str)
    .replace(/=\r?\n/g, '')
    .replace(/=([0-9A-Fa-f]{2})/g, function(_, hex) {
      try { return String.fromCharCode(parseInt(hex, 16)); } catch(_) { return _; }
    });
}

function decodeMimeWords(str) {
  if (!str) return '';
  return String(str).replace(/=\?([^?]+)\?([BQbq])\?([^?]+)\?=/g, function(_, charset, enc, text) {
    try {
      if (String(enc).toUpperCase() === 'B') {
        return decodeURIComponent(escape(atob(String(text).replace(/\s/g, ''))));
      }
      var qp = String(text).replace(/_/g, ' ');
      return decodeQuotedPrintable(qp);
    } catch(_) {
      return text;
    }
  });
}

function decodeHtmlEntities(str) {
  if (!str) return '';
  try {
    var ta = document.createElement('textarea');
    ta.innerHTML = str;
    return ta.value;
  } catch(_) {
    return str
      .replace(/&nbsp;/gi, ' ')
      .replace(/&amp;/gi, '&')
      .replace(/&lt;/gi, '<')
      .replace(/&gt;/gi, '>')
      .replace(/&quot;/gi, '"')
      .replace(/&#39;/gi, "'");
  }
}

function stripHtmlToText(str) {
  if (!str) return '';
  var s = String(str)
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<head[\s\S]*?<\/head>/gi, ' ')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<\/div>/gi, '\n')
    .replace(/<\/li>/gi, '\n')
    .replace(/<li[^>]*>/gi, '• ')
    .replace(/<[^>]+>/g, ' ');
  return decodeHtmlEntities(s);
}

function decodeEmlEncoding(str, encoding) {
  if (!str) return '';
  var enc = (encoding || '').toLowerCase().trim();
  if (enc === 'base64') {
    try { return decodeURIComponent(escape(atob(String(str).replace(/\s/g, '')))); } catch(_) { return str; }
  }
  if (enc === 'quoted-printable') return decodeQuotedPrintable(str);
  return str;
}

function normalizeEmailSubjectLocal(subject) {
  var s = decodeMimeWords(subject || '');
  s = String(s)
    .replace(/\[[^\]]+\]\s*/g, function(m){ return /^\[(re|fw|fwd):/i.test(m) ? m : ' '; })
    .replace(/^(\s*(re|fw|fwd)\s*[:\-]\s*)+/i, '')
    .replace(/\.(xlsx|xlsm|xls|csv|pdf|pptx|ppt|docx|doc)\b/gi, ' ')
    .replace(/[\/_]+/g, ' ')
    .replace(/[|]+/g, ' | ')
    .replace(/\s{2,}/g, ' ')

  return s || 'sin-asunto';
}

function canonicalEmailMessageIdLocal(raw) {

}

function extractEmailThreadKeyLocal(headers) {

  var irt = String(headers['in-reply-to'] || '').trim();

  }
  allRefs = allRefs.concat(pullIds(refs));
  allRefs = allRefs.concat(pullIds(irt));
  if (allRefs.length) return canonicalEmailMessageIdLocal(allRefs[0]);
  if (mid) return canonicalEmailMessageIdLocal(mid);
  return 'subject:' + normalizeEmailSubjectLocal(headers['subject'] || '');
}

function parseEmlHeaders(lines) {
  var headers = {};
  var i = 0;
  while (i < lines.length) {
    if (!lines[i] || lines[i].trim() === '') { i++; break; }
    var m = lines[i].match(/^([\w\-]+):\s*(.*)/);
    if (m) {
      var key = m[1].toLowerCase();
      var val = m[2];
      while (i + 1 < lines.length && /^[ \t]/.test(lines[i + 1])) {
        i++;
        val += ' ' + lines[i].trim();
      }
      headers[key] = decodeMimeWords(val);
    }
    i++;
  }
  return { headers: headers, bodyStart: i };
}

function cleanEmailTextLocal(text) {
  if (!text) return '';
  var s = String(text);
  s = s.replace(/\r/g, '\n');
  s = s.replace(/\u00a0/g, ' ').replace(/[\u200B-\u200F\u202A-\u202E]/g, '');
  s = stripHtmlToText(s);
  s = decodeHtmlEntities(s);
  s = s.replace(/^\s*(mime-version|content-type|content-transfer-encoding|content-disposition|x-[\w\-]+):.*$/gim, ' ');
  s = s.replace(/^--[\w=:\-\.\/\+]+\s*$/gim, ' ');
  s = s.replace(/\[(cid|image):[^\]]+\]/gi, ' ');
  var cutPatterns = [
    /\n\s*-----Original Message-----[\s\S]*$/i,
    /\n\s*From:\s.*\n\s*Sent:\s.*\n\s*To:\s.*[\s\S]*$/i,
    /\n\s*De:\s.*\n\s*Enviado el:\s.*\n\s*Para:\s.*[\s\S]*$/i,
    /\n\s*On .*wrote:[\s\S]*$/i,
    /\n\s*El .*escribi[oó]:[\s\S]*$/i,
    /\n\s*________________________________[\s\S]*$/i

  for (var i = 0; i < cutPatterns.length; i++) {
    if (cutPatterns[i].test(s)) {
      s = s.replace(cutPatterns[i], ' ');
      break;
    }
  }
  s = s.replace(/\n\s*>.*$/gm, ' ');
  s = s.replace(/https?:\/\/\S+/gi, ' ');
  s = s.replace(/\b(?:AVISO DE CONFIDENCIALIDAD|CONFIDENTIALITY NOTICE|DISCLAIMER|Microsoft Teams meeting|Join the meeting|Start Free Trial|Book a Demo)\b[\s\S]*$/i, ' ');
  s = s.replace(/\n{2,}/g, '\n');
  s = s.replace(/[ \t]+/g, ' ');
  s = s.replace(/\s*\n\s*/g, '\n');
  var lines = s.split(/\n+/).map(function(line){ return line.trim(); }).filter(function(line){
    if (!line) return false;
    if (/^(from|to|cc|bcc|subject|sent|date|de|para|asunto|enviado):\s*$/i.test(line)) return false;
    if (/^(--|__)+$/.test(line)) return false;
    return true;
  });
  s = lines.join('\n').trim();
  s = s.replace(/\n/g, ' ');
  s = s.replace(/\s{2,}/g, ' ').trim();
  return s;
}

function extractEmlBodyText(lines, bodyStart, contentType, encoding) {
  var rawBody = lines.slice(bodyStart).join('\n');
  var ct = (contentType || '').toLowerCase();
  var boundaryM = ct.match(/boundary="?([^";]+)"?/i);
  if (boundaryM) {
    var boundary = boundaryM[1].trim();
    var safeBoundary = boundary.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('--' + safeBoundary);
    var parts = rawBody.split(re);
    var bestText = '';
    var bestHtml = '';
    for (var pi = 0; pi < parts.length; pi++) {
      var part = parts[pi];
      if (!part || /^\s*--\s*$/.test(part)) continue;
      var partLines = part.replace(/^\s+/, '').split(/\r?\n/);
      var partInfo = parseEmlHeaders(partLines);
      var partCt = (partInfo.headers['content-type'] || '').toLowerCase();
      var partEnc = (partInfo.headers['content-transfer-encoding'] || '').toLowerCase().trim();
      var payload = decodeEmlEncoding(partLines.slice(partInfo.bodyStart).join('\n').trim(), partEnc);
      if (partCt.indexOf('multipart/') >= 0) {
        var nested = extractEmlBodyText(partLines, partInfo.bodyStart, partCt, partEnc);
        if (nested && !bestText) bestText = nested;
        continue;
      }
      if (partCt.indexOf('text/plain') >= 0) {
        var cleanPlain = cleanEmailTextLocal(payload);
        if (cleanPlain && cleanPlain.length > bestText.length) bestText = cleanPlain;
      } else if (partCt.indexOf('text/html') >= 0) {
        var cleanHtml = cleanEmailTextLocal(payload);
        if (cleanHtml && cleanHtml.length > bestHtml.length) bestHtml = cleanHtml;
      }
    }
    if (bestText) return bestText;
    if (bestHtml) return bestHtml;
  }
  var decoded = decodeEmlEncoding(rawBody.trim(), encoding);
  return cleanEmailTextLocal(decoded);
}

function parseEmlToMsg(rawText, sourceName) {
  if (!rawText || !rawText.trim()) return null;
  var lines = String(rawText).split(/\r?\n/);
  var info = parseEmlHeaders(lines);
  var h = info.headers;

  var dateObj = null;
  try { dateObj = h['date'] ? new Date(h['date']) : null; } catch(_) {}
  if (!dateObj || isNaN(dateObj.getTime())) dateObj = new Date();

  var year = dateObj.getFullYear();
  var month = dateObj.getMonth() + 1;
  var day = dateObj.getDate();
  var hour = dateObj.getHours();
  var min = dateObj.getMinutes();
  var dateIso = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  var timeStr = String(hour).padStart(2,'0') + ':' + String(min).padStart(2,'0');

  var fromRaw = decodeMimeWords(h['from'] || 'email@desconocido');
  var addrM = fromRaw.match(/<([^>]+)>/);
  var addr = addrM ? addrM[1] : fromRaw.replace(/"/g,'').trim();
  var displayM = fromRaw.match(/^"?([^"<]+)"?\s*</);
  var sender = displayM ? displayM[1].trim() : addr;
  sender = sender.replace(/^~/, '').trim();

  var rawSubject = decodeMimeWords(h['subject'] || '');
  var subject = cleanEmailTextLocal(rawSubject);
  var normalizedSubject = normalizeEmailSubjectLocal(rawSubject);
  var threadKey = extractEmailThreadKeyLocal(h);
  var body = extractEmlBodyText(lines, info.bodyStart, h['content-type'] || '', h['content-transfer-encoding'] || '');
  var text = ((subject ? '[' + subject + '] ' : '') + body).replace(/\s+/g, ' ').trim();
  if (!text || text.trim().length < 12) return null;
  if (text.length > 8000) text = text.slice(0, 8000) + '...';

  return {
    dateIso: dateIso,
    dateDisp: String(day).padStart(2,'0') + '/' + String(month).padStart(2,'0') + '/' + year,
    timeStr: timeStr,
    hour: hour,
    turno: parseTurno(hour, min, dateIso),
    sender: sender,
    text: text,
    source: 'email',
    subject: subject,
    subjectNormalized: normalizedSubject,
    threadKey: threadKey,
    sourceFile: sourceName || '',
    messageId: String(h['message-id'] || '').trim(),
    inReplyTo: String(h['in-reply-to'] || '').trim(),

}

function parseMboxToMsgs(rawText) {
  if (!rawText) return [];
  var chunks = String(rawText).split(/^From [^\r\n]*$/m);
  var results = [];
  chunks.forEach(function(chunk) {
    var msg = parseEmlToMsg(String(chunk || '').trim());
    if (msg) results.push(msg);

function traceOpsIsStickerMediaLocal(baseName) {

var _zipRef = null;
var _imgCache = {};

async function readZip(file) {
  await window.ensureZipTools();

  var zip = await JSZip.loadAsync(file);
  _zipRef = zip;
  _imgCache = {};
  var names = Object.keys(zip.files);
  var txt = null;
  var imgNames = [];
  var filteredMediaNames = [];
  var imgMeta = {};
  var emlMsgs = [];

  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    if (name.startsWith("__MACOSX")) continue;
    var base = traceOpsNormalizeUnicodeFilenameLocal(name.split("/").pop());
    if (!base) continue;

    if (!txt && /\.txt$/i.test(base) && !base.toLowerCase().endsWith(".eml")) {
      txt = await zip.files[name].async("string");
    }

    if (/\.(jpe?g|png|webp)$/i.test(base)) {
      if (traceOpsIsStickerMediaLocal(base)) {
        filteredMediaNames.push(base);
      } else {
        imgNames.push(base);
      }
    }

    if (base.toLowerCase().endsWith(".eml")) {
      try {
        var emlRaw = await zip.files[name].async("string");
        var msg = parseEmlToMsg(emlRaw, base);
        if (msg) emlMsgs.push(msg);
      } catch (_) {}
    }

    if (base.toLowerCase().endsWith(".mbox")) {
      try {
        var mboxRaw = await zip.files[name].async("string");
        var mboxMsgs = parseMboxToMsgs(mboxRaw);
        emlMsgs = emlMsgs.concat(mboxMsgs);
      } catch (_) {}
    }
  }

  if (txt) {
    var dateOrder = inferWhatsAppDateOrder(txt);
    var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
    var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\s*-\s*([^:]+?):\s*(.*)$/i;
    var lastMeta = null;
    var lastTextAny = '';
    var lastTextBySender = {};
    txt.split(/\r?\n/).forEach(function(rawLine) {
      var line = traceOpsNormalizeWhatsAppLineLocal(rawLine);
      var matchA = line.match(reA);
      var matchB = matchA ? null : line.match(reB);
      var m = matchA || matchB;
      if (m) {
        var d = m[1], mo = m[2], yr = m[3], h2 = m[4], min2 = m[5], sec2 = m[6] || '00', mer = m[7] || '';
        var sender = m[8];
        var text = m[9];
        var resolved = resolveWhatsAppDatePartsLocal(d, mo, dateOrder);
        var year = parseInt(yr, 10);
        if (year < 100) year += 2000;
        var t = to24h(h2, min2, sec2, mer);
        var senderNorm = String(sender || '').replace(/^~/, '').trim();
        lastMeta = {
          dateIso: year + '-' + String(resolved.month).padStart(2, '0') + '-' + String(resolved.day).padStart(2, '0'),
          timeStr: t.timeStr,
          sender: senderNorm
        };
        if (text && !/(?:<(?:adjunto|attached):|<media omitted>|<imagen omitida>|<video omitted>|<sticker omitted>|<audio omitted>)/i.test(text)) {
          lastTextAny = String(text || '').replace(/\s+/g, ' ').trim();
          if (senderNorm) lastTextBySender[senderNorm] = lastTextAny;
        }
      } else if (traceOpsIsWhatsAppSystemLineLocal(line)) {
        return;
      } else if (lastMeta && line && !line.startsWith('[')) {
        var prev = lastTextBySender[lastMeta.sender] || lastTextAny || '';
        var merged = (prev + ' ' + line).replace(/\s+/g, ' ').trim();
        lastTextAny = merged;
        if (lastMeta.sender) lastTextBySender[lastMeta.sender] = merged;
      }
      var adj = line.match(/<(?:adjunto|attached):\s*([^>]+\.(?:jpe?g|png|webp))\s*>/i);
      if (adj && lastMeta) {
        var adjName = traceOpsNormalizeUnicodeFilenameLocal(adj[1].trim());
        imgMeta[adjName] = {
          dateIso: lastMeta.dateIso,
          timeStr: lastMeta.timeStr,
          sender: lastMeta.sender,
          contextText: (lastTextBySender[lastMeta.sender] || lastTextAny || '').slice(0, 320)
        };
      }
    });
  }

  var hasWA = !!(txt && txt.trim().length > 0);
  var hasEml = emlMsgs.length > 0;

  if (!hasWA && !hasEml) {
    throw new Error("No se encontro .txt de WhatsApp ni archivos .eml/.mbox en el ZIP");
  }

  return {
    txt: txt || "",
    imgNames: imgNames,
    filteredMediaNames: filteredMediaNames,
    imgMeta: imgMeta,
    emlMsgs: emlMsgs || [],
    hasWA: hasWA,
    hasEml: hasEml
  };
}

async function loadImg(fname) {
  if (_imgCache[fname]) return _imgCache[fname];
  if (!_zipRef) return null;
  var allNames = Object.keys(_zipRef.files);
  var targetName = traceOpsNormalizeUnicodeFilenameLocal(fname);
  var match = allNames.find(function(n){ return traceOpsNormalizeUnicodeFilenameLocal(n.split("/").pop()) === targetName; });
  if (!match) return null;
  try {
    var b64 = await _zipRef.files[match].async("base64");
    var ext = fname.split(".").pop().toLowerCase().replace("jpg","jpeg");
    var url = "data:image/"+ext+";base64,"+b64;
    _imgCache[fname] = url;
    return url;
  } catch(_) { return null; }
}

async function analyzeWithAI(msgs, apiKey) {

function traceOpsOpenDb(){
  return new Promise(function(resolve,reject){
    try{
      if(!window.indexedDB){ reject(new Error("IndexedDB no disponible")); return; }
      var req = window.indexedDB.open("traceops_local_db", 1);
      req.onupgradeneeded = function(ev){
        var db = ev.target.result;
        if(!db.objectStoreNames.contains("kv")) db.createObjectStore("kv");
      };
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error || new Error("No se pudo abrir IndexedDB")); };
    }catch(err){ reject(err); }
  });
}

async function traceOpsDbGet(key){
  var db = await traceOpsOpenDb();
  return new Promise(function(resolve,reject){
    try{
      var tx = db.transaction("kv","readonly");
      var store = tx.objectStore("kv");
      var req = store.get(key);
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error || new Error("No se pudo leer IndexedDB")); };
      tx.oncomplete = function(){ try{ db.close(); }catch(_){} };
      tx.onerror = function(){ reject(tx.error || new Error("Transaccion IndexedDB fallida")); };
    }catch(err){ try{ db.close(); }catch(_){} reject(err); }
  });
}

async function traceOpsDbSet(key,value){
  var db = await traceOpsOpenDb();
  return new Promise(function(resolve,reject){
    try{
      var tx = db.transaction("kv","readwrite");
      var store = tx.objectStore("kv");
      store.put(value,key);
      tx.oncomplete = function(){ try{ db.close(); }catch(_){} resolve(true); };
      tx.onerror = function(){ try{ db.close(); }catch(_){} reject(tx.error || new Error("No se pudo guardar en IndexedDB")); };
    }catch(err){ try{ db.close(); }catch(_){} reject(err); }
  });
}

function traceOpsGetMaxOutputTokens(requestedDays, cleanCount){
  if (traceOpsIsAdminOverride()) return traceOpsAdminTokenCeiling();
  var d = Math.max(1, parseInt(requestedDays, 10) || 1);
  var c = Math.max(0, parseInt(cleanCount, 10) || 0);
  var t = 1800;
  if (d <= 1) t = 1800;
  else if (d <= 3) t = 2800;
  else if (d <= 5) t = 3400;
  else if (d <= 7) t = 4200;
  else t = 5200;
  if (c > 220) t += 400;
  if (c > 320) t += 400;
  return Math.min(6000, t);
}

function traceOpsGetWindowDays(filterMode, days, dateFrom, dateTo, weekNum, weekYear){
  if (filterMode === "quick") return Math.max(1, parseInt(days, 10) || 3);
  if (filterMode === "week") return 7;
  if (filterMode === "range" && dateFrom && dateTo) {
    var ms = Math.abs(new Date(dateTo) - new Date(dateFrom));
    return Math.max(1, Math.round(ms / 86400000) + 1);
  }
  return 0;
}

function traceOpsBuildRangeLabel(filterMode, days, dateFrom, dateTo, weekNum, weekYear){
  if (filterMode === "quick") return "Ultimos " + Math.max(1, parseInt(days, 10) || 3) + " dias";
  if (filterMode === "week") return "Semana " + (weekNum || "") + " / " + (weekYear || "");
  if (filterMode === "range") return (dateFrom || "?") + " -> " + (dateTo || "?");
  return "sin-rango";
}

async function traceOpsHashFile(file){
  // iOS Safari can crash if we read the whole ZIP twice (arrayBuffer for hash + unzip).
  // Use a lightweight signature instead of a full SHA-256 to keep memory stable.
  return [file && file.name || "file", file && file.size || 0, file && file.lastModified || 0].join("|");
}

function traceOpsBuildAnalysisCacheKey(fileHash, filterMode, days, dateFrom, dateTo, weekNum, weekYear){

    fileHash || "nofile",

    "d=" + (days || ""),
    "f=" + (dateFrom || ""),

table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;border-bottom:1px solid #EAF1ED;font-size:11px;text-align:left;vertical-align:top}th{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:#FBFDFC}

  }

  function traceOpsPptSanitizeText(v, limit){
    var s = String(v == null ? "" : v);
    s = s
      .replace(/\r/g, "")
      .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, "")
      .replace(/[\u200B\u200C\u200D\u200E\u200F\u202A\u202B\u202C\u202D\u202E\u202F\uFEFF]/g, "")
      .replace(/[\u2018\u2019]/g, "'")
      .replace(/[\u201C\u201D]/g, "\"")
      .replace(/[\u2013\u2014]/g, "-")
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<[^>]+>/g, " ")
      .replace(/&nbsp;/gi, " ")
      .replace(/&amp;/gi, "&")
      .replace(/&lt;/gi, "<")
      .replace(/&gt;/gi, ">")
      .replace(/\t/g, " ")
      .replace(/\n{3,}/g, "\n\n")
      .replace(/[ ]{2,}/g, " ")
      .trim();
    if (limit && s.length > limit) s = s.slice(0, Math.max(0, limit - 3)).trim() + "...";
    return s;
  }

  function traceOpsPptSafe(v, limit){
    return traceOpsPptSanitizeText(v, limit || 0);
  }

  function traceOpsPptSafeCell(v, limit){
    var clean = traceOpsPptSanitizeText(v, limit || 180);
    return clean.replace(/\n+/g, " ").trim();
  }

  function traceOpsPptSafeTable(rows){
    if (!Array.isArray(rows)) return [];
    return rows.map(function(row){
      if (!Array.isArray(row)) row = [row];
      return row.map(function(cell){
        if (cell && typeof cell === "object" && cell.text != null) {
          return {
            text: traceOpsPptSafeCell(cell.text, 220),
            options: cell.options || {}
          };
        }
        return traceOpsPptSafeCell(cell, 220);
      });
    });
  }

  function traceOpsPptWrap(v, limit){
    var txt = traceOpsPptSafe(v, limit || 0);
    if (!txt) return "Pending";
    var clean = txt.replace(/\n{3,}/g,"\n\n");
    if (limit && clean.length > limit) return clean.slice(0, Math.max(0, limit - 3)).trim() + "...";
    return clean;
  }
  function traceOpsGetEightdLinkedEventsForExport(draft){
    var ids = (draft && (draft.linked_event_ids || draft.event_ids)) || [];
    if (typeof traceOpsCollectLinkedEventsByIds !== "function") return [];
    var list = traceOpsCollectLinkedEventsByIds(ids);
    return list.slice().sort(function(a,b){
      return (traceOpsGetDateValue(a && a.fecha) || 0) - (traceOpsGetDateValue(b && b.fecha) || 0);
    });
  }

  function traceOpsPptAddBlock(slide, title, body, x, y, w, h, fill){
    var safeTitle = traceOpsPptSafe(title, 120);
    var safeBody = traceOpsPptWrap(body, 460);
    if (safeTitle) slide.addText(safeTitle, {x:x, y:y, w:w, h:0.22, fontFace:"Arial", fontSize:10, bold:true, color:"5F766C", breakLine:false, margin:0, fit:'shrink'});
    slide.addShape("roundRect", {x:x, y:y+0.22, w:w, h:h-0.22, rectRadius:0.08, line:{color:"DCE9E2", pt:1}, fill:{color:fill || "FFFFFF"}});
    if (safeBody) slide.addText(safeBody, {x:x+0.08, y:y+0.32, w:w-0.16, h:h-0.36, fontFace:"Arial", fontSize:11, color:"10231C", valign:"top", margin:0.02, fit:'shrink'});
  }

  function traceOpsPptEventRows(draft){
    var linked = traceOpsGetEightdLinkedEventsForExport(draft);
    if (!linked.length) {
      return [["SMT Print","N/D","Pending","No linked evidence","TraceOps","Starting condition"]];
    }
    return linked.slice(0,10).map(function(item){
      return [
        traceOpsPptSafe(item.tipo_evento || item.area || item.linea_estacion || "Event"),
        traceOpsPptSafe([item.fecha || "", item.hora || ""].join(" ").trim() || "N/D"),
        traceOpsPptSafe(item.resultado || item.status || item.impacto || "Observed"),
        traceOpsPptWrap(item.defecto_smt || item.accion_requerida || item.accion_ejecutada || item.texto || "Pending", 120),
        traceOpsPptSafe(item.area || item.sender || "TraceOps"),
        traceOpsPptWrap(item.impacto || item.accion_requerida || "Supports the trace path", 90)
      ];
    });
  }

  function traceOpsPptSplitBullets(value, maxItems, maxLen){
    var txt = traceOpsPptWrap(value, maxLen || 900);
    if (!txt) return ['Pending'];
    var parts = String(txt)
      .replace(/\r/g, '\n')
      .replace(/([.!?;])\s+/g, '$1\n')
      .replace(/\s*•\s+/g, '\n')
      .replace(/\s+-\s+/g, '\n')
      .split(/\n+/)
      .map(function(item){ return traceOpsPptSafe(item, 180).trim(); })
      .filter(function(item){ return item && item.length > 3; });
    if (!parts.length) parts = [traceOpsPptSafe(txt, 180)];
    return parts.slice(0, maxItems || 6);
  }

  function traceOpsPptDrawBulletList(slide, bullets, x, y, w, h, opts){
    var items = Array.isArray(bullets) && bullets.length ? bullets : ['Pending'];
    var fontSize = (opts && opts.fontSize) || 11;
    var lineGap = (opts && opts.lineGap) || 0.34;
    var maxItems = (opts && opts.maxItems) || items.length;
    for (var i = 0; i < Math.min(items.length, maxItems); i++) {
      var yy = y + (i * lineGap);
      if (yy > y + h - 0.24) break;
      slide.addShape('ellipse', {x:x, y:yy + 0.07, w:0.08, h:0.08, line:{color:'1E7B58', pt:0}, fill:{color:'1E7B58'}});
      slide.addText(traceOpsPptWrap(items[i], 170), {x:x+0.14, y:yy, w:w-0.16, h:0.22, fontFace:'Arial', fontSize:fontSize, color:'10231C', margin:0, fit:'shrink'});
    }
  }

  function traceOpsPptDeckSteps(){
    return ['Overview','D1-D2','D3','D4A','D4B','D5','D6','D7-D8','Appendix'];
  }

  function traceOpsPptApplyShell(slide, title, subtitle, activeIdx, badgeText){
    slide.background = { color: 'F2F5F2' };
    slide.addShape('rect', {x:0, y:0, w:13.333, h:1.02, line:{color:'10231C', pt:0}, fill:{color:'10231C'}});
    slide.addText(traceOpsPptSafe('FOXCONN | TraceOps 8D Draft', 80), {x:0.42, y:0.22, w:3.2, h:0.16, fontFace:'Arial', fontSize:10, bold:true, color:'A8D6C4', margin:0});
    slide.addText(traceOpsPptSafe(title, 110), {x:0.42, y:0.42, w:7.9, h:0.24, fontFace:'Arial', fontSize:22, bold:true, color:'FFFFFF', margin:0});
    slide.addText(traceOpsPptSafe(subtitle || 'TraceOps structured 8D deck export', 180), {x:0.42, y:0.72, w:8.8, h:0.14, fontFace:'Arial', fontSize:10.4, color:'D6E3DD', margin:0});
    if (badgeText) {
      slide.addShape('roundRect', {x:11.26, y:0.28, w:1.62, h:0.34, rectRadius:0.08, line:{color:'3D5C50', pt:1}, fill:{color:'173328'}});
      slide.addText(traceOpsPptSafe(badgeText, 40), {x:11.38, y:0.37, w:1.36, h:0.12, fontFace:'Arial', fontSize:9.2, bold:true, color:'D7E7E0', align:'center', margin:0});
    }
    var steps = traceOpsPptDeckSteps();
    var totalW = 12.46;
    var gap = 0.08;
    var itemW = (totalW - (gap * (steps.length - 1))) / steps.length;
    for (var i = 0; i < steps.length; i++) {
      var x = 0.42 + (i * (itemW + gap));
      var active = i === activeIdx;
      slide.addShape('roundRect', {x:x, y:1.10, w:itemW, h:0.30, rectRadius:0.06, line:{color:active ? '1E7B58' : 'D7E6DE', pt:1}, fill:{color:active ? 'EAF5F0' : 'FFFFFF'}});
      slide.addText(traceOpsPptSafe(steps[i], 24), {x:x+0.03, y:1.19, w:itemW-0.06, h:0.10, fontFace:'Arial', fontSize:8.8, bold:true, color:active ? '1E7B58' : '5F766C', align:'center', margin:0, fit:'shrink'});
    }
  }

  function traceOpsPptPanelTitle(slide, title, x, y, w){
    slide.addText(traceOpsPptSafe(title, 80), {x:x, y:y, w:w, h:0.18, fontFace:'Arial', fontSize:10.5, bold:true, color:'5F766C', margin:0, fit:'shrink'});
  }

  function traceOpsPptBox(slide, x, y, w, h, fill, lineColor){
    slide.addShape('roundRect', {x:x, y:y, w:w, h:h, rectRadius:0.06, line:{color:lineColor || 'DCE9E2', pt:1}, fill:{color:fill || 'FFFFFF'}});
  }

  function traceOpsPptMiniNote(slide, text, x, y, w){
    if (!text) return;
    slide.addText(traceOpsPptWrap(text, 180), {x:x, y:y, w:w, h:0.16, fontFace:'Arial', fontSize:9.0, color:'5F766C', italic:true, margin:0, fit:'shrink'});
  }

  function traceOpsPptDrawFlowSteps(slide, steps, x, y, w, h){
    var list = Array.isArray(steps) && steps.length ? steps.slice(0,4) : ['Contain lot','Inspect targeted positions','Shield customer','Confirm release gate'];
    var rowH = h / list.length;
    for (var i = 0; i < list.length; i++) {
      var yy = y + (i * rowH);
      slide.addShape('roundRect', {x:x + 0.06, y:yy + 0.04, w:w - 0.42, h:rowH - 0.08, rectRadius:0.05, line:{color:(i === list.length - 1 ? 'E4A24A' : 'DCE9E2'), pt:1}, fill:{color:(i === list.length - 1 ? 'FFF5E7' : (i % 2 ? 'F8FBF9' : 'FFFFFF'))}});
      slide.addShape('roundRect', {x:x + w - 0.30, y:yy + 0.10, w:0.18, h:rowH - 0.20, rectRadius:0.04, line:{color:(i === list.length - 1 ? 'E4A24A' : '2F5F9A'), pt:1}, fill:{color:(i === list.length - 1 ? 'E4A24A' : '2F5F9A')}});
      slide.addText(String(i + 1), {x:x + 0.14, y:yy + 0.10, w:0.24, h:0.14, fontFace:'Arial', fontSize:10.5, bold:true, color:'1E7B58', align:'center', margin:0});
      slide.addText(traceOpsPptWrap(list[i], 95), {x:x + 0.46, y:yy + 0.11, w:w - 0.92, h:rowH - 0.18, fontFace:'Arial', fontSize:10.0, color:'10231C', margin:0, fit:'shrink', valign:'mid'});
    }
  }

  function traceOpsPptDrawFishbone(slide, categories, x, y, w, h){
    var top = Array.isArray(categories) ? categories.slice(0, 3) : [];
    var bottom = Array.isArray(categories) ? categories.slice(3, 6) : [];
    while (top.length < 3) top.push({label:'Category', items:['Evidence pending']});
    while (bottom.length < 3) bottom.push({label:'Category', items:['Evidence pending']});

    var centerY = y + (h / 2);
    slide.addShape('line', {x:x + 0.56, y:centerY, w:w - 1.22, h:0, line:{color:'2F5F9A', pt:1.8}});
    slide.addShape('chevron', {x:x + w - 0.72, y:centerY - 0.22, w:0.52, h:0.44, line:{color:'E4A24A', pt:1}, fill:{color:'E4A24A'}});

    var ribs = [1.48, 3.16, 4.84];
    for (var i = 0; i < 3; i++) {
      var topItem = top[i] || {label:'Category', items:['Evidence pending']};
      var bottomItem = bottom[i] || {label:'Category', items:['Evidence pending']};
      var ax = x + ribs[i];

      slide.addShape('line', {x:ax, y:centerY, w:-0.68, h:-0.64, line:{color:'2F5F9A', pt:1.2}});
      slide.addShape('line', {x:ax, y:centerY, w:-0.68, h:0.64, line:{color:'2F5F9A', pt:1.2}});

      slide.addShape('roundRect', {x:ax - 1.14, y:y + 0.12, w:1.48, h:0.30, rectRadius:0.04, line:{color:'DCE9E2', pt:1}, fill:{color:'FFFFFF'}});
      slide.addText(traceOpsPptSafe(topItem.label, 26), {x:ax - 1.06, y:y + 0.20, w:1.30, h:0.10, fontFace:'Arial', fontSize:8.2, bold:true, color:'1E7B58', align:'center', margin:0, fit:'shrink'});
      slide.addText(traceOpsPptWrap(((topItem.items && topItem.items[0]) || 'Evidence pending'), 74), {x:ax - 1.12, y:y + 0.46, w:1.42, h:0.34, fontFace:'Arial', fontSize:7.8, color:'10231C', margin:0, fit:'shrink', align:'center'});

      slide.addShape('roundRect', {x:ax - 1.14, y:y + h - 0.42, w:1.48, h:0.30, rectRadius:0.04, line:{color:'DCE9E2', pt:1}, fill:{color:'F8FBF9'}});
      slide.addText(traceOpsPptSafe(bottomItem.label, 26), {x:ax - 1.06, y:y + h - 0.34, w:1.30, h:0.10, fontFace:'Arial', fontSize:8.2, bold:true, color:'1E7B58', align:'center', margin:0, fit:'shrink'});
      slide.addText(traceOpsPptWrap(((bottomItem.items && bottomItem.items[0]) || 'Evidence pending'), 74), {x:ax - 1.12, y:y + h - 0.78, w:1.42, h:0.26, fontFace:'Arial', fontSize:7.8, color:'10231C', margin:0, fit:'shrink', align:'center'});
    }

    slide.addText('Probable\nCause', {x:x + w - 1.24, y:centerY - 0.30, w:0.54, h:0.40, fontFace:'Arial', fontSize:8.8, bold:true, color:'E4A24A', margin:0, align:'center', valign:'mid'});
  }

  function traceOpsPptDrawWhyCards(slide, whys, x, y, w, h, opts){
    var items = Array.isArray(whys) && whys.length ? whys : ['Under validation'];
    var gap = (opts && opts.gap) || 0.10;
    var topPad = (opts && opts.topPad) || 0.10;
    var maxItems = Math.min((opts && opts.maxItems) || items.length, items.length);
    var rowH = (h - topPad - (gap * (maxItems - 1))) / maxItems;
    for (var i = 0; i < maxItems; i++) {
      var yy = y + topPad + (i * (rowH + gap));
      slide.addShape('roundRect', {x:x, y:yy, w:w, h:rowH, rectRadius:0.05, line:{color:'DCE9E2', pt:1}, fill:{color:(i % 2 ? 'F8FBF9' : 'FFFFFF')}});
      slide.addShape('roundRect', {x:x + 0.08, y:yy + 0.07, w:0.52, h:rowH - 0.14, rectRadius:0.04, line:{color:'E6EFEA', pt:1}, fill:{color:'ECF5F1'}});
      slide.addText(String(i + 1), {x:x + 0.19, y:yy + (rowH/2) - 0.08, w:0.28, h:0.14, fontFace:'Arial', fontSize:10.0, bold:true, color:'1E7B58', align:'center', margin:0});
      slide.addText(traceOpsPptWrap(items[i], 110), {x:x + 0.72, y:yy + 0.06, w:w - 0.84, h:rowH - 0.12, fontFace:'Arial', fontSize:9.2, color:'10231C', margin:0, fit:'shrink', valign:'mid'});
    }
  }

  function traceOpsPptAddBadge(slide, label, x, y, tone){
    var fill = 'F6FBF8';
    var line = 'D7E6DE';
    var text = '1A5B45';
    if (tone === 'draft') { fill = 'FEF9E8'; line = 'F1DF9E'; text = '9A6A16'; }
    else if (tone === 'pending') { fill = 'FDF0EE'; line = 'F0C4BE'; text = 'C0392B'; }
    else if (tone === 'ok') { fill = 'EAF5F0'; line = 'B8DECE'; text = '1E7B58'; }
    slide.addShape('roundRect', {x:x, y:y, w:1.28, h:0.24, rectRadius:0.08, line:{color:line, pt:1}, fill:{color:fill}});
    slide.addText(traceOpsPptSafe(label, 28), {x:x+0.05, y:y+0.07, w:1.18, h:0.10, fontFace:'Arial', fontSize:8.5, bold:true, color:text, align:'center', margin:0, fit:'shrink'});
  }

  function traceOpsPptNormalizeWhys(source, fallbackLabel){
    var arr = [];
    if (Array.isArray(source)) arr = source.slice();
    else if (typeof source === 'string' && source.trim()) arr = traceOpsPptSplitBullets(source, 5, 900);
    arr = arr.map(function(item){ return traceOpsPptWrap(item, 118); }).filter(Boolean);
    while (arr.length < 5) {
      arr.push((arr.length === 4 ? 'Under validation' : ((fallbackLabel || 'Why') + ' ' + (arr.length + 1) + ' pending confirmation')));
    }
    return arr.slice(0,5);
  }

  function traceOpsPptBuildIshikawa(normalized, model){
    var raw = normalized && normalized.d4_ishikawa;
    var sourceText = [
      normalized && normalized.d4_root_cause || '',
      normalized && normalized.d4_escape_point || '',
      normalized && normalized.d2_problem || '',
      normalized && normalized.evidence_summary || '',
      normalized && normalized.correlation_notes || '',
      model && model.pattern || '',
      model && model.rootCause || '',
      model && model.occurrenceSummary || '',
      model && model.findings && model.findings.length ? model.findings.slice(0, 4).join(' | ') : ''
    ].join(' ');

    var sourceBullets = traceOpsPptSplitBullets(sourceText, 18, 1800);
    var used = {};

    function norm(line){
      return String(line || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function pickItems(key){
      var items = [];
      if (raw && typeof raw === 'object' && Array.isArray(raw[key])) {
        items = raw[key].slice(0, 2);
      }
      if (!items.length) {
        items = sourceBullets.filter(function(line){
          var low = String(line || '').toLowerCase();
          if (key === 'machine') return /machine|equipment|printer|oven|fixture|feeder|tester|ict|aoi|5dx|x ray|x-ray|cleaning capability/.test(low);
          if (key === 'method') return /process|method|profile|stencil|print|inspection|procedure|control|bypass|cleaning|release/.test(low);
          if (key === 'material') return /solder|paste|flux|component|material|package|pad|pcb|geometry|supplier|residue/.test(low);
          if (key === 'man') return /operator|training|handling|setup|manual|discipline|released|wipe/.test(low);
          if (key === 'measurement') return /spi|measurement|detect|coverage|limit|threshold|verification|x ray|x-ray|aoi|ict|images/.test(low);
          if (key === 'environment') return /temperature|humidity|storage|contamination|environment/.test(low);
          return false;
        }).slice(0, 3);
      }
      items = items.map(function(item){ return traceOpsEightdShort(item, 88); }).filter(Boolean).filter(function(item){
        var k = norm(item);
        if (!k) return false;
        if (used[k]) return false;
        used[k] = true;
        return true;
      });
      if (!items.length) items = ['Evidence pending'];
      return items.slice(0, 1);
    }

    return [
      { label:'Machine', items:pickItems('machine') },
      { label:'Method', items:pickItems('method') },
      { label:'Material', items:pickItems('material') },
      { label:'Man', items:pickItems('man') },
      { label:'Measurement', items:pickItems('measurement') },
      { label:'Environment', items:pickItems('environment') }
    ];
  }

  function traceOpsPptBuildActionRows(normalized, model){
    var baseText = [
      normalized && normalized.d5_pca || '',

    var bullets = traceOpsPptSplitBullets(baseText, 10, 2200);
    bullets = traceOpsEightdUnique((bullets || []).map(function(item){

  function traceOpsEsc(v){
    return String(v==null?"":v)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  }
  function traceOpsSafeArray(v){
    return Array.isArray(v) ? v : (v ? [v] : []);
  }
  function traceOpsSeverityValue(item){
    var sev = Number(item && item.severidad != null ? item.severidad : 0);
    if (!isFinite(sev) || sev < 0) sev = 0;
    if (sev > 5) sev = 5;
    return sev;
  }
  function traceOpsStars(n){
    var safe = Math.max(0, Math.min(5, Number(n)||0));
    return "★★★★★".slice(0, safe) + "☆☆☆☆☆".slice(0, 5-safe);
  }
  function traceOpsBadge(status){
    var s = String(status||"NUEVO").toUpperCase();
    var style = {bg:"#F2F1EF", color:"#5D5751", border:"#DFDDD9"};
    if (s.indexOf("ANAL")>=0) style = {bg:"#EEF5FF", color:"#1E7B58", border:"#CFE7DB"};
    else if (s.indexOf("VALID")>=0) style = {bg:"#EAF7EF", color:"#1E7A4A", border:"#BFE7CC"};
    else if (s.indexOf("CERR")>=0 || s.indexOf("CLOSE")>=0) style = {bg:"#F2F3F5", color:"#596274", border:"#D7DDE6"};
    else if (s.indexOf("NUEVO")>=0 || s.indexOf("NEW")>=0) style = {bg:"#FFF8E8", color:"#A26A00", border:"#F1DF9E"};
    return style;
  }
  function traceOpsField(label, value){
    if (value==null || value==="") return "";
    return '<div class="to-field"><div class="to-label">'+traceOpsEsc(label)+'</div><div class="to-value">'+traceOpsEsc(value)+'</div></div>';
  }
  function traceOpsMetric(label, value, tone){
    var tones = {
      red: ["#FEF0EE","#F1C8C2","#C0392B"],
      amber: ["#FEF9E8","#F5E4A0","#B87820"],
      purple: ["#F5F0FE","#DBCDF8","#6B2DA8"],
      green: ["#EAF5F0","#B8DECE","#1E5C48"]
    };

    return '<div class="to-metric" style="background:'+t[0]+';border-color:'+t[1]+'"><div class="to-metric-label" style="color:'+t[2]+'">'+traceOpsEsc(label)+'</div><div class="to-metric-value">'+traceOpsEsc(value)+'</div></div>';
  }

    var evCount = traceOpsSafeArray(item.event_ids).length;

      +   '<div class="to-metrics">'
      +     traceOpsMetric('Sev', traceOpsStars(sev), 'red')
      +     traceOpsMetric('Rec', rec, 'amber')
      +     traceOpsMetric('Mad', mad, 'purple')
      +     traceOpsMetric('EV', String(evCount).padStart(2,'0'), 'green')

    var score = 0;

    var evModelo = (evItem.modelo||"").toLowerCase().trim();

    var evLinea = (evItem.linea_estacion||"").toLowerCase().trim();

    var rcProb = (rcca.problema||"").toLowerCase().trim();
    var evTipo = (evItem.tipo_evento||"").toLowerCase().trim();
    var evFindings = (evItem.engineer_findings||"").toLowerCase().trim();
    var rcCausa = (rcca.causa_raiz||"").toLowerCase().trim();
    var rcAccion = (rcca.accion_correctiva||"").toLowerCase().trim();
    if (evModelo && rcModelo && evModelo!=="n/d" && evModelo===rcModelo) score+=40;
    else if (evModelo && rcModelo && evModelo!=="n/d" && (rcModelo.indexOf(evModelo)>=0||evModelo.indexOf(rcModelo)>=0)) score+=20;
    if (evLinea && rcLinea && evLinea!=="n/d" && evLinea===rcLinea) score+=25;
    else if (evLinea && rcLinea && evLinea!=="n/d" && (rcLinea.indexOf(evLinea)>=0||evLinea.indexOf(rcLinea)>=0)) score+=12;
    if (evDef && evDef!=="n/a" && rcProb && rcProb.indexOf(evDef)>=0) score+=25;

    if (evDef && evDef!=="n/a" && rcCausa && evDef.split(" ").some(function(w){ return w.length>3&&rcCausa.indexOf(w)>=0; })) score+=10;
    if (evFindings && (rcProb || rcCausa || rcAccion)) {
      var efWords = evFindings.split(/\s+/).filter(function(w){ return w.length>4; });
      var matches = efWords.filter(function(w){
        return (rcProb && rcProb.indexOf(w)>=0) || (rcCausa && rcCausa.indexOf(w)>=0) || (rcAccion && rcAccion.indexOf(w)>=0);

  function traceOpsAutoAttachImagesToEvents(eventos, imageNames, metaMap){
    var map = {};

    imgs.forEach(function(fname){
      var meta = (metaMap && metaMap[fname]) || {};
      var imgMs = parseIsoDateTimeMs(meta.dateIso, meta.timeStr);
      if(imgMs == null) return;

      var bestEv = null;
      var bestScore = -9999;
      var nearestEv = null;
      var nearestDiff = 999999;
      var sameDayEvents = evs.filter(function(ev){
        var evMs0 = parseEventDateTimeMs(ev);

        var evMs = parseEventDateTimeMs(ev);

        var diffMin = Math.abs(imgMs - evMs) / 60000;
        if (diffMin < nearestDiff) {
          nearestDiff = diffMin;
          nearestEv = ev;
        }

        var score = 0;

        if (diffMin <= 5) score += 14;
        else if (diffMin <= 15) score += 11;
        else if (diffMin <= 30) score += 9;
        else if (diffMin <= 60) score += 6;
        else if (diffMin <= 180) score += 3;
        else if (diffMin <= 480) score += 1;

        var evSender = traceOpsNormSenderSafeLocal(ev.reporta || "");

                        <div style={{fontSize:13,fontWeight:800,color:"#10231C"}}>TraceOps</div>
                        <div style={{fontSize:10,color:"#5F766C"}}>Operational incidents</div>
                      </div>
                    </div>
                    <div style={{fontSize:30,fontWeight:800,color:"#10231C",lineHeight:1,marginBottom:4}}>{ev.length}</div>
                    <div style={{fontSize:11,color:"#5F766C",marginBottom:10}}>incidentes visibles en la ventana activa</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:9,fontWeight:800,background:"#FDEEEE",color:"#D64545",borderRadius:999,padding:"4px 8px"}}>{crit.length} críticos</span>
                      <span style={{fontSize:9,fontWeight:800,background:"#F5F7FA",color:"#5F766C",borderRadius:999,padding:"4px 8px"}}>{pend.length} abiertos</span>
                      <span style={{fontSize:9,fontWeight:800,background:"#EDF7F2",color:"#1E5C48",borderRadius:999,padding:"4px 8px"}}>{cerr.length} cerrados</span>
                    </div>
                  </div>

                  <div style={{background:"linear-gradient(180deg,#FFFFFF,#FFF9EF)",border:"1px solid #F1E2B8",borderRadius:18,padding:"16px 16px",boxShadow:"0 2px 12px rgba(20,32,51,.03)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:34,height:34,borderRadius:10,background:"#FFF7E7",border:"1px solid #F1DEAE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#B87820"}}>L</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:"#10231C"}}>LessonTrace</div>
                        <div style={{fontSize:10,color:"#5F766C"}}>Organizational learning</div>
                      </div>
                    </div>
                    {(function(){
                      var withLesson = rccaList.filter(function(r){ return r.leccion_aprendida && r.leccion_aprendida.trim().length > 5; });
                      var withCausa = rccaList.filter(function(r){ return r.causa_raiz && r.causa_raiz.trim().length > 5; });
                      return (
                        <div>
                          <div style={{fontSize:30,fontWeight:800,color:"#10231C",lineHeight:1,marginBottom:4}}>{withLesson.length}</div>
                          <div style={{fontSize:11,color:"#5F766C",marginBottom:10}}>lecciones registradas</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontSize:9,fontWeight:800,background:"#FFF3D7",color:"#B87820",borderRadius:999,padding:"4px 8px"}}>{withCausa.length} causas raíz</span>
                            <span style={{fontSize:9,fontWeight:800,background:"#F2EEFF",color:"#6B2DA8",borderRadius:999,padding:"4px 8px"}}>{rccaList.length} RCCA</span>
                          </div>
                        </div>
                      );
                    })()}
                  </div>

                  <div style={{background:"linear-gradient(180deg,#FFFFFF,#F4FBF7)",border:"1px solid #D9ECE3",borderRadius:18,padding:"16px 16px",boxShadow:"0 2px 12px rgba(20,32,51,.03)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:34,height:34,borderRadius:10,background:"#ECF8F1",border:"1px solid #D9ECE3",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#1E7B58"}}>Y</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:"#10231C"}}>Yokoten</div>
                        <div style={{fontSize:10,color:"#5F766C"}}>Knowledge reuse</div>
                      </div>
                    </div>
                    {(function(){
                      var yokoCount = 0;
                      var yokoItems = [];
                      rccaList.forEach(function(r){
                        if (!r.accion_correctiva || r.accion_correctiva.trim().length < 10) return;
                        var otherEvents = ev.filter(function(e){
                          var linked = r.event_ids && r.event_ids.indexOf(e.id) >= 0;
                          if (linked) return false;
                          var sameModel = r.modelo && e.modelo && r.modelo.toLowerCase() === e.modelo.toLowerCase();
                          var sameDef = r.problema && e.defecto_smt && e.defecto_smt !== "N/A" && r.problema.toLowerCase().indexOf(e.defecto_smt.toLowerCase()) >= 0;
                          var sameType = r.patron_detectado && e.tipo_evento && r.patron_detectado.toLowerCase().indexOf(e.tipo_evento.toLowerCase()) >= 0;
                          return sameModel || sameDef || sameType;
                        });
                        if (otherEvents.length > 0) {
                          yokoCount += otherEvents.length;
                          yokoItems.push({rcca:r, targets:otherEvents.length});
                        }
                      });
                      return (
                        <div>
                          <div style={{fontSize:30,fontWeight:800,color:"#10231C",lineHeight:1,marginBottom:4}}>{yokoCount}</div>
                          <div style={{fontSize:11,color:"#5F766C",marginBottom:10}}>oportunidades detectadas</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontSize:9,fontWeight:800,background:"#ECF8F1",color:"#1E7B58",borderRadius:999,padding:"4px 8px"}}>{yokoItems.length} soluciones replicables</span>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  {rccaList.length > 0 && (function(){
                    var lessons = rccaList.filter(function(r){ return r.leccion_aprendida && r.leccion_aprendida.trim().length > 5; });
                    if (lessons.length === 0) return (
                      <div style={{background:"linear-gradient(180deg,#FFFFFF,#FFF9EF)",border:"1px solid #F1E2B8",borderRadius:20,padding:"18px 18px"}}>
                        <div style={{fontSize:13,fontWeight:800,color:"#10231C",marginBottom:4}}>LessonTrace</div>
                        <div style={{fontSize:11,color:"#5F766C"}}>Todavía no hay lecciones registradas para la ventana activa.</div>
                      </div>
                    );
                    return (
                      <div style={{background:"linear-gradient(180deg,#FFFFFF,#FFF9EF)",border:"1px solid #F1E2B8",borderRadius:20,padding:"18px 18px",boxShadow:"0 2px 12px rgba(20,32,51,.03)"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                          <div>
                            <div style={{fontSize:14,fontWeight:800,color:"#10231C"}}>LessonTrace</div>
                            <div style={{fontSize:11,color:"#5F766C"}}>Lecciones aprendidas reutilizables</div>
                          </div>
                          <span style={{fontSize:10,fontWeight:800,background:"#FFF3D7",color:"#B87820",borderRadius:999,padding:"6px 10px"}}>{lessons.length} lecciones</span>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:12}}>
                          {lessons.slice(0,4).map(function(r){
                            return (
                              <div key={r.rcca_id} style={{background:"#fff",border:"1px solid #F1E2B8",borderRadius:16,padding:"14px 14px",minHeight:158}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
                                  <span style={{fontSize:10,fontFamily:"monospace",fontWeight:800,color:"#B87820"}}>{r.rcca_id}</span>
                                  {r.modelo && <span style={{fontSize:9,background:"#F5F7FA",color:"#5F766C",borderRadius:999,padding:"3px 8px"}}>{r.modelo}</span>}
                                  {r.linea && <span style={{fontSize:9,background:"#F5F7FA",color:"#5F766C",borderRadius:999,padding:"3px 8px"}}>{r.linea}</span>}
                                </div>
                                <div style={{fontSize:11.2,color:"#10231C",lineHeight:1.55,marginBottom:8}}>{r.leccion_aprendida.slice(0,175)}{r.leccion_aprendida.length>175?"...":""}</div>
                                {r.causa_raiz && <div style={{fontSize:10,color:"#5F766C",lineHeight:1.45}}><strong style={{color:"#10231C"}}>Causa raíz:</strong> {r.causa_raiz.slice(0,110)}{r.causa_raiz.length>110?"...":""}</div>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}

                  {rccaList.length > 0 && ev.length > 0 && (function(){
                    var yokoItems = [];
                    rccaList.forEach(function(r){
                      if (!r.accion_correctiva || r.accion_correctiva.trim().length < 10) return;
                      var targets = ev.filter(function(e){
                        var linked = r.event_ids && r.event_ids.indexOf(e.id) >= 0;
                        if (linked) return false;
                        var sameModel = r.modelo && e.modelo && e.modelo !== "N/D" && r.modelo.toLowerCase() === e.modelo.toLowerCase();
                        var sameDef = r.problema && e.defecto_smt && e.defecto_smt !== "N/A" && r.problema.toLowerCase().indexOf(e.defecto_smt.toLowerCase()) >= 0;
                        var sameType = r.patron_detectado && e.tipo_evento && r.patron_detectado.toLowerCase().indexOf(e.tipo_evento.toLowerCase()) >= 0;
                        return sameModel || sameDef || sameType;
                      });
                      if (targets.length > 0) yokoItems.push({rcca:r, targets:targets});
                    });
                    if (yokoItems.length === 0) return (
                      <div style={{background:"linear-gradient(180deg,#FFFFFF,#F4FBF7)",border:"1px solid #D9ECE3",borderRadius:20,padding:"18px 18px"}}>
                        <div style={{fontSize:13,fontWeight:800,color:"#10231C",marginBottom:4}}>Yokoten</div>
                        <div style={{fontSize:11,color:"#5F766C"}}>No hay soluciones replicables detectadas para los eventos visibles.</div>
                      </div>
                    );
                    return (
                      <div style={{background:"linear-gradient(180deg,#FFFFFF,#F4FBF7)",border:"1px solid #D9ECE3",borderRadius:20,padding:"18px 18px",boxShadow:"0 2px 12px rgba(20,32,51,.03)"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                          <div>
                            <div style={{fontSize:14,fontWeight:800,color:"#10231C"}}>Yokoten</div>
                            <div style={{fontSize:11,color:"#5F766C"}}>Soluciones que podrían reaplicarse</div>
                          </div>
                          <span style={{fontSize:10,fontWeight:800,background:"#ECF8F1",color:"#1E7B58",borderRadius:999,padding:"6px 10px"}}>{yokoItems.length} casos</span>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:12}}>
                          {yokoItems.slice(0,4).map(function(y){
                            return (
                              <div key={y.rcca.rcca_id} style={{background:"#fff",border:"1px solid #D9ECE3",borderRadius:16,padding:"14px 14px",minHeight:158}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
                                  <span style={{fontSize:10,fontFamily:"monospace",fontWeight:800,color:"#1E7B58"}}>{y.rcca.rcca_id}</span>
                                  <span style={{fontSize:9,fontWeight:800,background:"#ECF8F1",color:"#1E7B58",borderRadius:999,padding:"3px 8px"}}>{y.targets.length} EVT aplicables</span>
                                </div>
                                <div style={{fontSize:11.2,color:"#10231C",lineHeight:1.55,marginBottom:10}}>{y.rcca.accion_correctiva.slice(0,175)}{y.rcca.accion_correctiva.length>175?"...":""}</div>
                                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                  {y.targets.slice(0,4).map(function(e){
                                    return <span key={e.id} style={{fontSize:9,fontFamily:"monospace",background:"#F5F7FA",color:"#5F766C",borderRadius:999,padding:"3px 8px"}}>{e.id}</span>;
                                  })}
                                  {y.targets.length > 4 && <span style={{fontSize:9,color:"#5F766C"}}>+{y.targets.length-4} más</span>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          <div className="foot">
            <p><strong>TraceOps</strong> by SMTintel - ALDA - {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"8px 16px",fontSize:12}} onClick={download}>Descargar Excel</button>
          </div>
        </div>
      )}
      </div>{/* end main-content */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.addEventListener("load", function() {
  if (document.body) document.body.classList.add("traceops-premium-shell");
  if (window.preloadExcelTools) window.preloadExcelTools();
});
</script>
</body>
</html>
