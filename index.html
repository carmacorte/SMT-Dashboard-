/* ===== Liquid Glass UI embed ===== */
:root{
  --lg-bg:#000000;
  --lg-panel:rgba(255,255,255,.055);
  --lg-panel-strong:rgba(255,255,255,.095);
  --lg-panel-border:rgba(255,255,255,.16);
  --lg-text:#F5F7FA;
  --lg-text-soft:rgba(245,247,250,.72);
  --lg-muted:rgba(245,247,250,.48);
  --lg-accent:#8CCFB4;
  --lg-accent-2:#BFD8FF;
}
html,body{background:#000 !important;color:var(--lg-text);font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif !important}
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:-2;
  background:
    radial-gradient(900px 560px at 50% -10%, rgba(95,171,140,.18), transparent 56%),
    radial-gradient(620px 360px at 82% 12%, rgba(79,125,255,.08), transparent 50%),
    linear-gradient(180deg, rgba(255,255,255,.02), transparent 18%);
}
body::after{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.38;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px);
  background-size:100% 28px;
}
#root{background:transparent}
.liquid-glass,.liquid-glass-strong{
  position:relative;
  background:var(--lg-panel);
  border-radius:28px;
  backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  box-shadow:
    0 20px 60px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.12);
}
.liquid-glass::before,.liquid-glass-strong::before{
  content:"";
  position:absolute;inset:0;padding:1px;border-radius:inherit;
  background:linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,.06) 38%, rgba(255,255,255,.10));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.TRACEOPS_SUPABASE = window.TRACEOPS_SUPABASE || {
  url: "",
  anonKey: "",
  enabled: false
};

window.TraceOpsCloud = (function(){
  function cfg(){
    var raw = window.TRACEOPS_SUPABASE || {};
    return {
      url: (raw.url || "").trim(),
      anonKey: (raw.anonKey || "").trim(),
      enabled: !!raw.enabled
    };
  }

  function isConfigured(){
    var c = cfg();
    return c.enabled && c.url && c.anonKey && window.supabase && typeof window.supabase.createClient === "function";
  }

  function getClient(){
    if (!isConfigured()) return null;
    if (!window.__traceopsSupabaseClient) {
      var c = cfg();
      window.__traceopsSupabaseClient = window.supabase.createClient(c.url, c.anonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
    }
    return window.__traceopsSupabaseClient;
  }

  async function getUser(){
    var client = getClient();
    if (!client) return null;
    var out = await client.auth.getUser();
    return out && out.data ? out.data.user : null;
  }

async function initApp(){
  var client = getClient();
  if (!client) return;

  const { data } = await client.auth.getSession();

  if (data && data.session) {
    console.log("Sesión activa detectada");

    // 🔥 AUTO LOAD
    await loadRccasFromCloud();
  }
}
async function loadRccasFromCloud(){
  var client = getClient();
  if (!client) {
    console.warn("No hay cliente Supabase");
    return;
  }

  const { data, error } = await client
    .from('traceops_rcca_cases')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    console.error("Error cargando RCCA:", error);
    return;
  }

  console.log("RCCA desde nube:", data);

  // 🔥 NORMALIZAR (ESTO ES CLAVE)
  const rccas = (data || []).map(row => row.payload);

  console.log("RCCA normalizados:", rccas);

  window.__traceops_cloud_rccas = rccas;
  if (typeof renderInvestigationCarousel === "function") {
    renderInvestigationCarousel(rccas);
  }
} 
async function signIn(email, password){
    var client = getClient();
    if (!client) throw new Error("Supabase no configurado.");
    var out = await client.auth.signInWithPassword({ email: email, password: password });
    if (out.error) throw out.error;
    return out.data;
  }

async function signUp(email, password){
    var client = getClient();
    if (!client) throw new Error("Supabase no configurado.");
    var out = await client.auth.signUp({ email: email, password: password });
    if (out.error) throw out.error;
    return out.data;
  }

  async function signOut(){
    var client = getClient();
    if (!client) return;
    var out = await client.auth.signOut();
    if (out.error) throw out.error;
  }

  function onAuthChange(handler){
    var client = getClient();
    if (!client) return { data: { subscription: { unsubscribe: function(){} } } };
    return client.auth.onAuthStateChange(function(evt, session){
      handler(evt, session && session.user ? session.user : null, session);
    });
  }

  async function listRcca(){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) return [];
    var q = await client
      .from("traceops_rcca_cases")
      .select("rcca_id,payload,updated_at")
      .eq("user_id", user.id)
      .order("updated_at", { ascending: false });
    if (q.error) throw q.error;
    return (q.data || []).map(function(row){
      var payload = row.payload || {};
      payload.rcca_id = payload.rcca_id || row.rcca_id;
      payload._cloud_updated_at = row.updated_at || null;
      return payload;
    });
  }

  async function upsertRcca(rcca){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) throw new Error("Sesion no disponible.");
    var row = {
      user_id: user.id,
      rcca_id: rcca.rcca_id,
      payload: Object.assign({}, rcca, {
        updated_at: new Date().toISOString(),
        source: rcca.source || "manual"
      }),
      updated_at: new Date().toISOString()
    };
    var q = await client.from("traceops_rcca_cases").upsert(row, { onConflict: "user_id,rcca_id" }).select("updated_at").single();
    if (q.error) throw q.error;
    return q.data;
  }

  async function removeRcca(rccaId){
    var client = getClient();
    var user = await getUser();
    if (!client || !user) throw new Error("Sesion no disponible.");
    var q = await client.from("traceops_rcca_cases").delete().eq("user_id", user.id).eq("rcca_id", rccaId);
    if (q.error) throw q.error;
  }

  return {
    cfg: cfg,
    isConfigured: isConfigured,
    getClient: getClient,
    getUser: getUser,
    signIn: signIn,
    signUp: signUp,
    signOut: signOut,
    onAuthChange: onAuthChange,
    listRcca: listRcca,
    upsertRcca: upsertRcca,
    removeRcca: removeRcca
  };
})();
</script>

<script>

function parseTurno(h, min, dateIso) {
  var m = parseInt(min) || 0;
  var dow = 1;
  if (dateIso) {
    var parts = dateIso.split("-");
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    dow = d.getDay();
  }
  if (dow === 6) {
    if (h >= 0 && h < 9) return "3T";
    if (h >= 9 && h < 18) return "1T-Sab";
    return "2T-Sab";
  }
  if (dow === 0) {
    if (h >= 6 && h < 18) return "1T-Dom";
    return "2T-Dom";
  }
  if (h >= 0 && h < 6) return "3T";
  if (h < 15 || (h === 15 && m < 15)) return "1T";
  return "2T";
}

function parseWhatsApp(txt) {
  var lines = txt.split(/\r?\n/);
  var msgs = [];
  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
  var cur = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].replace(/[\u200e\u200f\u202a\u202b\u202c\u202d\u202e\u202f]/g, "").trim();
    var m = line.match(reA) || line.match(reB);
    if (m) {
      if (cur) msgs.push(cur);
      var d, mo, yr, h2, min, sec, mer, sender, text;
      if (line.match(reA)) {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec=m[6]||"00"; mer=m[7]||""; sender=m[8]; text=m[9];
      } else {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec="00"; mer=""; sender=m[6]; text=m[7];
      }
      var year = parseInt(yr);
      if (year < 100) year += 2000;
      var t = to24h(h2, min, sec, mer);
      var dateIso = year + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      cur = {
        dateIso: dateIso,
        dateDisp: String(d).padStart(2,"0") + "/" + String(mo).padStart(2,"0") + "/" + year,
        timeStr: t.timeStr,
        hour: t.hour,
        turno: parseTurno(t.hour, min, dateIso),
        sender: sender.replace(/^~/,"").trim(),
        text: text.trim()
      };
    } else if (cur && line && !line.startsWith("[")) {
      cur.text += " " + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function getISOWeek(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getWeekRange(weekN, year) {
  var jan4 = new Date(Date.UTC(year, 0, 4));
  var day = jan4.getUTCDay() || 7;
  var monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - day + 1 + (weekN - 1) * 7);
  var sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  return {
    from: monday.toISOString().slice(0,10),
    to: sunday.toISOString().slice(0,10)
  };
}

function filterMsgs(msgs, mode, days, dateFrom, dateTo, weekNum, weekYear) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  if (mode === "range" && dateFrom && dateTo) {
    var f = dateFrom <= dateTo ? dateFrom : dateTo;
    var t = dateFrom <= dateTo ? dateTo : dateFrom;
    return sorted.filter(function(m){ return m.dateIso >= f && m.dateIso <= t; });
  }
  if (mode === "week" && weekNum && weekYear) {
    var wr = getWeekRange(parseInt(weekNum), parseInt(weekYear));
    return sorted.filter(function(m){ return m.dateIso >= wr.from && m.dateIso <= wr.to; });
  }
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function cleanMsgs(msgs) {
  var skip = /imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|cifrados de extremo|ahora es admin/i;
  var noise = /^(buenos d|buenas t|buen d|gracias|de nada|enterado|recibido|entendido)/i;
  return msgs.filter(function(m){
    return m.text && m.text.trim().length > 8 && !m.text.match(skip) && !m.text.trim().match(noise);
  });
}

// ═══════════════════════════════════════════════════════════════
// EML / MBOX PARSER — TraceOps v2026-03-22-clean
// Normaliza emails al mismo formato de mensajes WhatsApp
// Limpia HTML/MIME, quoted-printable, firmas y replies largos
// ═══════════════════════════════════════════════════════════════

function decodeQuotedPrintable(str) {
  if (!str) return '';
  return String(str)
    .replace(/=\r?\n/g, '')
    .replace(/=([0-9A-Fa-f]{2})/g, function(_, hex) {
      try { return String.fromCharCode(parseInt(hex, 16)); } catch(_) { return _; }
    });
}

function decodeMimeWords(str) {
  if (!str) return '';
  return String(str).replace(/=\?([^?]+)\?([BQbq])\?([^?]+)\?=/g, function(_, charset, enc, text) {
    try {
      if (String(enc).toUpperCase() === 'B') {
        return decodeURIComponent(escape(atob(String(text).replace(/\s/g, ''))));
      }
      var qp = String(text).replace(/_/g, ' ');
      return decodeQuotedPrintable(qp);
    } catch(_) {
      return text;
    }
  });
}

function decodeHtmlEntities(str) {
  if (!str) return '';
  try {
    var ta = document.createElement('textarea');
    ta.innerHTML = str;
    return ta.value;
  } catch(_) {
    return str
      .replace(/&nbsp;/gi, ' ')
      .replace(/&amp;/gi, '&')
      .replace(/&lt;/gi, '<')
      .replace(/&gt;/gi, '>')
      .replace(/&quot;/gi, '"')
      .replace(/&#39;/gi, "'");
  }
}

function stripHtmlToText(str) {
  if (!str) return '';
  var s = String(str)
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<head[\s\S]*?<\/head>/gi, ' ')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<\/div>/gi, '\n')
    .replace(/<\/li>/gi, '\n')
    .replace(/<li[^>]*>/gi, '• ')
    .replace(/<[^>]+>/g, ' ');
  return decodeHtmlEntities(s);
}

function decodeEmlEncoding(str, encoding) {
  if (!str) return '';
  var enc = (encoding || '').toLowerCase().trim();
  if (enc === 'base64') {
    try { return decodeURIComponent(escape(atob(String(str).replace(/\s/g, '')))); } catch(_) { return str; }
  }
  if (enc === 'quoted-printable') return decodeQuotedPrintable(str);
  return str;
}

function parseEmlHeaders(lines) {
  var headers = {};
  var i = 0;
  while (i < lines.length) {
    if (!lines[i] || lines[i].trim() === '') { i++; break; }
    var m = lines[i].match(/^([\w\-]+):\s*(.*)/);
    if (m) {
      var key = m[1].toLowerCase();
      var val = m[2];
      while (i + 1 < lines.length && /^[ \t]/.test(lines[i + 1])) {
        i++;
        val += ' ' + lines[i].trim();
      }
      headers[key] = decodeMimeWords(val);
    }
    i++;
  }
  return { headers: headers, bodyStart: i };
}

function cleanEmailTextLocal(text) {
  if (!text) return '';
  var s = String(text);
  s = s.replace(/\r/g, '\n');
  s = s.replace(/\u00a0/g, ' ').replace(/[\u200B-\u200F\u202A-\u202E]/g, '');
  s = stripHtmlToText(s);
  s = decodeHtmlEntities(s);
  s = s.replace(/^\s*(mime-version|content-type|content-transfer-encoding|content-disposition|x-[\w\-]+):.*$/gim, ' ');
  s = s.replace(/^--[\w=:\-\.\/\+]+\s*$/gim, ' ');
  s = s.replace(/\[(cid|image):[^\]]+\]/gi, ' ');
  var cutPatterns = [
    /\n\s*-----Original Message-----[\s\S]*$/i,
    /\n\s*From:\s.*\n\s*Sent:\s.*\n\s*To:\s.*[\s\S]*$/i,
    /\n\s*De:\s.*\n\s*Enviado el:\s.*\n\s*Para:\s.*[\s\S]*$/i,
    /\n\s*On .*wrote:[\s\S]*$/i,
    /\n\s*El .*escribi[oó]:[\s\S]*$/i,
    /\n\s*________________________________[\s\S]*$/i
  ];
  for (var i = 0; i < cutPatterns.length; i++) {
    if (cutPatterns[i].test(s)) {
      s = s.replace(cutPatterns[i], ' ');
      break;
    }
  }
  s = s.replace(/\n\s*>.*$/gm, ' ');
  s = s.replace(/https?:\/\/\S+/gi, ' ');
  s = s.replace(/\b(?:AVISO DE CONFIDENCIALIDAD|CONFIDENTIALITY NOTICE|DISCLAIMER)\b[\s\S]*$/i, ' ');
  s = s.replace(/\n{2,}/g, '\n');
  s = s.replace(/[ \t]+/g, ' ');
  s = s.replace(/\s*\n\s*/g, '\n');
  var lines = s.split(/\n+/).map(function(line){ return line.trim(); }).filter(function(line){
    if (!line) return false;
    if (/^(from|to|cc|bcc|subject|sent|date|de|para|asunto|enviado):\s*$/i.test(line)) return false;
    if (/^(--|__)+$/.test(line)) return false;
    return true;
  });
  s = lines.join('\n').trim();
  s = s.replace(/\n/g, ' ');
  s = s.replace(/\s{2,}/g, ' ').trim();
  return s;
}

function extractEmlBodyText(lines, bodyStart, contentType, encoding) {
  var rawBody = lines.slice(bodyStart).join('\n');
  var ct = (contentType || '').toLowerCase();
  var boundaryM = ct.match(/boundary="?([^";]+)"?/i);
  if (boundaryM) {
    var boundary = boundaryM[1].trim();
    var safeBoundary = boundary.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('--' + safeBoundary);
    var parts = rawBody.split(re);
    var bestText = '';
    var bestHtml = '';
    for (var pi = 0; pi < parts.length; pi++) {
      var part = parts[pi];
      if (!part || /^\s*--\s*$/.test(part)) continue;
      var partLines = part.replace(/^\s+/, '').split(/\r?\n/);
      var partInfo = parseEmlHeaders(partLines);
      var partCt = (partInfo.headers['content-type'] || '').toLowerCase();
      var partEnc = (partInfo.headers['content-transfer-encoding'] || '').toLowerCase().trim();
      var payload = decodeEmlEncoding(partLines.slice(partInfo.bodyStart).join('\n').trim(), partEnc);
      if (partCt.indexOf('multipart/') >= 0) {
        var nested = extractEmlBodyText(partLines, partInfo.bodyStart, partCt, partEnc);
        if (nested && !bestText) bestText = nested;
        continue;
      }
      if (partCt.indexOf('text/plain') >= 0) {
        var cleanPlain = cleanEmailTextLocal(payload);
        if (cleanPlain && cleanPlain.length > bestText.length) bestText = cleanPlain;
      } else if (partCt.indexOf('text/html') >= 0) {
        var cleanHtml = cleanEmailTextLocal(payload);
        if (cleanHtml && cleanHtml.length > bestHtml.length) bestHtml = cleanHtml;
      }
    }
    if (bestText) return bestText;
    if (bestHtml) return bestHtml;
  }
  var decoded = decodeEmlEncoding(rawBody.trim(), encoding);
  return cleanEmailTextLocal(decoded);
}

function parseEmlToMsg(rawText) {
  if (!rawText || !rawText.trim()) return null;
  var lines = String(rawText).split(/\r?\n/);
  var info = parseEmlHeaders(lines);
  var h = info.headers;

  var dateObj = null;
  try { dateObj = h['date'] ? new Date(h['date']) : null; } catch(_) {}
  if (!dateObj || isNaN(dateObj.getTime())) dateObj = new Date();

  var year = dateObj.getFullYear();
  var month = dateObj.getMonth() + 1;
  var day = dateObj.getDate();
  var hour = dateObj.getHours();
  var min = dateObj.getMinutes();
  var dateIso = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  var timeStr = String(hour).padStart(2,'0') + ':' + String(min).padStart(2,'0');

  var fromRaw = decodeMimeWords(h['from'] || 'email@desconocido');
  var addrM = fromRaw.match(/<([^>]+)>/);
  var addr = addrM ? addrM[1] : fromRaw.replace(/"/g,'').trim();
  var displayM = fromRaw.match(/^"?([^"<]+)"?\s*</);
  var sender = displayM ? displayM[1].trim() : addr;
  sender = sender.replace(/^~/, '').trim();

  var subject = cleanEmailTextLocal(decodeMimeWords(h['subject'] || ''));
  var body = extractEmlBodyText(lines, info.bodyStart, h['content-type'] || '', h['content-transfer-encoding'] || '');
  var text = ((subject ? '[' + subject + '] ' : '') + body).replace(/\s+/g, ' ').trim();
  if (!text || text.trim().length < 12) return null;
  if (text.length > 1200) text = text.slice(0, 1200) + '...';

  return {
    dateIso: dateIso,
    dateDisp: String(day).padStart(2,'0') + '/' + String(month).padStart(2,'0') + '/' + year,
    timeStr: timeStr,
    hour: hour,
    turno: parseTurno(hour, min, dateIso),
    sender: sender,
    text: text,
    source: 'email'
  };
}

function parseMboxToMsgs(rawText) {
  if (!rawText) return [];
  var chunks = String(rawText).split(/^From [^\r\n]*$/m);
  var results = [];
  chunks.forEach(function(chunk) {
    var msg = parseEmlToMsg(String(chunk || '').trim());
    if (msg) results.push(msg);
  });
  return results;
}

var _zipRef = null;
var _imgCache = {};

async function readZip(file) {
  var zip = await JSZip.loadAsync(file);
  _zipRef = zip;
  _imgCache = {};
  var names = Object.keys(zip.files);
  var txt = null;
  var imgNames = [];
  var imgMeta = {};
  var emlMsgs = [];

  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    if (name.startsWith("__MACOSX")) continue;
    var base = name.split("/").pop();
    if (!base) continue;

    // WhatsApp txt (existente)
    if (!txt && base.endsWith(".txt") && !base.toLowerCase().endsWith(".eml")) {
      txt = await zip.files[name].async("string");
    }
    // Imagenes (existente)
    if (/\.(jpe?g|png|webp)$/i.test(base)) {
      imgNames.push(base);
    }
    // EML — nuevo
    if (base.toLowerCase().endsWith(".eml")) {
      try {
        var emlRaw = await zip.files[name].async("string");
        var msg = parseEmlToMsg(emlRaw);
        if (msg) emlMsgs.push(msg);
      } catch(_) {}
    }
    // MBOX — nuevo
    if (base.toLowerCase().endsWith(".mbox")) {
      try {
        var mboxRaw = await zip.files[name].async("string");
        var mboxMsgs = parseMboxToMsgs(mboxRaw);
        emlMsgs = emlMsgs.concat(mboxMsgs);
      } catch(_) {}
    }
  }

  // Construir imgMeta desde txt de WhatsApp si existe
  if (txt) {
    var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
    var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
    var lastMeta = null;
    txt.split(/\r?\n/).forEach(function(rawLine) {
      var line = rawLine.replace(/[\u200e\u200f\u202a-\u202f]/g,"").trim();
      var m = line.match(reA) || line.match(reB);
      if (m) {
        var isA = !!line.match(reA);
        var d=m[1],mo=m[2],yr=m[3],h2=m[4],min2=m[5];
        var mer=isA?(m[7]||""):""; var sender=isA?m[8]:m[6];
        var year=parseInt(yr); if(year<100) year+=2000;
        var hour=parseInt(h2);
        var mlow=(mer||"").toLowerCase().replace(/[\s.]/g,"");
        if(mlow.indexOf("p")===0 && hour!==12) hour+=12;
        if(mlow.indexOf("a")===0 && hour===12) hour=0;
        lastMeta={
          dateIso:year+"-"+String(mo).padStart(2,"0")+"-"+String(d).padStart(2,"0"),
          timeStr:String(hour).padStart(2,"0")+":"+min2,
          sender:(sender||"").replace(/^~/,"").trim()
        };
      }
      var adj = line.match(/<adjunto:\s*([^>]+\.(?:jpe?g|png|webp))\s*>/i);
      if (adj && lastMeta) {
        imgMeta[adj[1].trim()] = { dateIso:lastMeta.dateIso, timeStr:lastMeta.timeStr, sender:lastMeta.sender };
      }
    });
  }

  var hasWA = !!(txt && txt.trim().length > 0);
  var hasEml = emlMsgs.length > 0;

  if (!hasWA && !hasEml) {
    throw new Error("No se encontro .txt de WhatsApp ni archivos .eml/.mbox en el ZIP");
  }

  return { txt: txt || "", imgNames: imgNames, imgMeta: imgMeta, emlMsgs: emlMsgs || [], hasWA: hasWA, hasEml: hasEml };
}

async function loadImg(fname) {
  if (_imgCache[fname]) return _imgCache[fname];
  if (!_zipRef) return null;
  var allNames = Object.keys(_zipRef.files);
  var match = allNames.find(function(n){ return n.split("/").pop() === fname; });
  if (!match) return null;
  try {
    var b64 = await _zipRef.files[match].async("base64");
    var ext = fname.split(".").pop().toLowerCase().replace("jpg","jpeg");
    var url = "data:image/"+ext+";base64,"+b64;
    _imgCache[fname] = url;
    return url;
  } catch(_) { return null; }
}



// ═══════════════════════════════════════════════════════════════
// HYBRID ENGINE — TraceOps v3
// Semantic pre-processing + token reduction (85-90%)
// All helpers encapsulated inside analyzeWithAI
// ═══════════════════════════════════════════════════════════════

async function analyzeWithAI(msgs, apiKey) {
  function estimateTokensLocal(text) {
    if (!text) return 1;
    return Math.max(1, Math.ceil(text.length / 3.7));
  }

  function normalizeLocal(text) {
    return (text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^\w\s\-\/\.]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isNoiseLocal(text) {
    var short = normalizeLocal(text);
    var trivial = [
      "ok","enterado","recibido","gracias","de nada","listo",
      "va","copiado","entendido","si","no","claro","bien","perfecto","roger"
    ];
    if (!short || short.length < 4) return true;
    return trivial.indexOf(short) >= 0;
  }

  function detectTypeLocal(text) {
    var t = normalizeLocal(text);
    if (!t) return null;
    if (/seguridad|alarma|puerta|riesgo|acceso|celda/.test(t)) return "Seguridad";
    if (/material|lcr|reel|etiquetad|faltante|rollo/.test(t)) return "Material";
    if (/aoi|ict|wrong|orientation|defecto|scrap|open|short|cross|tablilla/.test(t)) return "Calidad";
    if (/paro|deten|setup|fallando|feeder|linea|maquina|machine|stop/.test(t)) return "Proceso";
    if (/produccion|eficiencia|lote|output|rendimiento/.test(t)) return "Produccion";
    if (/sistema|red|servidor|software|erp|mes/.test(t)) return "Sistema";
    return null;
  }

  function extractLineLocal(text) {
    var raw = text || "";
    var m = raw.match(/\b(?:L\s*\d+|BB\s*\d+|linea\s*\d+|line\s*\d+)\b/i);
    if (!m) return "N/D";
    return m[0].replace(/\s+/g, "").toUpperCase();
  }

  function extractStationLocal(text) {
    var t = normalizeLocal(text);
    if (/\baoi\b/.test(t)) return "AOI";
    if (/\bict\b/.test(t)) return "ICT";
    if (/\bsmt\b/.test(t)) return "SMT";
    if (/\bpth\b/.test(t)) return "PTH";
    if (/seguridad|celda/.test(t)) return "Seguridad";
    return "N/D";
  }

  function timeToMinsLocal(dateIso, timeStr) {
    var dp = (dateIso || "").split("-").map(Number);
    var tp = (timeStr || "00:00").split(":").map(Number);
    if (dp.length < 3) return 0;
    return new Date(dp[0], dp[1] - 1, dp[2], tp[0] || 0, tp[1] || 0).getTime() / 60000;
  }

  function candidateDetectorLocal(msgs) {
    return msgs
      .filter(function(m) { return !isNoiseLocal(m.text); })
      .map(function(m) {
        return {
          dateIso: m.dateIso,
          timeStr: m.timeStr,
          sender: m.sender,
          text: m.text,
          turno: m.turno,
          type: detectTypeLocal(m.text)
        };
      })
      .filter(function(m) { return Boolean(m.type); });
  }

  function clusterIncidentsLocal(candidates) {
    var sorted = candidates.slice().sort(function(a, b) {
      return timeToMinsLocal(a.dateIso, a.timeStr) - timeToMinsLocal(b.dateIso, b.timeStr);
    });

    var clusters = [];

    sorted.forEach(function(msg) {
      var msgTime = timeToMinsLocal(msg.dateIso, msg.timeStr);
      var line = extractLineLocal(msg.text);
      var station = extractStationLocal(msg.text);
      var last = clusters[clusters.length - 1];

      if (last) {
        var dt = msgTime - last.lastTime;
        var sameType = msg.type === last.type;
        var lineOk = line === last.line || line === "N/D" || last.line === "N/D";

        // PATCH 1: 180 min window to capture post-incident engineer findings
        if (sameType && lineOk && dt <= 180) {
          last.messages.push(msg);
          last.lastTime = msgTime;
          if (last.line === "N/D" && line !== "N/D") last.line = line;
          if (last.station === "N/D" && station !== "N/D") last.station = station;
          return;
        }
      }

      clusters.push({
        type: msg.type,
        line: line,
        station: station,
        lastTime: msgTime,
        messages: [msg]
      });
    });

    return clusters;
  }

  function buildClusterPayload(clusters) {
    return clusters.map(function(cluster, i) {
      var msgs = cluster.messages;
      var first = msgs[0];
      var last2 = msgs[msgs.length - 1];

      var senders = msgs
        .map(function(m) { return m.sender; })
        .filter(function(s, idx, arr) { return arr.indexOf(s) === idx; })
        .join(", ");

      var texts = msgs
        .map(function(m) { return m.sender + ": " + m.text; })
        .join(" | ");

      return (
        "CLUSTER-" + String(i + 1).padStart(2, "0") +
        " | " + (first.dateIso || "") + " " + (first.timeStr || "") +
        " -> " + (last2.dateIso || "") + " " + (last2.timeStr || "") +
        " | tipo:" + cluster.type +
        " | linea:" + cluster.line +
        " | estacion:" + cluster.station +
        " | turno:" + (first.turno || "") +
        " | actores:" + senders +
        " | msgs:" + texts.slice(0, 480)
      );
    }).join("\n");
  }

  // --- Engine logic ---

  var candidates = candidateDetectorLocal(msgs);
  var clusters = clusterIncidentsLocal(candidates);

  var useClusterMode = candidates.length >= 3 && clusters.length >= 2;
  var userContent;

  if (useClusterMode) {
    var clusterPayload = buildClusterPayload(clusters);
    var rawTok = estimateTokensLocal(msgs.map(function(m) { return m.text; }).join(" "));
    var clTok = estimateTokensLocal(clusterPayload);

    console.log(
      "[TraceOps Hybrid] " +
      msgs.length + " msgs -> " +
      candidates.length + " candidatos -> " +
      clusters.length + " clusters | " +
      rawTok + " tok -> " + clTok + " tok | " +
      Math.round((1 - clTok / Math.max(rawTok, 1)) * 100) + "% reduccion"
    );

    userContent =
      "Analiza estos " + clusters.length +
      " clusters pre-procesados de " + msgs.length + " mensajes. " +
      "Cada CLUSTER = un incidente. Extrae un evento por cluster. " +
      "Usa linea y estacion cuando esten disponibles. Solo JSON:\n\n" +
      clusterPayload;
  } else {
    var sample = msgs.slice(0, 150).map(function(m) {
      return "[" + m.dateIso + " " + m.timeStr + "|" + m.turno + "|" + m.sender + "]:" + m.text;
    }).join("\n");

    console.log(
      "[TraceOps Hybrid] Fallback semantico: " +
      msgs.length + " msgs | " +
      candidates.length + " candidatos | " +
      clusters.length + " clusters"
    );

    userContent =
      "Analiza " + msgs.length +
      " mensajes de manufactura SMT/PTH/AOI/ICT. " +
      "Extrae incidentes operativos accionables. Solo JSON:\n\n" +
      sample;
  }

  var system =
    "Eres experto en manufactura SMT/PCB/PTH. " +
    "Analiza mensajes o clusters de WhatsApp de manufactura y extrae SOLO eventos operativos accionables. " +
    "Si recibes CLUSTERS, cada cluster es un incidente. Extrae un evento por cluster. " +
    "INCLUIR: paros linea, defectos calidad, falta material, FAI, LCR vencido, RMA, AOI/ICT, dano fisico. " +
    "EXCLUIR: saludos, ok, gracias, emojis solos. " +
    "Catalogo defecto_smt: Solder bridge|Missing component|Wrong component|Wrong orientation|Polarity inverted|" +
    "Misaligned component|BGA short|BGA open|Lifted pad|Feeder misload|Machine stop|Wrong reel|Missing material|" +
    "ICT open|ICT short|Functional test fail|N/A. " +
    "tipo_evento: Calidad|Proceso|Material|Sistema|Seguridad|Produccion. " +
    "actor_area: Produccion|Calidad|Proceso|Mantenimiento|Materiales|Ingenieria|PTH|SMT|AOI|ICT. " +
    "estado_historia: Detectado|Contenido|Corregido|Validado|Cerrado. " +
    "Para cada evento extrae: quien detecto, que accion se tomo, que actores participaron, cual es el estado real del ciclo de vida. " +
    "ENGINEER FINDINGS: Si en los mensajes del cluster hay una respuesta POSTERIOR al reporte inicial donde el engineer, tecnico de calidad, SMT o responsable tecnico responde con analisis, findings de componentes (ej: U108, U519), causa probable, resultados de inspeccion, hipotesis tecnica o plan de accion especifico, captura esa respuesta completa en el campo engineer_findings. Este campo es CRITICO para el seguimiento de causa raiz. " +
    "Maximo 15 eventos. Solo JSON sin texto extra:" +
    '{"eventos":[{"id":"EVT-001","fecha":"DD/MM/YYYY","hora":"HH:MM","turno":"1T|2T|3T",' +

    '"tipo_evento":"Calidad|Proceso|Material|Sistema|Seguridad|Produccion",' +
    '"defecto_smt":"del catalogo o N/A","evento_detectado":"descripcion","impacto":"impacto",' +
    '"accion_requerida":"accion","accion_ejecutada":"accion tomada o vacia si no hay","engineer_findings":"respuesta tecnica del engineer si existe en mensajes posteriores al incidente, o vacia",' +
    '"responsable_sugerido":"responsable",' +
    '"actores":["area1","area2"],' +
    '"estado_historia":"Detectado|Contenido|Corregido|Validado|Cerrado",' +
    '"estatus":"Abierto|En proceso|Cerrado","prioridad":"Critica|Alta|Media|Baja",' +
    '"fuente_chat":"DD/MM/YY HH:MM nombre","notas":""}],' +
    '"kpis":[{"fechahora":"DD/MM/YYYY HH:MM","indicador":"nombre","valor":0.0,"unidad":"%","fuente":"nombre"}],' +
    '"resumen":{"periodo":"DD/MM/YYYY a DD/MM/YYYY","grupo":"nombre","total_eventos":0,' +
    '"alertas_criticas":["alerta"],"acciones_pendientes":["accion"],"estatus_lineas":["linea"]},' +
    '"directorio":[{"nombre":"nombre","departamento":"area","rol":"rol","mensajes":0,"eventos":0,"area_owner":"area"}]}';

  function uniqLocal(arr) {
    var out = [];
    var seen = {};
    (arr || []).forEach(function(x) {
      var k = String(x || "").trim();
      if (!k || seen[k]) return;
      seen[k] = true;
      out.push(k);
    });
    return out;
  }

  function normalizeLooseLocal(text) {
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, " ")
      .trim();
  }

  function extractPartsLocal(text) {
    return uniqLocal((String(text || "").toUpperCase().match(/\b(?:U|R|C|L|Q|D|TP)\d{1,4}\b/g) || []));
  }

  function extractModelTokensLocal(text) {
    return uniqLocal(
      normalizeLooseLocal(text)
        .split(/\s+/)
        .filter(function(tok) {
          if (!tok || tok === "n" || tok === "d" || tok === "nd") return false;
          if (tok.length < 3) return false;
          if (/^(caso|owner|linea|estacion|evento|detectado|accion|reporta|responsable|abierto|cerrado|proceso|calidad|material|sistema|seguridad|produccion|smt|pth|ict|aoi|mod|modelo|falla|fallas|pass|open|short|wrong|component|components|loading|setup|engineer|findings|analisis|analizado|mitigacion|validacion|reporte|root|cause)$/.test(tok)) return false;
          return true;
        })
    );
  }

  function parseEventDateTimeMsLocal(ev) {
    if (!ev || !ev.fecha) return null;
    var dp = String(ev.fecha).split("/");
    if (dp.length !== 3) return null;
    var tp = String(ev.hora || "00:00").split(":");
    var dd = parseInt(dp[0], 10) || 1;
    var mm = parseInt(dp[1], 10) || 1;
    var yy = parseInt(dp[2], 10) || 2000;
    var hh = parseInt(tp[0], 10) || 0;
    var mi = parseInt(tp[1], 10) || 0;
    return new Date(yy, mm - 1, dd, hh, mi, 0).getTime();
  }

  function technicalHitCountLocal(text) {
    var t = normalizeLooseLocal(text);
    var keys = [
      "owner", "escalado", "escalar", "analizado", "analisis", "findings", "causa", "hipotesis",
      "mitigacion", "contencion", "validacion", "inspeccion", "inspection", "ict", "aoi", "5dx", "xray",
      "flux", "test point", "test points", "pogo", "componente", "componentes", "wrong", "open", "short",
      "bridge", "soldadura", "limpieza", "residuo", "residuos", "fixtura", "recomendacion", "preventiva",
      "preventivo", "monitoreo", "pallet", "autopressfit", "feeder", "reel", "material mix", "wrong p n"
    ];
    var hits = 0;
    keys.forEach(function(k) {
      if (t.indexOf(k) >= 0) hits += 1;
    });
    return hits;
  }

  function senderLooksTechnicalLocal(msg) {
    var s = normalizeLooseLocal((msg && msg.sender) || "");
    var t = normalizeLooseLocal((msg && msg.text) || "").slice(0, 160);
    var combo = s + " " + t;
    return /(eng|engineer|ingenier|qa|quality|calidad|maint|maintenance|mantenimiento|proceso|process|smt|pth|ict|aoi|superintendent|superintendente|tecnico|tec|manager|owner)/.test(combo) ? 1 : 0;
  }

  function buildEventAnchorLocal(ev, evTimeMs) {
    var sourceTexts = msgs.filter(function(m) {
      var ms = timeToMinsLocal(m.dateIso, m.timeStr) * 60000;
      return evTimeMs && ms >= (evTimeMs - 90 * 60000) && ms <= (evTimeMs + 180 * 60000);
    }).map(function(m) { return m.text; }).join(" ");

    var anchorText = [
      ev.evento_detectado, ev.accion_requerida, ev.accion_ejecutada, ev.notas,
      ev.modelo, ev.linea_estacion, ev.defecto_smt, sourceTexts
    ].join(" ");

    return {
      components: extractPartsLocal(anchorText),
      modelTokens: extractModelTokensLocal([ev.modelo, ev.evento_detectado, sourceTexts].join(" ")).slice(0, 10),
      line: extractLineLocal([ev.linea_estacion, ev.evento_detectado, sourceTexts].join(" ")),
      station: extractStationLocal([ev.linea_estacion, ev.evento_detectado, sourceTexts].join(" "))
    };
  }

  function overlapCountLocal(a, b) {
    var setB = {};
    (b || []).forEach(function(x) { setB[x] = true; });
    var n = 0;
    (a || []).forEach(function(x) { if (setB[x]) n += 1; });
    return n;
  }

  function formatFindingLocal(msg) {
    return "[" + (msg.dateDisp || msg.dateIso || "") + " " + (msg.timeStr || "") + " " + (msg.sender || "") + "] " + String(msg.text || "").replace(/\s+/g, " ").trim();
  }

  function enrichEngineerFindingsLocal(parsed) {
    if (!parsed || !parsed.eventos || !parsed.eventos.length) return parsed;
    var followWindowMs = 5 * 24 * 60 * 60000;

    parsed.eventos = (parsed.eventos || []).map(function(ev) {
      var evTimeMs = parseEventDateTimeMsLocal(ev);
      if (!evTimeMs) return ev;

      var anchor = buildEventAnchorLocal(ev, evTimeMs);
      var anchorTextNorm = normalizeLooseLocal([ev.modelo, ev.evento_detectado, ev.linea_estacion].join(" "));
      var hits = [];

      msgs.forEach(function(m) {
        var msgTimeMs = timeToMinsLocal(m.dateIso, m.timeStr) * 60000;
        if (!msgTimeMs || msgTimeMs <= (evTimeMs + 5 * 60000) || msgTimeMs > (evTimeMs + followWindowMs)) return;
        if (!m.text || m.text.length < 60) return;

        var msgParts = extractPartsLocal(m.text);
        var msgModels = extractModelTokensLocal(m.text);
        var partOverlap = overlapCountLocal(msgParts, anchor.components);
        var modelOverlap = overlapCountLocal(msgModels, anchor.modelTokens);
        var techHits = technicalHitCountLocal(m.text);
        var score = 0;

        if (partOverlap > 0) score += 8 + partOverlap * 2;
        if (modelOverlap > 0) score += 4 + modelOverlap * 2;
        if (anchor.line !== "N/D" && extractLineLocal(m.text) === anchor.line) score += 2;
        if (anchor.station !== "N/D" && extractStationLocal(m.text) === anchor.station) score += 2;
        if (techHits > 0) score += Math.min(6, techHits + 1);
        score += senderLooksTechnicalLocal(m);
        if (/\bcaso\s+(?:u|r|c|l|q|d|tp)?\d{1,4}\b/i.test(m.text)) score += 2;
        if (/owner\s*:/i.test(m.text)) score += 2;
        if (/escalad|5dx|flux|pogo|test point|test points|mitigacion|limpieza/i.test(normalizeLooseLocal(m.text))) score += 3;
        if (anchorTextNorm && normalizeLooseLocal(m.text).indexOf(anchorTextNorm.slice(0, 24)) >= 0) score += 2;

        var hasAnchor = partOverlap > 0 || modelOverlap > 0 || (anchor.station !== "N/D" && extractStationLocal(m.text) === anchor.station);
        if (!hasAnchor && techHits < 3) return;
        if (score < 8) return;

        hits.push({ msg: m, ms: msgTimeMs, score: score });
      });

      hits.sort(function(a, b) {
        if (b.score !== a.score) return b.score - a.score;
        return a.ms - b.ms;
      });

      var picked = [];
      var seen = {};
      var totalLen = 0;
      hits.forEach(function(h) {
        if (picked.length >= 3 || totalLen >= 1200) return;
        var k = normalizeLooseLocal(h.msg.text).slice(0, 120);
        if (!k || seen[k]) return;
        seen[k] = true;
        picked.push(h);
        totalLen += String(h.msg.text || "").length;
      });

      picked.sort(function(a, b) { return a.ms - b.ms; });
      var followText = picked.map(function(h) { return formatFindingLocal(h.msg); }).join(" || ");
      var existing = String(ev.engineer_findings || "").trim();

      if (!existing) {
        ev.engineer_findings = followText || "";
      } else if (followText) {
        var normExisting = normalizeLooseLocal(existing);
        var normFollow = normalizeLooseLocal(followText);
        if (normExisting.indexOf(normFollow.slice(0, 80)) === -1 && normFollow.indexOf(normExisting.slice(0, 80)) === -1) {
          ev.engineer_findings = existing + " || " + followText;
        }
      }

      return ev;
    });

    return parsed;
  }

  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,

      ]
    })
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });

    if (resp.status === 401) {
      throw new Error("API Key invalida. Verifica tu configuracion.");
    }
    if (resp.status === 429) {
      throw new Error("Limite de uso alcanzado. Espera e intenta de nuevo.");
    }

    throw new Error((err.error && err.error.message) || ("Error API " + resp.status));
  }

  var data = await resp.json();

  if (!data.content || !data.content.length) {
    throw new Error("Respuesta vacia. Intenta de nuevo.");
  }

  function extractBalancedJsonObject(text) {
    var start = text.indexOf("{");
    if (start === -1) return "";
    var depth = 0, inString = false, esc = false;
    for (var i = start; i < text.length; i++) {
      var ch = text[i];
      if (inString) {
        if (esc) { esc = false; continue; }
        if (ch === "\\") { esc = true; continue; }
        if (ch === '"') { inString = false; }
        continue;
      }
      if (ch === '"') { inString = true; continue; }
      if (ch === "{") depth += 1;
      else if (ch === "}") {
        depth -= 1;
        if (depth === 0) return text.slice(start, i + 1);
      }
    }
    return text.slice(start);
  }

  var raw = "{" + data.content.map(function(b) { return b.text || ""; }).join("");
  var clean = raw.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  if (/^\{\s*\{/.test(clean)) clean = clean.replace(/^\{\s*\{/, "{");

  var jsonStr = extractBalancedJsonObject(clean);
  if (!jsonStr) {
    throw new Error("JSON invalido. Reduce el rango o intenta de nuevo.");
  }

  var parsed = null;

  try {
    parsed = JSON.parse(jsonStr);
  } catch (_) {}

  if (!parsed) {
    var fixed = jsonStr
      .replace(/,\s*([}\]])/g, "$1")
      .replace(/\n/g, " ")
      .replace(/	/g, " ");
    try {
      parsed = JSON.parse(fixed);
    } catch (_) {}
  }

  if (!parsed) {
    if ((data.stop_reason || "") === "max_tokens") {
      throw new Error("La respuesta de IA se truncó por limite de tokens. Usa 1 a 3 dias o reduce el rango.");
    }
    throw new Error("Error procesando respuesta de IA. Intenta de nuevo o usa 1 a 3 dias.");
  }

  var usage = data.usage || {};
  parsed.__traceops_api = {
    api_calls: 1,
    cache_hit: false,
    model: "claude-sonnet-4-20250514",
    max_tokens: TRACEOPS_MAX_OUTPUT_TOKENS,
    input_tokens: usage.input_tokens || estimateTokensLocal(system + "\n" + userContent),
    output_tokens: usage.output_tokens || estimateTokensLocal(raw),
    server_stop_reason: data.stop_reason || "",
    requested_msgs: msgs.length,
    cluster_mode: useClusterMode ? 1 : 0
  };

  return enrichEngineerFindingsLocal(parsed);
}

  function LazyImg(props){
    var fname=props.fname;var className=props.className||"";var style=props.style||{};var onClick=props.onClick;
    var srcArr=_useState(null);var src=srcArr[0];var setSrc=srcArr[1];

    React.useEffect(function(){if(!visible||src||enqueuedRef.current)return;enqueuedRef.current=true;enqueueLoad(fname,function(url){setSrc(url);}); },[visible]);

  function formatDateIso(dateIso){if(!dateIso)return"";var p=dateIso.split("-");return p.length===3?(p[2]+"/"+p[1]+"/"+p[0]):dateIso;}
  function parseClockParts(timeStr){var parts=String(timeStr||"00:00:00").split(":");return{h:parseInt(parts[0],10)||0,m:parseInt(parts[1],10)||0,s:parseInt(parts[2],10)||0};}
  function parseIsoDateTimeMs(dateIso,timeStr){if(!dateIso)return null;var p=dateIso.split("-");if(p.length!==3)return null;var t=parseClockParts(timeStr);return new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10),t.h,t.m,t.s).getTime();}
  function parseEventDateTimeMs(evRow){if(!evRow||!evRow.fecha)return null;var p=String(evRow.fecha).split("/");if(p.length!==3)return null;var t=parseClockParts(evRow.hora);return new Date(parseInt(p[2],10),parseInt(p[1],10)-1,parseInt(p[0],10),t.h,t.m,t.s).getTime();}
  function sameCalendarDay(msA,msB){if(msA==null||msB==null)return false;var a=new Date(msA);var b=new Date(msB);return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
  function sortImageNamesNewestFirst(namesList){return namesList.slice().sort(function(a,b){var ma=imgMeta[a],mb=imgMeta[b];if(!ma&&!mb)return a.localeCompare(b);if(!ma)return 1;if(!mb)return -1;return((mb.dateIso||"")+(mb.timeStr||"")).localeCompare((ma.dateIso||"")+(ma.timeStr||""));});}
  function uniqueNames(list){var out=[];var seen={};list.forEach(function(name){if(!name||seen[name])return;seen[name]=true;out.push(name);});return out;}
  function formatEventRef(evRow){if(!evRow)return"";return evRow.hora?(evRow.fecha||"")+" "+evRow.hora:(evRow.fecha||"");}

  function buildPickerDataForEvent(evRow,attachedNames){
    var sorted=sortImageNamesNewestFirst(imgNames);var refMs=parseEventDateTimeMs(evRow);
    if(refMs==null)return{list:uniqueNames((attachedNames||[]).concat(sorted)).slice(0,120),modeLabel:"mas nuevas primero",refText:""};
    var exact=[],near15=[],near60=[],near180=[],sameDay=[],rest=[];
    sorted.forEach(function(fname){var meta2=imgMeta[fname]||{};var ms=parseIsoDateTimeMs(meta2.dateIso,meta2.timeStr);if(ms==null){rest.push(fname);return;}var diff=Math.abs(ms-refMs);if(diff<=5*60*1000)exact.push(fname);else if(diff<=15*60*1000)near15.push(fname);else if(diff<=60*60*1000)near60.push(fname);else if(diff<=3*60*60*1000)near180.push(fname);else if(sameCalendarDay(ms,refMs))sameDay.push(fname);else rest.push(fname);});
    var contextual=uniqueNames((attachedNames||[]).concat(exact,near15,near60,near180,sameDay));
    if(contextual.length<36)contextual=uniqueNames(contextual.concat(rest.slice(0,36-contextual.length)));
    var modeLabel="mas nuevas primero";if(exact.length)modeLabel="+-5 min";else if(near15.length)modeLabel="+-15 min";else if(near60.length)modeLabel="+-1h";else if(near180.length)modeLabel="+-3h";else if(sameDay.length)modeLabel="mismo dia";

                  <th>Engineer findings</th>
                  <th className={"sortable-th"+(bitacoraSortKey==="prioridad"?" active":"")} onClick={function(){toggleBitacoraSort("prioridad");}}><span className="sort-wrap">Prioridad <span className="sort-arrow">{getBitacoraSortIndicator("prioridad")}</span></span></th>
                  <th className={"sortable-th"+(bitacoraSortKey==="estatus"?" active":"")} onClick={function(){toggleBitacoraSort("estatus");}}><span className="sort-wrap">Estatus <span className="sort-arrow">{getBitacoraSortIndicator("estatus")}</span></span></th>
                  <th>RCCA</th>
                  {imgNames.length>0&&<th>Evidencia</th>}
                </tr></thead>
                <tbody>
                  {bitacoraEventos.map(function(e,i){return(
                    <tr key={i}>
                      <td><strong>{e.id}</strong></td>
                      <td style={{whiteSpace:"nowrap",fontSize:10}}>{e.fecha}</td>
                      <td>{e.turno}</td>
                      <td style={{maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.linea_estacion}</td>
                      <td><span style={{fontSize:9,background:"#EDF5F3",color:"#1E5545",padding:"2px 5px",borderRadius:4,fontWeight:600}}>{e.tipo_evento}</span></td>
                      <td style={{maxWidth:100}}>{e.defecto_smt&&e.defecto_smt!=="N/A"?<span className="badge bt" style={{fontSize:8.5,whiteSpace:"normal"}}>{e.defecto_smt}</span>:<span style={{color:"#C8C2BA",fontSize:10}}>-</span>}</td>
                      <td style={{maxWidth:170,fontSize:10.5}}>{e.evento_detectado}</td>
                      <td style={{maxWidth:240,minWidth:180,fontSize:10.2,lineHeight:1.4,color:e.engineer_findings?"#1A1714":"#B8B4AE"}}>{e.engineer_findings?<div><div style={{fontSize:8.4,fontWeight:700,letterSpacing:".04em",textTransform:"uppercase",color:"#2952A3",marginBottom:3}}>Engineer</div><div>{engineerSnippet(e.engineer_findings,220)}</div></div>:"-"}</td>
                      <td><span className={bprio(e.prioridad)}>{e.prioridad}</span></td>
                      <td><span className={best(e.estatus)}>{e.estatus}</span></td>
                      <td style={{verticalAlign:"top",paddingTop:8}}><RccaCell evId={e.id} modelo={e.modelo} linea={e.linea_estacion} fecha={e.fecha} problema={e.evento_detectado}/></td>
                      {imgNames.length>0&&<EvidenceCell e={e}/>}
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          </div>

          {pend.length>0&&<div className="tcard" style={{marginTop:14}}><div className="tcard-hdr"><h3>Pendientes operativos ({pend.length})</h3></div><div className="plist">{pend.map(function(e,i){return<PendItem key={i} e={e}/>;})}</div></div>}
          {rccaList.length>0&&<InvestigationCarousel cards={rccaList} allRcca={rccaList}/>}

          {/* ═══ HIPOCAMPO DIGITAL ═══ */}
          {ev.length > 0 && (
            <div style={{background:"linear-gradient(135deg,#0A1A0C 0%,#1A3D1E 40%,#0D2B10 100%)",borderRadius:18,overflow:"hidden",marginTop:14,marginBottom:14,border:"1px solid #2A5A30",boxShadow:"0 8px 32px rgba(0,0,0,.3)"}}>

              {/* Header - Cerebro */}
              <div style={{padding:"24px 24px 16px",textAlign:"center",position:"relative"}}>
                <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 30%,rgba(72,168,130,.12) 0%,transparent 60%)",pointerEvents:"none"}}/>
                <div style={{position:"relative",zIndex:1}}>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:".2em",textTransform:"uppercase",color:"#48A882",marginBottom:8}}>Operational Memory Architecture</div>
                  <div style={{fontSize:28,fontWeight:800,color:"#fff",lineHeight:1.1,marginBottom:4}}>Hipocampo Digital</div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,.45)",fontWeight:400}}>De experiencia dispersa a memoria organizacional</div>

                  {/* Neural pathway SVG */}
                  <svg width="100%" height="40" viewBox="0 0 400 40" preserveAspectRatio="xMidYMid meet" style={{marginTop:12,opacity:.6}}>
                    <line x1="0" y1="20" x2="400" y2="20" stroke="#2A5A30" strokeWidth="1"/>
                    <circle cx="80" cy="20" r="3" fill="#48A882" opacity=".5"><animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/></circle>
                    <circle cx="200" cy="20" r="4" fill="#48A882"><animate attributeName="opacity" values=".3;1;.3" dur="2s" begin=".5s" repeatCount="indefinite"/></circle>
                    <circle cx="320" cy="20" r="3" fill="#48A882" opacity=".5"><animate attributeName="opacity" values=".2;1;.2" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
                    <polyline points="60,20 70,10 90,30 100,20" fill="none" stroke="#48A882" strokeWidth="1.5" opacity=".4"/>
                    <polyline points="180,20 190,10 210,30 220,20" fill="none" stroke="#48A882" strokeWidth="1.5" opacity=".4"/>
                    <polyline points="300,20 310,10 330,30 340,20" fill="none" stroke="#48A882" strokeWidth="1.5" opacity=".4"/>
                  </svg>
                </div>
              </div>

              {/* Three pillars */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:"#1A3D1E"}}>

                {/* TraceOps - Centro */}
                <div style={{background:"linear-gradient(180deg,#0D2B10,#132E16)",padding:"18px 16px",textAlign:"center"}}>
                  <div style={{width:40,height:40,borderRadius:12,background:"rgba(72,168,130,.15)",border:"1.5px solid rgba(72,168,130,.3)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",color:"#48A882",fontSize:16,fontWeight:800}}>O</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#48A882",marginBottom:3}}>TraceOps</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:12,lineHeight:1.4}}>Deteccion de incidentes</div>
                  <div style={{fontSize:32,fontWeight:800,color:"#fff",lineHeight:1,marginBottom:4}}>{ev.length}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.35)"}}>incidentes extraidos</div>
                  <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:6}}>
                    <span style={{fontSize:8,background:"rgba(192,57,43,.2)",color:"#E74C3C",borderRadius:4,padding:"2px 7px",fontWeight:600}}>{crit.length} crit</span>
                    <span style={{fontSize:8,background:"rgba(72,168,130,.15)",color:"#48A882",borderRadius:4,padding:"2px 7px",fontWeight:600}}>{cerr.length} cerr</span>
                  </div>
                </div>

                {/* LessonTrace - Memoria */}
                <div style={{background:"linear-gradient(180deg,#1A1508,#1E1A0C)",padding:"18px 16px",textAlign:"center"}}>
                  <div style={{width:40,height:40,borderRadius:12,background:"rgba(184,120,32,.12)",border:"1.5px solid rgba(184,120,32,.25)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",color:"#D4960A",fontSize:16,fontWeight:800}}>L</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#D4960A",marginBottom:3}}>LessonTrace</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:12,lineHeight:1.4}}>Memoria organizacional</div>
                  {(function(){
                    var withLesson = rccaList.filter(function(r){ return r.leccion_aprendida && r.leccion_aprendida.trim().length > 5; });
                    var withCausa = rccaList.filter(function(r){ return r.causa_raiz && r.causa_raiz.trim().length > 5; });
                    return (
                      <div>
                        <div style={{fontSize:32,fontWeight:800,color:"#fff",lineHeight:1,marginBottom:4}}>{withLesson.length}</div>
                        <div style={{fontSize:9,color:"rgba(255,255,255,.35)"}}>lecciones registradas</div>
                        <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:6}}>
                          <span style={{fontSize:8,background:"rgba(184,120,32,.15)",color:"#D4960A",borderRadius:4,padding:"2px 7px",fontWeight:600}}>{withCausa.length} causas raiz</span>
                          <span style={{fontSize:8,background:"rgba(107,45,168,.15)",color:"#9B59B6",borderRadius:4,padding:"2px 7px",fontWeight:600}}>{rccaList.length} RCCA</span>
                        </div>
                      </div>
                    );
                  })()}
                </div>

                {/* Yokoten - Compartir */}
                <div style={{background:"linear-gradient(180deg,#0C1020,#101428)",padding:"18px 16px",textAlign:"center"}}>
                  <div style={{width:40,height:40,borderRadius:12,background:"rgba(41,82,163,.12)",border:"1.5px solid rgba(41,82,163,.25)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",color:"#5B9BD5",fontSize:16,fontWeight:800}}>Y</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#5B9BD5",marginBottom:3}}>Yokoten</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:12,lineHeight:1.4}}>Compartir conocimiento</div>
                  {(function(){
                    var yokoCount = 0;
                    var yokoItems = [];
                    rccaList.forEach(function(r){
                      if (!r.accion_correctiva || r.accion_correctiva.trim().length < 10) return;
                      var otherEvents = ev.filter(function(e){
                        var linked = r.event_ids && r.event_ids.indexOf(e.id) >= 0;
                        if (linked) return false;
                        var sameModel = r.modelo && e.modelo && r.modelo.toLowerCase() === e.modelo.toLowerCase();
                        var sameDef = r.problema && e.defecto_smt && e.defecto_smt !== "N/A" && r.problema.toLowerCase().indexOf(e.defecto_smt.toLowerCase()) >= 0;
                        var sameType = r.patron_detectado && e.tipo_evento && r.patron_detectado.toLowerCase().indexOf(e.tipo_evento.toLowerCase()) >= 0;
                        return sameModel || sameDef || sameType;
                      });
                      if (otherEvents.length > 0) {
                        yokoCount += otherEvents.length;
                        yokoItems.push({rcca:r, targets:otherEvents.length});
                      }
                    });
                    return (
                      <div>
                        <div style={{fontSize:32,fontWeight:800,color:"#fff",lineHeight:1,marginBottom:4}}>{yokoCount}</div>
                        <div style={{fontSize:9,color:"rgba(255,255,255,.35)"}}>oportunidades detectadas</div>
                        <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:6}}>
                          <span style={{fontSize:8,background:"rgba(91,155,213,.15)",color:"#5B9BD5",borderRadius:4,padding:"2px 7px",fontWeight:600}}>{yokoItems.length} soluciones replicables</span>
                        </div>
                      </div>
                    );
                  })()}
                </div>

              </div>

              {/* LessonTrace detail - Lecciones aprendidas */}
              {rccaList.length > 0 && (function(){
                var lessons = rccaList.filter(function(r){ return r.leccion_aprendida && r.leccion_aprendida.trim().length > 5; });
                if (lessons.length === 0) return null;
                return (
                  <div style={{borderTop:"1px solid #2A5A30",padding:"16px 20px",background:"rgba(30,26,12,.6)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                      <div style={{width:6,height:6,borderRadius:50,background:"#D4960A"}}/>
                      <span style={{fontSize:10.5,fontWeight:700,color:"#D4960A",letterSpacing:".06em",textTransform:"uppercase"}}>LessonTrace — Memoria Organizacional</span>
                      <span style={{fontSize:9,color:"rgba(255,255,255,.3)",marginLeft:"auto"}}>{lessons.length} leccion{lessons.length!==1?"es":""}</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {lessons.slice(0,5).map(function(r){
                        return (
                          <div key={r.rcca_id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(184,120,32,.15)",borderRadius:10,padding:"10px 14px"}}>
                            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:6}}>
                              <div>
                                <span style={{fontSize:9,fontFamily:"monospace",fontWeight:700,color:"#D4960A"}}>{r.rcca_id}</span>
                                {r.modelo && <span style={{fontSize:8.5,color:"rgba(255,255,255,.3)",marginLeft:8}}>{r.modelo}</span>}
                                {r.linea && <span style={{fontSize:8.5,color:"rgba(255,255,255,.3)",marginLeft:6}}>{r.linea}</span>}
                              </div>
                            </div>
                            <div style={{fontSize:11,color:"rgba(255,255,255,.75)",lineHeight:1.45,marginBottom:6}}>{r.leccion_aprendida.slice(0,120)}{r.leccion_aprendida.length>120?"...":""}</div>
                            {r.causa_raiz && <div style={{fontSize:9.5,color:"rgba(255,255,255,.35)",borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:5}}>Causa raiz: {r.causa_raiz.slice(0,80)}{r.causa_raiz.length>80?"...":""}</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* Yokoten detail - Soluciones replicables */}
              {rccaList.length > 0 && ev.length > 0 && (function(){
                var yokoItems = [];
                rccaList.forEach(function(r){
                  if (!r.accion_correctiva || r.accion_correctiva.trim().length < 10) return;
                  var targets = ev.filter(function(e){
                    var linked = r.event_ids && r.event_ids.indexOf(e.id) >= 0;
                    if (linked) return false;
                    var sameModel = r.modelo && e.modelo && e.modelo !== "N/D" && r.modelo.toLowerCase() === e.modelo.toLowerCase();
                    var sameDef = r.problema && e.defecto_smt && e.defecto_smt !== "N/A" && r.problema.toLowerCase().indexOf(e.defecto_smt.toLowerCase()) >= 0;
                    var sameType = r.patron_detectado && e.tipo_evento && r.patron_detectado.toLowerCase().indexOf(e.tipo_evento.toLowerCase()) >= 0;
                    return sameModel || sameDef || sameType;
                  });
                  if (targets.length > 0) yokoItems.push({rcca:r, targets:targets});
                });
                if (yokoItems.length === 0) return null;
                return (
                  <div style={{borderTop:"1px solid #2A5A30",padding:"16px 20px",background:"rgba(12,16,32,.6)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                      <div style={{width:6,height:6,borderRadius:50,background:"#5B9BD5"}}/>
                      <span style={{fontSize:10.5,fontWeight:700,color:"#5B9BD5",letterSpacing:".06em",textTransform:"uppercase"}}>Yokoten — Compartir Conocimiento</span>
                      <span style={{fontSize:9,color:"rgba(255,255,255,.3)",marginLeft:"auto"}}>{yokoItems.length} solucion{yokoItems.length!==1?"es":""} replicable{yokoItems.length!==1?"s":""}</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {yokoItems.slice(0,4).map(function(y){
                        return (
                          <div key={y.rcca.rcca_id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(91,155,213,.15)",borderRadius:10,padding:"10px 14px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                              <span style={{fontSize:9,fontFamily:"monospace",fontWeight:700,color:"#5B9BD5"}}>{y.rcca.rcca_id}</span>
                              <span style={{fontSize:8.5,background:"rgba(91,155,213,.12)",color:"#5B9BD5",borderRadius:4,padding:"1px 7px",fontWeight:600}}>Solucion probada</span>
                              <span style={{fontSize:8.5,color:"rgba(255,255,255,.3)",marginLeft:"auto"}}>{y.targets.length} evento{y.targets.length!==1?"s":""} aplicable{y.targets.length!==1?"s":""}</span>
                            </div>
                            <div style={{fontSize:10.5,color:"rgba(255,255,255,.7)",lineHeight:1.4,marginBottom:8}}>{y.rcca.accion_correctiva.slice(0,100)}{y.rcca.accion_correctiva.length>100?"...":""}</div>
                            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                              <span style={{fontSize:8,color:"rgba(255,255,255,.25)",marginRight:4}}>Aplicar a:</span>
                              {y.targets.slice(0,4).map(function(e){
                                return <span key={e.id} style={{fontSize:8,fontFamily:"monospace",background:"rgba(91,155,213,.1)",color:"#5B9BD5",borderRadius:3,padding:"1px 6px"}}>{e.id}</span>;
                              })}
                              {y.targets.length > 4 && <span style={{fontSize:8,color:"rgba(255,255,255,.25)"}}>+{y.targets.length-4} mas</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* Footer - Tagline */}
              <div style={{borderTop:"1px solid #2A5A30",padding:"12px 20px",textAlign:"center",background:"rgba(0,0,0,.2)"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.25)",letterSpacing:".1em"}}>De Experiencia a Memoria Organizacional</div>
              </div>

            </div>
          )}

          <div className="foot">
            <p><strong>TraceOps</strong> by SMTintel - ALDA - {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"8px 16px",fontSize:12}} onClick={download}>Descargar Excel</button>
          </div>
        </div>
      )}
      </div>{/* end main-content */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.addEventListener('unhandledrejection', function(e) {
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:60px;left:0;right:0;background:#8E44AD;color:#fff;padding:16px;font-family:monospace;font-size:13px;z-index:99999;word-break:break-all';
  box.innerHTML = '<strong>UNHANDLED REJECTION</strong><br>' + (e.reason ? e.reason.toString() : 'unknown');
  document.body.appendChild(box);
});
</script></body>

</html>
