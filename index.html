<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OpsTrace Consistency Lab</title>

<style>

body{
font-family: system-ui;
background:#0f172a;
color:white;
margin:40px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

button{
padding:12px 18px;
border-radius:10px;
border:none;
background:#22c55e;
color:black;
font-weight:600;
cursor:pointer;
}

pre{
background:#020617;
padding:20px;
border-radius:12px;
overflow:auto;
}

.card{
background:#020617;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.metric{
font-size:22px;
font-weight:700;
}

</style>

</head>

<body>

<h1>OpsTrace Consistency Lab</h1>

<div class="card">

<button onclick="runPipeline()">Run Pipeline</button>

<p class="metric" id="consistency"></p>
<p class="metric" id="tokens"></p>
<p class="metric" id="cost"></p>

</div>

<div class="card">
<h3>Detected Events</h3>
<pre id="events"></pre>
</div>

<script>

// =============================
// SAMPLE CHAT
// =============================

const SAMPLE_CHAT = [

{time:new Date("2026-03-10T10:00"), text:"AOI detecta wrong orientation en BB4"},
{time:new Date("2026-03-10T10:03"), text:"3 tablillas afectadas"},
{time:new Date("2026-03-10T10:10"), text:"linea detenida BB4"},
{time:new Date("2026-03-10T10:15"), text:"aplicando contencion"},
{time:new Date("2026-03-10T11:40"), text:"material incorrecto detectado en feeder 12"},
{time:new Date("2026-03-10T11:45"), text:"cambio de reel realizado"}

]

// =============================
// NOISE FILTER
// =============================

function noiseFilter(messages){

return messages.filter(m=>m.text.length>8)

}

// =============================
// SEMANTIC NORMALIZER
// =============================

const SEMANTIC_MAP = {

wrong_orientation:[
/wrong orientation/i,
/polaridad invertida/i,
/orientation error/i
],

wrong_component:[
/wrong component/i,
/material incorrecto/i,
/incorrect component/i
],

line_stop:[
/linea detenida/i,
/line stop/i,
/line down/i
],

feeder_issue:[
/feeder/i,
/alimentador/i
]

}

function semanticKey(text){

for(const key in SEMANTIC_MAP){

for(const pattern of SEMANTIC_MAP[key]){

if(pattern.test(text)){
return key
}

}

}

return "unknown"

}

// =============================
// LINE EXTRACTOR
// =============================

function extractLine(text){

const match = text.match(/BB\d+/i)

if(match) return match[0]

return "unknown"

}

// =============================
// CANDIDATE DETECTOR
// =============================

function candidateDetector(messages){

const events=[]

messages.forEach(msg=>{

const key = semanticKey(msg.text)

if(key!=="unknown"){

events.push({

time:msg.time,
line:extractLine(msg.text),
issue_key:key,
raw:msg.text

})

}

})

return events

}

// =============================
// HYBRID CLUSTERING
// =============================

function clusterIncidents(events){

const clusters=[]
const WINDOW = 90*60*1000

events.forEach(event=>{

let assigned=false

for(const cluster of clusters){

const last = cluster[cluster.length-1]

const timeDiff = Math.abs(event.time-last.time)
const sameIssue = event.issue_key===last.issue_key
const sameLine = event.line===last.line

if(timeDiff<WINDOW && (sameIssue || sameLine)){

cluster.push(event)
assigned=true
break

}

}

if(!assigned){
clusters.push([event])
}

})

return clusters

}

// =============================
// SCHEMA LOCK
// =============================

const REQUIRED_KEYS = [

"schema_version",
"event_id",
"timestamp_from",
"timestamp_to",
"type",
"line",
"station",
"issue",
"issue_key",
"action",
"status",
"responsible",
"source_refs"

]

function enforceSchema(event){

return REQUIRED_KEYS.reduce((acc,key)=>{

acc[key]=event[key]
return acc

},{})

}

// =============================
// INCIDENT BUILDER
// =============================

function generateEventID(){

return "EVT-"+Math.random().toString(36).slice(2,8)

}

function incidentFingerprint(event){

return [

event.type,
event.line,
event.issue_key

].join("|")

}

function stableEventFromCluster(cluster){

const first = cluster[0]
const last = cluster[cluster.length-1]

let event = {

schema_version:"1.0",
event_id:generateEventID(),
timestamp_from:first.time,
timestamp_to:last.time,
type:"manufacturing_incident",
line:first.line,
station:"unknown",
issue:first.raw,
issue_key:first.issue_key,
action:"pending",
status:"open",
responsible:"unassigned",
source_refs:cluster.map(e=>e.raw)

}

event.fingerprint = incidentFingerprint(event)

return enforceSchema(event)

}

// =============================
// DEDUPE
// =============================

function dedupeEvents(events){

const seen=new Set()
const clean=[]

for(const ev of events){

const fp = ev.line+"|"+ev.issue_key

if(!seen.has(fp)){

seen.add(fp)
clean.push(ev)

}

}

return clean

}

// =============================
// TOKEN ESTIMATOR
// =============================

function estimateTokens(text){

return Math.ceil(text.length/3.7)

}

function estimateCost(tokens){

const price = 0.15/1000000

return tokens*price

}

// =============================
// CONSISTENCY SCORE
// =============================

function consistencyScore(events){

if(events.length===0) return 0

let score = 100

events.forEach(ev=>{

if(!ev.line) score-=5
if(!ev.issue_key) score-=5

})

return score

}

// =============================
// PIPELINE
// =============================

function runPipeline(){

let messages = noiseFilter(SAMPLE_CHAT)

let candidates = candidateDetector(messages)

let clusters = clusterIncidents(candidates)

let events = clusters.map(stableEventFromCluster)

events = dedupeEvents(events)

document.getElementById("events").textContent =
JSON.stringify(events,null,2)

const text = JSON.stringify(events)

const tokens = estimateTokens(text)

const cost = estimateCost(tokens)

document.getElementById("tokens").textContent =
"Estimated tokens: "+tokens

document.getElementById("cost").textContent =
"Estimated API cost: $"+cost.toFixed(6)

document.getElementById("consistency").textContent =
"Consistency score: "+consistencyScore(events)+"%"

}

</script>

</body>
</html>
