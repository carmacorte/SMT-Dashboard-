<script>
window.onerror = function(msg, src, line, col, err) {
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#C0392B;color:#fff;padding:16px;font-family:monospace;font-size:13px;z-index:99999;word-break:break-all';
  box.innerHTML = '<strong>ERROR</strong><br>' + msg + '<br>Line: ' + line + ' Col: ' + col + '<br>' + (err ? err.toString() : '');
  document.body.appendChild(box);
  return false;
};
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F1EE;
  --w:#FFFFFF;
  --g50:#F8F7F5;--g100:#EEECEA;--g200:#DDDBD7;--g300:#B8B4AE;
  --g500:#8A8580;--g700:#3D3A36;--g900:#1A1714;
  --green:#1E5C48;--green2:#2A7A60;--green3:#48A882;
  --lime:#6B8C3A;--limeL:#EAF0DC;
  --re:#C0392B;--reL:#FDF0EE;
  --bl:#2952A3;--blL:#EBF0FC;
  --gr:#1A7A3C;--grL:#EBF8EE;
  --ye:#B87820;--yeL:#FBF5E6;
  --pu:#6B2DA8;--puL:#F2ECFB;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --shadow:0 2px 6px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08),0 16px 40px rgba(0,0,0,.07);
  --radius:14px;
  --radius-sm:8px;
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#F4F3F0;color:var(--g900);min-height:100vh;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em
}
#root{max-width:820px;margin:0 auto;padding:32px 20px 80px}

/* -- HEADER -- */
.hdr{
background:var(--green);
border-radius:20px;padding:28px 32px;margin-bottom:20px;
display:flex;align-items:center;gap:22px;
position:relative;overflow:hidden;
box-shadow:0 4px 20px rgba(30,92,72,.25)
}
.hdr::before{
content:'';position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);
pointer-events:none
}
.hdr::after{
content:'';position:absolute;right:-40px;top:-40px;
width:200px;height:200px;border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%)
}
.hdr-logo{flex-shrink:0;position:relative;z-index:1}
.hdr-info{position:relative;z-index:1}
.hdr-badge{
display:inline-flex;align-items:center;
background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
color:rgba(255,255,255,.85);font-size:8.5px;font-weight:700;
letter-spacing:.14em;text-transform:uppercase;
padding:3px 10px;border-radius:99px;margin-bottom:8px
}
.hdr-info h1{font-size:15px;font-weight:500;color:rgba(255,255,255,.95);margin-bottom:3px}
.hdr-info h2{font-size:11px;color:rgba(255,255,255,.45);font-weight:400}

/* -- API BAR -- */
.api-bar{
background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);
padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
box-shadow:var(--shadow-sm)
}
.api-bar label{font-size:12px;font-weight:600;color:var(--g700);white-space:nowrap}
.api-input{
flex:1;min-width:180px;border:1.5px solid var(--g200);border-radius:var(--radius-sm);
padding:8px 12px;font-size:12px;color:var(--g900);font-family:'Courier New',monospace;
background:var(--g50);outline:none;transition:border-color .15s,box-shadow .15s
}
.api-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,92,72,.1)}
.api-note{font-size:10px;color:var(--g500);width:100%;margin-top:3px}
.api-note a{color:var(--green2);text-decoration:none;font-weight:500}

/* -- UPLOAD -- */
.up{
background:var(--w);border:2px dashed var(--g200);border-radius:var(--radius);
margin-bottom:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)
}
.up:hover,.up.drag{border-color:var(--green3);background:#F0F8F5}
.up-body{padding:40px 24px;text-align:center}
.up-icon{
width:56px;height:56px;background:#EAF5F0;border:1.5px solid #B8DECE;
border-radius:16px;display:flex;align-items:center;justify-content:center;
margin:0 auto 16px;color:var(--green2)
}
.up h3{font-size:19px;font-weight:700;margin-bottom:6px;color:var(--g900)}
.up p{font-size:13px;color:var(--g500);margin-bottom:16px}
.chip{
display:inline-block;background:var(--g100);border:1px solid var(--g200);
border-radius:99px;padding:3px 12px;font-size:10px;color:var(--g700);font-weight:500;margin:3px
}
.up-btn{
display:inline-flex;align-items:center;gap:8px;background:var(--green);
color:#fff;border:none;border-radius:10px;padding:12px 26px;font-size:13.5px;
font-weight:600;cursor:pointer;margin-top:14px;letter-spacing:-.01em;
box-shadow:0 2px 10px rgba(30,92,72,.3);transition:all .2s
}
.up-btn:hover{background:var(--green2);box-shadow:0 4px 14px rgba(30,92,72,.35);transform:translateY(-1px)}
.filter-bar{
background:var(--g50);border-top:1px solid var(--g100);
padding:13px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.filter-bar label{font-size:12px;font-weight:600;color:var(--g700)}
.day-btns{display:flex;gap:5px;flex-wrap:wrap}
.day-btn{
border:1.5px solid var(--g200);background:var(--w);border-radius:99px;
padding:5px 14px;font-size:12px;font-weight:500;color:var(--g500);cursor:pointer;transition:all .15s
}
.day-btn:hover{border-color:var(--green);color:var(--green)}
.day-btn.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}

/* -- PROGRESS -- */
.prog{
background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);
padding:36px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow-sm)
}
.prog h3{font-size:18px;font-weight:700;margin-bottom:5px;color:var(--g900)}
.prog p{font-size:12.5px;color:var(--g500);margin-bottom:22px}
.pbar{background:var(--g100);border-radius:99px;height:6px;overflow:hidden;margin-bottom:18px}
.pfill{height:6px;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green3));transition:width .5s ease}
.psteps{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.pstep{font-size:10px;color:var(--g300);font-weight:500;text-align:center;flex:1}
.pstep.on{color:var(--green);font-weight:700}
.pstep.ok{color:var(--gr);font-weight:600}

/* -- TABLE CARDS -- */
.tcard{
background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);
overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)
}
.tcard-hdr{
padding:14px 20px;border-bottom:1px solid var(--g100);
display:flex;align-items:center;justify-content:space-between;background:var(--g50)
}
.tcard-hdr h3{font-size:13.5px;font-weight:700;color:var(--g900)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{
background:var(--g50);padding:9px 14px;text-align:left;
font-weight:600;color:var(--g500);font-size:10px;
text-transform:uppercase;letter-spacing:.05em;
border-bottom:1.5px solid var(--g200);white-space:nowrap
}
td{padding:10px 14px;border-bottom:1px solid var(--g100);color:var(--g700);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--g50)}

/* -- BADGES -- */
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:.01em}
.bc{background:#FCE8E6;color:#922B21}.ba{background:#FEF6E0;color:#8A5C10}
.bm{background:#EBF0FC;color:#1E3C82}.bb{background:#EBF8EE;color:#145A28}
.bo{background:#FEF6E0;color:#8A5C10;border:1px solid #F5DFA0}
.be{background:#EBF0FC;color:#2040A0;border:1px solid #BDD0F8}
.bce{background:#EBF8EE;color:#145A28;border:1px solid #A0DEB4}
.bt{background:#F2ECFB;color:#521DA8;border:1px solid #C8A8F0}

/* -- PENDING ITEMS -- */
.plist{display:flex;flex-direction:column;gap:8px;padding:14px}
.pitem{
background:var(--g50);border:1px solid var(--g200);
border-left:3px solid var(--green2);border-radius:0 10px 10px 0;
padding:11px 14px;transition:all .15s
}
.pitem:hover{background:var(--w);box-shadow:var(--shadow-sm);transform:translateX(2px)}
.pitem.cr{border-left-color:var(--re)}.pitem.al{border-left-color:var(--ye)}
.pitem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.pitem-id{font-size:9.5px;font-weight:700;color:var(--g400,var(--g300));letter-spacing:.04em}
.pitem h4{font-size:12.5px;font-weight:700;color:var(--g900);margin-bottom:3px;line-height:1.3}
.pitem p{font-size:11px;color:var(--g500);line-height:1.45}
.pmeta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ptag{font-size:9.5px;background:var(--w);border:1px solid var(--g200);border-radius:99px;padding:2px 8px;color:var(--g700);font-weight:500}

/* -- KPI -- */
.krow{
display:flex;align-items:center;gap:12px;
background:linear-gradient(90deg,#EAF5F0,var(--w));
border:1px solid #C0DECE;border-radius:10px;padding:11px 15px;margin-bottom:7px
}
.kval{font-size:22px;font-weight:800;color:var(--green);width:72px;flex-shrink:0;line-height:1}
.kin{flex:1}
.kin .nm{font-size:12px;font-weight:600;color:var(--g900)}
.kin .ts{font-size:10px;color:var(--g500);margin-top:1px}
.kbar{width:80px;height:5px;background:var(--g200);border-radius:99px;flex-shrink:0}
.kbf{height:5px;border-radius:99px;background:var(--green)}

/* -- PERSONA FILTER -- */
.pf-card{background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.pf-hdr{padding:14px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--g50)}
.pf-hdr h3{font-size:13.5px;font-weight:700;flex:1;color:var(--g900)}
.pf-select{border:1.5px solid var(--g200);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--g900);background:var(--w);outline:none;cursor:pointer;min-width:180px;transition:border-color .15s}
.pf-select:focus{border-color:var(--green)}
.pf-clear{background:var(--g100);border:1px solid var(--g200);border-radius:var(--radius-sm);padding:6px 13px;font-size:11.5px;color:var(--g700);cursor:pointer;font-weight:500}
.pf-body{padding:18px 20px}
.pf-profile{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
.pf-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--green2),var(--green));display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(30,92,72,.25)}
.pf-info{flex:1}
.pf-name{font-size:16px;font-weight:800;color:var(--g900);margin-bottom:3px}
.pf-dept{font-size:11.5px;color:var(--g500);margin-bottom:8px}
.pf-stats{display:flex;gap:8px;flex-wrap:wrap}
.pf-stat{background:var(--g50);border:1.5px solid var(--g200);border-radius:10px;padding:9px 14px;text-align:center;min-width:66px}
.pf-stat-val{font-size:22px;font-weight:800;color:var(--green);line-height:1}
.pf-stat-lbl{font-size:9.5px;color:var(--g500);margin-top:2px;font-weight:500}
.pf-stat.bl .pf-stat-val{color:var(--bl)}.pf-stat.gr .pf-stat-val{color:var(--gr)}.pf-stat.re .pf-stat-val{color:var(--re)}
.pf-section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:8px;margin-top:6px}
.pf-empty{font-size:13px;color:var(--g300);text-align:center;padding:28px 0}

/* -- BEFORE/AFTER -- */
.cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.cmpc{padding:22px 24px;background:var(--w)}
.cmpc.aft{background:var(--g50);border-left:1px solid var(--g200)}
.cmplbl{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.cmpdot{width:8px;height:8px;border-radius:50%;background:var(--re)}.cmpdot.g{background:var(--gr)}
.cmplbl span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500)}
.cmrow{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.cmic{width:20px;height:20px;border-radius:5px;background:var(--reL);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--re);font-size:10px;font-weight:700}
.cmic.g{background:var(--grL);color:var(--gr)}
.cmrow p{font-size:12px;color:var(--g700);line-height:1.4;padding-top:1px}

/* -- MISC -- */
.resetbtn{display:inline-flex;align-items:center;gap:5px;background:var(--g100);border:1.5px solid var(--g200);border-radius:var(--radius-sm);padding:7px 14px;font-size:11.5px;font-weight:500;color:var(--g700);cursor:pointer;margin-bottom:16px;transition:all .15s}
.resetbtn:hover{background:var(--g200)}
.errc{background:var(--reL);border:1.5px solid #F0C4BE;border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;color:var(--re);font-size:12.5px}
.foot{background:var(--w);border:1px solid var(--g200);border-radius:var(--radius);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;box-shadow:var(--shadow-sm)}
.foot p{font-size:11px;color:var(--g500)}
.foot strong{color:var(--g900)}

/* -- EVIDENCIAS -- */
.ev-gallery{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ev-thumb{
width:48px;height:48px;border-radius:7px;object-fit:cover;
border:1.5px solid var(--g200);cursor:pointer;
transition:all .15s;flex-shrink:0
}
.ev-thumb:hover{transform:scale(1.08);border-color:var(--green);box-shadow:0 2px 8px rgba(30,92,72,.2)}
.ev-add-btn{
width:48px;height:48px;border-radius:7px;
border:1.5px dashed var(--g300);background:var(--g50);
display:flex;align-items:center;justify-content:center;
cursor:pointer;color:var(--g500);font-size:18px;flex-shrink:0;
transition:all .15s
}
.ev-add-btn:hover{border-color:var(--green);color:var(--green);background:var(--grL)}
.ev-count{
font-size:9px;font-weight:700;color:var(--green);
background:#EAF5F0;border:1px solid #B8DECE;
border-radius:99px;padding:1px 7px;margin-left:4px;vertical-align:middle
}

/* -- LIGHTBOX -- */
.lb-overlay{
position:fixed;inset:0;background:rgba(0,0,0,.85);
z-index:9999;display:flex;align-items:center;justify-content:center;
padding:20px
}
.lb-box{
background:#fff;border-radius:16px;overflow:hidden;
max-width:90vw;max-height:90vh;
display:flex;flex-direction:column;
box-shadow:0 24px 80px rgba(0,0,0,.4)
}
.lb-hdr{
padding:12px 16px;background:var(--g50);border-bottom:1px solid var(--g200);
display:flex;align-items:center;justify-content:space-between;gap:10px
}
.lb-hdr span{font-size:12px;font-weight:600;color:var(--g700);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-close{
width:28px;height:28px;border-radius:50%;background:var(--g100);border:none;
cursor:pointer;font-size:14px;color:var(--g700);display:flex;align-items:center;justify-content:center;
flex-shrink:0
}
.lb-img-wrap{overflow:auto;display:flex;align-items:center;justify-content:center;padding:12px}
.lb-img-wrap img{max-width:80vw;max-height:70vh;border-radius:8px;display:block}

/* -- IMG PICKER PANEL -- */
.img-panel{
background:var(--g50);border:1px solid var(--g200);border-radius:10px;
padding:12px;margin-top:8px
}
.img-panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:8px}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
.img-pick-item{position:relative;cursor:pointer;border-radius:7px;overflow:hidden;aspect-ratio:1}
.img-pick-item img{width:100%;height:100%;object-fit:cover;display:block}
.img-pick-item.selected::after{
content:"";position:absolute;inset:0;
background:rgba(30,92,72,.4);border:2px solid var(--green);border-radius:7px
}
.img-pick-item.selected::before{
content:"v";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
color:#fff;font-size:18px;font-weight:700;z-index:1
}

/* -- INVESTIGATION CAROUSEL -- */
.ic-wrap{position:relative;width:100%;padding:20px 0 16px;background:#F4F3F0;border-radius:14px;margin-bottom:14px;border:1px solid #DDDBD7;overflow:hidden}
.ic-stage{position:relative;display:flex;align-items:center;justify-content:center;min-height:380px;padding:0 8px}
.ic-card{position:absolute;background:#fff;border-radius:16px;border:1px solid #DDDBD7;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.ic-card.active{
position:relative;width:calc(100% - 80px);max-width:480px;
box-shadow:0 12px 40px rgba(0,0,0,.18);border-color:#2A7A60;
z-index:3;cursor:default;transform:translateX(0) scale(1)
}
.ic-card.prev{
width:calc(100% - 120px);max-width:380px;
transform:translateX(-65%) scale(.82) rotateY(8deg);
opacity:.6;z-index:2;filter:brightness(.85);
box-shadow:0 4px 16px rgba(0,0,0,.12)
}
.ic-card.next{
width:calc(100% - 120px);max-width:380px;
transform:translateX(65%) scale(.82) rotateY(-8deg);
opacity:.6;z-index:2;filter:brightness(.85);
box-shadow:0 4px 16px rgba(0,0,0,.12)
}
.ic-card.far-prev{transform:translateX(-90%) scale(.65) rotateY(12deg);opacity:.3;z-index:1}
.ic-card.far-next{transform:translateX(90%) scale(.65) rotateY(-12deg);opacity:.3;z-index:1}
.ic-card-head{padding:14px 16px 10px;border-bottom:1px solid #EEECEA;display:flex;align-items:flex-start;gap:10px}
.ic-tabs{display:flex;overflow-x:auto;border-bottom:1px solid #EEECEA;background:#F8F7F5;scrollbar-width:none}
.ic-tabs::-webkit-scrollbar{display:none}
.ic-tab{flex-shrink:0;padding:8px 13px;font-size:9.5px;font-weight:600;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#8A8580;transition:all .15s;white-space:nowrap}
.ic-tab.on{border-bottom-color:#1E5C48;color:#1E5C48;background:#fff}
.ic-body{padding:14px 16px;min-height:160px;overflow-y:auto;max-height:300px}
.ic-field{margin-bottom:10px}
.ic-field-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A8580;margin-bottom:3px}
.ic-field-val{font-size:11.5px;color:#1A1714;line-height:1.45}
.ic-field-val.empty{color:#C8C4BE;font-style:italic}
.ic-badge{display:inline-block;font-size:9px;font-weight:600;border-radius:4px;padding:2px 7px;margin:2px 3px 2px 0}
.ic-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 0 4px;position:relative;z-index:10}

<script>

function parseTurno(h, min, dateIso) {
  var m = parseInt(min) || 0;
  var dow = 1; // default Mon
  if (dateIso) {
    var parts = dateIso.split("-");
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    dow = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
  }

  if (dow === 6) {
    if (h >= 0 && h < 9) return "3T";      // 3T del viernes termina 09:00 sábado
    if (h >= 9 && h < 18) return "1T-Sab";
    return "2T-Sab";
  }

  if (dow === 0) {
    if (h >= 6 && h < 18) return "1T-Dom";
    return "2T-Dom";
  }

  // Lun–Vie: mismo patrón, el 3T es la madrugada del día actual
  if (h >= 0 && h < 6) return "3T";
  if (h < 15 || (h === 15 && m < 15)) return "1T";
  return "2T";
}

function parseWhatsApp(txt) {
  var lines = txt.split(/\r?\n/);
  var msgs = [];
  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
  var cur = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].replace(/[\u200e\u200f\u202a\u202b\u202c\u202d\u202e\u202f]/g, "").trim();
    var m = line.match(reA) || line.match(reB);
    if (m) {
      if (cur) msgs.push(cur);
      var d, mo, yr, h2, min, sec, mer, sender, text;
      if (line.match(reA)) {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec=m[6]||"00"; mer=m[7]||""; sender=m[8]; text=m[9];
      } else {
        d=m[1]; mo=m[2]; yr=m[3]; h2=m[4]; min=m[5]; sec="00"; mer=""; sender=m[6]; text=m[7];
      }
      var year = parseInt(yr);
      if (year < 100) year += 2000;
      var t = to24h(h2, min, sec, mer);
      var dateIso = year + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      cur = {
        dateIso: dateIso,
        dateDisp: String(d).padStart(2,"0") + "/" + String(mo).padStart(2,"0") + "/" + year,
        timeStr: t.timeStr,
        hour: t.hour,
        turno: parseTurno(t.hour, min, dateIso),
        sender: sender.replace(/^~/,"").trim(),
        text: text.trim()
      };
    } else if (cur && line && !line.startsWith("[")) {
      cur.text += " " + line;
    }
  }
  if (cur) msgs.push(cur);
  return msgs;
}

function filterByDays(msgs, days) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });
  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function getISOWeek(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getWeekRange(weekN, year) {
  var jan4 = new Date(Date.UTC(year, 0, 4));
  var day = jan4.getUTCDay() || 7;
  var monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - day + 1 + (weekN - 1) * 7);
  var sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  return {
    from: monday.toISOString().slice(0,10),
    to: sunday.toISOString().slice(0,10)
  };
}

function filterMsgs(msgs, mode, days, dateFrom, dateTo, weekNum, weekYear) {
  if (!msgs.length) return msgs;
  var sorted = msgs.slice().sort(function(a,b){ return a.dateIso.localeCompare(b.dateIso); });

  if (mode === "range" && dateFrom && dateTo) {
    var f = dateFrom <= dateTo ? dateFrom : dateTo;
    var t = dateFrom <= dateTo ? dateTo : dateFrom;
    return sorted.filter(function(m){ return m.dateIso >= f && m.dateIso <= t; });
  }

  if (mode === "week" && weekNum && weekYear) {
    var wr = getWeekRange(parseInt(weekNum), parseInt(weekYear));
    return sorted.filter(function(m){ return m.dateIso >= wr.from && m.dateIso <= wr.to; });
  }

  var last = new Date(sorted[sorted.length-1].dateIso);
  var cutoff = new Date(last);
  cutoff.setDate(cutoff.getDate() - days + 1);
  var cutStr = cutoff.toISOString().slice(0,10);
  return sorted.filter(function(m){ return m.dateIso >= cutStr; });
}

function cleanMsgs(msgs) {
  var skip = /imagen omitida|sticker omitido|audio omitido|video omitido|gif omitido|documento omitido|cifrados de extremo|ahora es admin/i;
  var noise = /^(buenos d|buenas t|buen d|gracias|de nada|enterado|recibido|entendido)/i;
  return msgs.filter(function(m){
    return m.text && m.text.trim().length > 8 && !m.text.match(skip) && !m.text.trim().match(noise);
  });
}

var _zipRef = null;

var _imgCache = {};

async function readZip(file) {
  var zip = await JSZip.loadAsync(file);
  _zipRef = zip;
  _imgCache = {};

  var names = Object.keys(zip.files);
  var txt = null;
  var imgNames = [];  // only filenames - no base64 yet
  var imgMeta = {};

  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    if (name.startsWith("__MACOSX")) continue;
    var base = name.split("/").pop();
    if (!txt && base.endsWith(".txt")) {
      txt = await zip.files[name].async("string");
    }
    if (/\.(jpe?g|png|webp)$/i.test(base)) {
      imgNames.push(base);
    }
  }

  if (!txt) throw new Error("No se encontro .txt en el ZIP");

  var reA = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?\]\s*([^:]+?):\s*(.*)$/i;
  var reB = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}):(\d{2})\s*-\s*([^:]+?):\s*(.*)$/i;
  var lastMeta = null;
  txt.split(/\r?\n/).forEach(function(rawLine) {
    var line = rawLine.replace(/[\u200e\u200f\u202a-\u202f]/g,"").trim();
    var m = line.match(reA) || line.match(reB);
    if (m) {
      var isA = !!line.match(reA);
      var d=m[1],mo=m[2],yr=m[3],h2=m[4],min2=m[5];
      var mer=isA?(m[7]||""):"";
      var sender=isA?m[8]:m[6];
      var year=parseInt(yr); if(year<100) year+=2000;
      var hour=parseInt(h2);
      var mlow=(mer||"").toLowerCase().replace(/[\s.]/g,"");
      if(mlow.indexOf("p")===0 && hour!==12) hour+=12;
      if(mlow.indexOf("a")===0 && hour===12) hour=0;
      lastMeta={
        dateIso:year+"-"+String(mo).padStart(2,"0")+"-"+String(d).padStart(2,"0"),
        timeStr:String(hour).padStart(2,"0")+":"+min2,
        sender:(sender||"").replace(/^~/,"").trim()
      };
    }
    var adj = line.match(/<adjunto:\s*([^>]+\.(?:jpe?g|png|webp))\s*>/i);
    if (adj && lastMeta) {
      imgMeta[adj[1].trim()] = {
        dateIso:lastMeta.dateIso, timeStr:lastMeta.timeStr, sender:lastMeta.sender
      };
    }
  });

  return { txt:txt, imgNames:imgNames, imgMeta:imgMeta };
}

async function loadImg(fname) {
  if (_imgCache[fname]) return _imgCache[fname];
  if (!_zipRef) return null;
  var allNames = Object.keys(_zipRef.files);
  var match = allNames.find(function(n){ return n.split("/").pop() === fname; });
  if (!match) return null;
  try {
    var b64 = await _zipRef.files[match].async("base64");
    var ext = fname.split(".").pop().toLowerCase().replace("jpg","jpeg");
    var url = "data:image/"+ext+";base64,"+b64;
    _imgCache[fname] = url;
    return url;
  } catch(_) { return null; }
}

async function analyzeWithAI(msgs, apiKey) {
  var sample = msgs.slice(0,150).map(function(m){
    return "[" + m.dateDisp + " " + m.timeStr + "|" + m.turno + "|" + m.sender + "]:" + m.text;
  }).join("\n");

  var system = "Eres experto en manufactura SMT/PCB/PTH. " +
    "Analiza mensajes WhatsApp de manufactura y extrae SOLO eventos operativos accionables. " +
    "INCLUIR: paros linea, defectos calidad, falta material, FAI, LCR vencido, RMA, AOI/ICT, dano fisico. " +
    "EXCLUIR: saludos, ok, gracias, emojis solos. " +
    "Catalogo defecto_smt: Solder bridge|Missing component|Wrong component|Wrong orientation|Polarity inverted|" +
    "Misaligned component|BGA short|BGA open|Lifted pad|Feeder misload|Machine stop|Wrong reel|Missing material|" +
    "ICT open|ICT short|Functional test fail|N/A. " +
    "tipo_evento: Calidad|Proceso|Material|Sistema|Seguridad|Produccion. " +
    "actor_area: Produccion|Calidad|Proceso|Mantenimiento|Materiales|Ingenieria|PTH|SMT|AOI|ICT. " +
    "estado_historia: Detectado|Contenido|Corregido|Validado|Cerrado. " +
    "Para cada evento extrae: quien detecto, que accion se tomo, que actores participaron, cual es el estado real del ciclo de vida. " +
    "Maximo 15 eventos. Solo JSON sin texto extra:" +
    '{"eventos":[{"id":"EVT-001","fecha":"DD/MM/YYYY","hora":"HH:MM","turno":"1T|2T|3T",' +
    '"modelo":"N/P o N/D","linea_estacion":"L1 o N/D","reporta":"nombre",' +
    '"area_involucrada":"SMT|PTH|ICT|AOI|Calidad|Mantenimiento|Materiales|Produccion",' +
    '"tipo_evento":"Calidad|Proceso|Material|Sistema|Seguridad|Produccion",' +
    '"defecto_smt":"del catalogo o N/A","evento_detectado":"descripcion","impacto":"impacto",' +
    '"accion_requerida":"accion","accion_ejecutada":"accion tomada o vacia si no hay",' +
    '"responsable_sugerido":"responsable",' +
    '"actores":["area1","area2"],' +
    '"estado_historia":"Detectado|Contenido|Corregido|Validado|Cerrado",' +
    '"estatus":"Abierto|En proceso|Cerrado","prioridad":"Critica|Alta|Media|Baja",' +
    '"fuente_chat":"DD/MM/YY HH:MM nombre","notas":""}],' +
    '"kpis":[{"fechahora":"DD/MM/YYYY HH:MM","indicador":"nombre","valor":0.0,"unidad":"%","fuente":"nombre"}],' +
    '"resumen":{"periodo":"DD/MM/YYYY a DD/MM/YYYY","grupo":"nombre","total_eventos":0,' +
    '"alertas_criticas":["alerta"],"acciones_pendientes":["accion"],"estatus_lineas":["linea"]},' +
    '"directorio":[{"nombre":"nombre","departamento":"area","rol":"rol","mensajes":0,"eventos":0,"area_owner":"area"}]}';

  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 6000,
      system: system,
      messages: [
        { role: "user", content: "Analiza " + msgs.length + " mensajes. Solo JSON:\n\n" + sample },
        { role: "assistant", content: "{" }
      ]
    })
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    if (resp.status === 401) throw new Error("API Key invalida. Verifica en console.anthropic.com");
    if (resp.status === 429) throw new Error("Limite de uso alcanzado. Espera e intenta de nuevo.");
    throw new Error((err.error && err.error.message) || ("Error API " + resp.status));
  }

  var data = await resp.json();
  if (!data.content || !data.content.length) throw new Error("Respuesta vacia. Intenta de nuevo.");

  var raw = "{" + data.content.map(function(b){ return b.text || ""; }).join("");
  var clean = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  var s = clean.indexOf("{");
  var e = clean.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("JSON invalido. Reduce el rango de dias.");
  var jsonStr = clean.slice(s, e+1);

  try { return JSON.parse(jsonStr); } catch(_) {}

  var fixed = jsonStr
    .replace(/,\s*([}\]])/g, "$1");
  try { return JSON.parse(fixed); } catch(_) {}

  throw new Error("Error procesando respuesta. Intenta con 1 o 3 dias.");
}

async function buildXlsx(result) {

  wsIS.views = [{state:"frozen",ySplit:4}];

  var _loadQueue = {running:0, max:4, pending:[]};
  function enqueueLoad(fname, cb) {
    if (_loadQueue.running < _loadQueue.max) {
      _loadQueue.running++;
      loadImg(fname).then(function(url){
        _loadQueue.running--;
        cb(url);
        if (_loadQueue.pending.length) {
          var next = _loadQueue.pending.shift();
          enqueueLoad(next.fname, next.cb);
        }
      });
    } else {
      _loadQueue.pending.push({fname:fname, cb:cb});
    }
  }

  function LazyImg(props) {
    var fname = props.fname;
    var className = props.className || "";
    var style = props.style || {};
    var onClick = props.onClick;
    var srcArr = _useState(null);
    var src = srcArr[0]; var setSrc = srcArr[1];
    var visibleArr = _useState(false);
    var visible = visibleArr[0]; var setVisible = visibleArr[1];
    var enqueuedRef = _useRef(false);
    var domRef = _useRef(null);

    React.useEffect(function() {
      var el = domRef.current;
      if (!el) return;
      if (!window.IntersectionObserver) { setVisible(true); return; }
      var obs = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          setVisible(true);
          obs.disconnect();
        }
      }, {rootMargin:"200px"});
      obs.observe(el);
      return function(){ obs.disconnect(); };
    }, []);

    React.useEffect(function() {
      if (!visible || src || enqueuedRef.current) return;
      enqueuedRef.current = true;
      enqueueLoad(fname, function(url) { setSrc(url); });
    }, [visible]);

    if (!src) {
      return (
        <div ref={domRef} className={className} style={Object.assign({
          background:"#EEECEA",display:"flex",alignItems:"center",
          justifyContent:"center",color:"#C8C4BE",fontSize:9,borderRadius:8
        }, style)}>
          {visible ? "..." : ""}
        </div>
      );
    }
    return (
      <img ref={domRef} className={className} src={src} alt={fname} style={style}
        onClick={onClick ? function(){ onClick(src); } : undefined}/>
    );
  }

              )}
              {byTipo.length > 0 && (
                <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
                  <h4 style={{fontSize:12,fontWeight:700,marginBottom:12,color:"#1A1714"}}>Por tipo de evento</h4>
                  {byTipo.map(function(x,i){
                    return (
                      <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                        <div style={{fontSize:10,color:"#8A8580",width:88,flexShrink:0}}>{x.l}</div>
                        <div style={{flex:1,background:"#EEECEA",borderRadius:99,height:7}}><div style={{height:7,borderRadius:99,background:"#6B8C3A",width:(x.n/mxT*100)+"%"}}/></div>
                        <div style={{fontSize:10.5,fontWeight:700,color:"#3D3A36",width:20,textAlign:"right"}}>{x.n}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          
          <div className="pf-card">
            <div className="pf-hdr">
              <h3>Filtro por persona</h3>
              <select className="pf-select" value={personaFiltro}
                onChange={function(e){ setPersonaFiltro(e.target.value); }}>
                <option value="">Todos los participantes</option>
                {personas.map(function(p,i){ return <option key={i} value={p}>{p}</option>; })}
              </select>
              {personaFiltro && (
                <button className="pf-clear" onClick={function(){ setPersonaFiltro(""); }}>Limpiar</button>
              )}
            </div>
            {personaFiltro ? (
              <div className="pf-body">
                <div className="pf-profile">
                  <div className="pf-avatar">{personaFiltro.charAt(0).toUpperCase()}</div>
                  <div className="pf-info">
                    <div className="pf-name">{personaFiltro}</div>
                    <div className="pf-dept">
                      {dirInfo ? (dirInfo.departamento + " - " + dirInfo.rol) : "Participante del chat"}
                    </div>
                    <div className="pf-stats">
                      <div className="pf-stat"><div className="pf-stat-val">{evRep.length}</div><div className="pf-stat-lbl">Reporto</div></div>
                      <div className="pf-stat bl"><div className="pf-stat-val">{evRes.length}</div><div className="pf-stat-lbl">Responsable</div></div>
                      <div className="pf-stat re"><div className="pf-stat-val">{evRep.filter(function(e){return e.prioridad==="Critica";}).length}</div><div className="pf-stat-lbl">Criticos</div></div>
                      <div className="pf-stat gr"><div className="pf-stat-val">{evRep.concat(evRes).filter(function(e){return e.estatus!=="Cerrado";}).length}</div><div className="pf-stat-lbl">Abiertos</div></div>
                    </div>
                  </div>
                </div>
                {evRep.length > 0 && (
                  <div>
                    <div className="pf-section-title">Eventos reportados ({evRep.length})</div>
                    <div className="plist" style={{padding:0,marginBottom:12}}>
                      {evRep.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
                    </div>
                  </div>
                )}
                {evRes.length > 0 && (
                  <div>
                    <div className="pf-section-title">Donde es responsable ({evRes.length})</div>
                    <div className="plist" style={{padding:0}}>
                      {evRes.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
                    </div>
                  </div>
                )}
                {evRep.length === 0 && evRes.length === 0 && (
                  <div className="pf-empty">Sin eventos para esta persona en el periodo</div>
                )}
              </div>
            ) : (
              <div className="pf-body">
                <div className="pf-empty">Selecciona una persona para ver su actividad</div>
              </div>
            )}
          </div>

          
          {ev.length > 0 && (
            <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,overflow:"hidden",marginBottom:14,boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
              <div style={{padding:"14px 20px",borderBottom:"1px solid #EEECEA",background:"#F8F7F5",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div>
                  <h3 style={{fontSize:13.5,fontWeight:700,color:"#1A1714",marginBottom:2}}>Incident Story Model</h3>
                  <span style={{fontSize:10,color:"#8A8580"}}>Ciclo de vida de los incidentes operativos</span>
                </div>
                <span style={{fontSize:9.5,color:"#2A7A60",fontWeight:600,background:"#EAF5F0",borderRadius:4,padding:"3px 8px"}}>{ev.length} incidentes</span>
              </div>
              
              <div style={{display:"flex",overflowX:"auto",padding:"14px 12px",gap:8,minHeight:120}}>
                {[
                  {key:"Detectado",color:"#E8A050",bg:"#FEF6ED",border:"#F5D0A0"},
                  {key:"Contenido",color:"#B87820",bg:"#FEF9E8",border:"#F5E4A0"},
                  {key:"Corregido",color:"#2952A3",bg:"#EBF0FC",border:"#BDD0F8"},
                  {key:"Validado",color:"#1A7A3C",bg:"#EBF8EE",border:"#A0DEB4"},
                  {key:"Cerrado",color:"#6A6560",bg:"#F8F7F5",border:"#DDDBD7"}
                ].map(function(col){
                  var colEvs = ev.filter(function(e){
                    return (e.estado_historia || "Detectado") === col.key;
                  });
                  return (
                    <div key={col.key} style={{flex:"0 0 160px",minWidth:160,background:col.bg,border:"1px solid "+col.border,borderRadius:10,overflow:"hidden"}}>
                      <div style={{padding:"8px 10px",borderBottom:"1px solid "+col.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span style={{fontSize:10.5,fontWeight:700,color:col.color}}>{col.key}</span>
                        <span style={{fontSize:10,fontWeight:800,color:"#fff",background:col.color,borderRadius:99,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center"}}>{colEvs.length}</span>
                      </div>
                      <div style={{padding:"7px",display:"flex",flexDirection:"column",gap:5}}>
                        {colEvs.length === 0 && (
                          <div style={{fontSize:9,color:col.color,opacity:.4,textAlign:"center",padding:"10px 0",fontStyle:"italic"}}>vacio</div>
                        )}
                        {colEvs.map(function(e){
                          var actors = Array.isArray(e.actores) ? e.actores : (e.actores ? [e.actores] : []);
                          return (
                            <div key={e.id} style={{background:"#fff",borderRadius:7,border:"1px solid "+col.border,padding:"8px 9px",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                <span style={{fontSize:8.5,fontWeight:700,color:col.color,fontFamily:"monospace"}}>{e.id}</span>
                                <span style={{fontSize:7.5,color:"#8A8580"}}>{e.hora}</span>
                              </div>
                              <div style={{fontSize:10,fontWeight:600,color:"#1A1714",lineHeight:1.3,marginBottom:5}}>
                                {e.evento_detectado ? e.evento_detectado.slice(0,55)+(e.evento_detectado.length>55?"...":"") : ""}
                              </div>
                              {e.accion_ejecutada && (
                                <div style={{fontSize:8.5,color:"#2A7A60",background:"#EAF5F0",borderRadius:4,padding:"2px 6px",marginBottom:4,lineHeight:1.3}}>
                                  {e.accion_ejecutada.slice(0,50)}
                                </div>
                              )}
                              {actors.length > 0 && (
                                <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:3}}>
                                  {actors.slice(0,3).map(function(a,ai){
                                    return <span key={ai} style={{fontSize:7.5,background:"#F0F4F8",color:"#6A6560",borderRadius:3,padding:"1px 5px"}}>{a}</span>;
                                  })}
                                </div>
                              )}
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                                <span style={{fontSize:7.5,color:"#8A8580"}}>{e.linea_estacion}</span>
                                <span style={{fontSize:7.5,fontWeight:700,borderRadius:3,padding:"1px 5px",
                                  background:({Critica:"#FEE2E2",Alta:"#FEF3C7",Media:"#EBF0FC",Baja:"#EBF8EE"})[e.prioridad]||"#F8F7F5",
                                  color:({Critica:"#991B1B",Alta:"#92400E",Media:"#1E3C82",Baja:"#145A28"})[e.prioridad]||"#6A6560"
                                }}>{e.prioridad}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
              
              <div style={{borderTop:"1px solid #EEECEA",padding:"10px 16px",background:"#F8F7F5",display:"flex",gap:4,alignItems:"center"}}>
                {[
                  {key:"Detectado",color:"#E8A050"},
                  {key:"Contenido",color:"#B87820"},
                  {key:"Corregido",color:"#2952A3"},
                  {key:"Validado",color:"#1A7A3C"},
                  {key:"Cerrado",color:"#6A6560"}
                ].map(function(s){
                  var n = ev.filter(function(e){ return (e.estado_historia||"Detectado")===s.key; }).length;
                  return (
                    <div key={s.key} style={{flex:1,textAlign:"center"}}>
                      <div style={{height:4,borderRadius:2,background:s.color,opacity:n>0?1:.2,marginBottom:3}}/>
                      <div style={{fontSize:9,fontWeight:700,color:s.color}}>{n}</div>
                      <div style={{fontSize:7.5,color:"#8A8580"}}>{s.key.slice(0,4)}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          
          <div style={{background:"#fff",border:"1px solid #DDDBD7",borderRadius:14,overflow:"hidden",marginBottom:14,boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
            <div style={{padding:"14px 20px",borderBottom:"1px solid #EEECEA",background:"#F8F7F5",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div>
                <h3 style={{fontSize:13.5,fontWeight:700,color:"#1A1714",marginBottom:2}}>RCCA Memory</h3>
                <span style={{fontSize:10,color:"#8A8580"}}>Antecedentes de causa raiz vinculados a eventos</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:9.5,color:"#6B2DA8",fontWeight:600,background:"#F5F0FE",borderRadius:4,padding:"3px 8px"}}>{rccaList.length} RCCA guardadas</span>
                {rccaList.length > 0 && (
                  <button onClick={exportRcca} style={{background:"none",border:"1px solid #DDDBD7",borderRadius:7,padding:"4px 11px",fontSize:10,color:"#6A6560",cursor:"pointer"}}>Exportar JSON</button>
                )}
                <button onClick={function(){ setRccaForm({event_ids:[],modelo:"",linea:"",fecha:new Date().toISOString().slice(0,10)}); }}
                  style={{background:"#1E5C48",color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  + Nueva RCCA
                </button>
              </div>
            </div>

            
            {autoSuggestions.length > 0 && (
              <div style={{padding:"12px 16px",borderBottom:"1px solid #EEECEA",background:"#FEF9E8"}}>
                <div style={{fontSize:10.5,fontWeight:700,color:"#B87820",marginBottom:8}}>
                  Antecedentes detectados - {autoSuggestions.length} evento{autoSuggestions.length>1?"s":""} con RCCA similar
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {autoSuggestions.map(function(e){
                    var matches = getMatches(e);
                    return (
                      <div key={e.id} style={{background:"#fff",border:"1px solid #F5E4A0",borderRadius:8,padding:"10px 12px"}}>
                        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,flexWrap:"wrap",marginBottom:6}}>
                          <div>
                            <span style={{fontSize:9.5,fontWeight:700,fontFamily:"monospace",color:"#B87820",marginRight:6}}>{e.id}</span>
                            <span style={{fontSize:10.5,fontWeight:600,color:"#1A1714"}}>{e.evento_detectado ? e.evento_detectado.slice(0,60) : ""}</span>
                          </div>
                          <button onClick={function(){
                            setRccaForm({
                              event_ids:[e.id],
                              modelo:e.modelo||"",
                              linea:e.linea_estacion||"",
                              fecha:e.fecha||new Date().toISOString().slice(0,10),
                              problema:e.evento_detectado||""
                            });
                          }}
                            style={{background:"#B87820",color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:10,fontWeight:600,cursor:"pointer",flexShrink:0}}>
                            Crear RCCA
                          </button>
                        </div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          {matches.map(function(m){
                            return (
                              <div key={m.rcca.rcca_id} style={{display:"flex",alignItems:"center",gap:5,background:"#FEF9E8",border:"1px solid #F5E4A0",borderRadius:6,padding:"3px 9px",cursor:"pointer"}}
                                onClick={function(){ setRccaDetail(m.rcca); }}>
                                <span style={{fontSize:9,fontFamily:"monospace",color:"#B87820",fontWeight:700}}>{m.rcca.rcca_id}</span>
                                <span style={{fontSize:8.5,color:"#B87820"}}>{m.score}%</span>
                                <span style={{fontSize:8.5,color:"#6A6560",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.rcca.problema}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            
            <div style={{padding:"12px 16px"}}>
              {rccaList.length === 0 ? (
                <div style={{textAlign:"center",padding:"28px 0",color:"#B8B4AE",fontSize:13}}>
                  <div style={{fontSize:24,marginBottom:8}}>0</div>
                  No hay RCCA guardadas. Crea la primera desde un evento de la bitacora.
                </div>
              ) : (
                <div>
                  
                  <input placeholder="Buscar por modelo, linea, problema..."
                    value={rccaFilter}
                    onChange={function(e){ setRccaFilter(e.target.value); }}
                    style={{width:"100%",border:"1.5px solid #DDDBD7",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#1A1714",outline:"none",marginBottom:10}}/>
                  
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {rccaList.filter(function(r){
                      if (!rccaFilter) return true;
                      var q = rccaFilter.toLowerCase();
                      return (r.modelo||"").toLowerCase().indexOf(q) >= 0
                        || (r.linea||"").toLowerCase().indexOf(q) >= 0
                        || (r.problema||"").toLowerCase().indexOf(q) >= 0
                        || (r.rcca_id||"").toLowerCase().indexOf(q) >= 0;
                    }).map(function(r){
                      return <RccaCard key={r.rcca_id} r={r} score={0}/>;
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>

          
          <div className="tcard">
            <div className="tcard-hdr">
                <h3>Bitacora de eventos ({ev.length})</h3>
                {imgNames.length > 0 && (
                  <span style={{fontSize:10.5,color:"#2A7A60",fontWeight:600}}>
                    {imgNames.length} imagen{imgNames.length!==1?"es":""} disponibles
                    <span className="ev-count">{Object.values(evImgs).reduce(function(a,b){return a+b.length;},0)} adjuntas</span>
                  </span>
                )}
              </div>
            <div className="tscroll">
              <table>
                <thead>
                  <tr>
                    <th>ID</th><th>Fecha</th><th>T</th><th>Linea</th>
                    <th>Tipo</th><th>Defecto SMT</th><th>Evento</th>
                    <th>Prioridad</th><th>Estatus</th>
                    <th>RCCA</th>
                    {imgNames.length > 0 && <th>Evidencia</th>}
                  </tr>
                </thead>
                <tbody>
                  {ev.map(function(e,i){
                    return (
                      <tr key={i}>
                        <td><strong>{e.id}</strong></td>
                        <td style={{whiteSpace:"nowrap",fontSize:10}}>{e.fecha}</td>
                        <td>{e.turno}</td>
                        <td style={{maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.linea_estacion}</td>
                        <td><span style={{fontSize:9,background:"#EDF5F3",color:"#1E5545",padding:"2px 5px",borderRadius:4,fontWeight:600}}>{e.tipo_evento}</span></td>
                        <td style={{maxWidth:100}}>
                          {e.defecto_smt && e.defecto_smt !== "N/A"
                            ? <span className="badge bt" style={{fontSize:8.5,whiteSpace:"normal"}}>{e.defecto_smt}</span>
                            : <span style={{color:"#C8C2BA",fontSize:10}}>-</span>}
                        </td>
                        <td style={{maxWidth:170,fontSize:10.5}}>{e.evento_detectado}</td>
                        <td><span className={bprio(e.prioridad)}>{e.prioridad}</span></td>
                        <td><span className={best(e.estatus)}>{e.estatus}</span></td>
                        <td style={{verticalAlign:"top",paddingTop:8}}>
                          <RccaCell evId={e.id} modelo={e.modelo} linea={e.linea_estacion} fecha={e.fecha} problema={e.evento_detectado}/>
                        </td>
                        {imgNames.length > 0 && <EvidenceCell e={e}/>}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          
          {pend.length > 0 && (
            <div className="tcard" style={{marginTop:14}}>
              <div className="tcard-hdr"><h3>Pendientes operativos ({pend.length})</h3></div>
              <div className="plist">
                {pend.map(function(e,i){ return <PendItem key={i} e={e}/>; })}
              </div>
            </div>
          )}

          
          {rccaList.length > 0 && (
            <InvestigationCarousel cards={rccaList} allRcca={rccaList}/>
          )}

          
          <div className="cmp" style={{marginTop:14}}>
            <div className="cmpc">
              <div className="cmplbl"><div className="cmpdot"/><span>Antes</span></div>
              {["Memoria colectiva fracturada","Historia del incidente incompleta","Cada area tiene solo su parte","Juntas CFT sin contexto"].map(function(t,i){
                return <div key={i} className="cmrow"><div className="cmic">X</div><p>{t}</p></div>;
              })}
            </div>
            <div className="cmpc aft">
              <div className="cmplbl"><div className="cmpdot g"/><span>Despues OpsTrace</span></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>{ev.length} incidentes</strong> reconstruidos del chat</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>Incident Story</strong> - ciclo de vida completo</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p><strong>{pend.length} pendientes</strong> con owner y estado</p></div>
              <div className="cmrow"><div className="cmic g">V</div><p>Memoria operativa estructurada en minutos</p></div>
            </div>
          </div>

          
          <div className="foot">
            <p><strong>OpsTrace</strong> by SMTintel - ALDA - {new Date().toLocaleDateString("es-MX")}</p>
            <button className="dlbtn" style={{padding:"8px 16px",fontSize:12}} onClick={download}>Descargar Excel</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.addEventListener('unhandledrejection', function(e) {
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:60px;left:0;right:0;background:#8E44AD;color:#fff;padding:16px;font-family:monospace;font-size:13px;z-index:99999;word-break:break-all';
  box.innerHTML = '<strong>UNHANDLED REJECTION</strong><br>' + (e.reason ? e.reason.toString() : 'unknown');
  document.body.appendChild(box);
});
</script></body>

</html>
